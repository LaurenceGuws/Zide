terminal_ffi_bridge_todo:
  scope:
    description: "Make terminal modularity productizable: define an embeddable terminal backend surface with stable FFI-oriented contracts."
    notes:
      - "This is a core feature, not a sidecar integration task. The goal is to let Zide's terminal backend run outside the current UI shell without rewriting protocol, PTY, or screen-model logic."
      - "Desktop-first: Linux/macOS/Windows. Mobile/browser are out of scope for the initial bridge."
      - "The bridge target is backend/session/snapshot/event portability, not immediate renderer portability."
    priorities:
      - "stable ownership + lifetime contract"
      - "UI-free session core with host-driven input/output"
      - "FFI-safe snapshot or diff transport"
      - "clean PTY/session abstraction"
      - "small Python ctypes smoke host before any Flutter adapter"

  zide_integration:
    entry_points:
      - app_architecture/APP_LAYERING.md
      - app_architecture/ENGINEERING.md
      - app_architecture/terminal/MODULARIZATION_PLAN.md
      - app_architecture/terminal/TERMINAL_API.md
      - src/terminal/core/terminal.zig
      - src/terminal/core/terminal_session.zig
      - src/terminal/core/snapshot.zig
      - src/terminal/io/pty_unix.zig
      - src/terminal/io/pty_windows.zig
      - src/terminal/core/snapshot_adapter.zig

  reference_maps:
    ghostty:
      - reference_repos/terminals/ghostty/src/apprt.zig
      - reference_repos/terminals/ghostty/src/apprt/embedded.zig
      - reference_repos/terminals/ghostty/include/ghostty.h
      - reference_repos/terminals/ghostty/src/lib_vt.zig
      - reference_repos/terminals/ghostty/src/terminal/render.zig
      - reference_repos/terminals/ghostty/src/termio/Termio.zig
    wezterm:
      - reference_repos/terminals/wezterm/term/src/lib.rs
      - reference_repos/terminals/wezterm/term/src/terminal.rs
      - reference_repos/terminals/wezterm/mux/src/pane.rs
      - reference_repos/terminals/wezterm/mux/src/renderable.rs
      - reference_repos/terminals/wezterm/mux/src/localpane.rs
      - reference_repos/terminals/wezterm/pty/src/lib.rs
      - reference_repos/terminals/wezterm/wezterm-gui/src/renderstate.rs
      - reference_repos/terminals/wezterm/docs/multiplexing.md
    contour:
      - reference_repos/terminals/contour/src/contour/TerminalSession.h
      - reference_repos/terminals/contour/src/contour/TerminalSession.cpp
      - reference_repos/terminals/contour/src/vtbackend/Terminal.h
      - reference_repos/terminals/contour/src/vtbackend/RenderBufferBuilder.h
      - reference_repos/terminals/contour/src/vtrasterizer/Renderer.h
      - reference_repos/terminals/contour/docs/drafts/daemon-mode.md
    rio:
      - reference_repos/terminals/rio/teletypewriter/src/lib.rs
      - reference_repos/terminals/rio/teletypewriter/src/unix/mod.rs
      - reference_repos/terminals/rio/rio-backend/src/lib.rs
      - reference_repos/terminals/rio/rio-backend/src/performer/mod.rs
      - reference_repos/terminals/rio/sugarloaf/src/lib.rs
      - reference_repos/terminals/rio/sugarloaf/src/sugarloaf.rs
    foot:
      - reference_repos/terminals/foot/terminal.h
      - reference_repos/terminals/foot/render.h
      - reference_repos/terminals/foot/server.c
      - reference_repos/terminals/foot/README.md

  architecture_position:
    goals:
      - "Preserve the existing Zig terminal backend as the source of truth for VT parsing, protocol handling, screen model, and PTY lifecycle."
      - "Make host integration explicit: hosts should drive lifecycle, resize, input, polling, and snapshot consumption through a narrow bridge surface."
      - "Support both in-process embedding (FFI) and future out-of-process daemon/session experiments without discarding the same contracts."
    non_goals:
      - "Do not design a Flutter-specific API first."
      - "Do not expose renderer internals or SDL types through the bridge."
      - "Do not freeze a final ABI before a smoke host exists."
      - "Do not couple the bridge to editor concepts or widget-specific state."
    constraints:
      - "Borrowed-slice internal APIs are acceptable inside Zig, but exported bridge APIs must make ownership explicit."
      - "Any exported buffer must have a paired free function documented in the same file per app_architecture/ENGINEERING.md."
      - "Long-running or blocking work must stay off host callback paths."
      - "The first bridge surface should be synchronous and boring; async/event streaming can layer on later."

  milestones:
    - name: "FFI-00 Contract + scope lock"
      tasks:
        - id: FFI-00-01
          title: "Write bridge design doc and choose the primary exported shape"
          status: todo
          files_to_add:
            - app_architecture/terminal/FFI_BRIDGE_DESIGN.md
          refs:
            - app_architecture/APP_LAYERING.md
            - app_architecture/ENGINEERING.md
            - app_architecture/terminal/TERMINAL_API.md
            - reference_repos/terminals/ghostty/src/apprt/embedded.zig
            - reference_repos/terminals/ghostty/include/ghostty.h
            - reference_repos/terminals/contour/src/contour/TerminalSession.h
          notes:
            - "Decide between opaque-handle C ABI, shared-library API, or an internal Zig package plus thin C shim."
            - "Expected answer for beta: opaque handles + explicit free functions + flat structs."
        - id: FFI-00-02
          title: "Define bridge success criteria and non-goals"
          status: todo
          files_to_edit:
            - app_architecture/terminal/FFI_BRIDGE_DESIGN.md
            - app_architecture/PLANNING.md
          notes:
            - "Success means a host can spawn a shell, resize, send bytes/keys/text, poll, and render from snapshots without importing UI code."
            - "Flutter adapter is explicitly downstream of the bridge, not part of milestone 0."

    - name: "FFI-01 Session core boundary"
      tasks:
        - id: FFI-01-01
          title: "Separate UI-only concerns from TerminalSession contract"
          status: todo
          files_to_edit:
            - app_architecture/terminal/TERMINAL_API.md
            - src/terminal/core/terminal_session.zig
            - src/terminal/core/terminal.zig
          refs:
            - reference_repos/terminals/wezterm/term/src/terminal.rs
            - reference_repos/terminals/wezterm/mux/src/pane.rs
            - reference_repos/terminals/contour/src/vtbackend/Terminal.h
          notes:
            - "Audit which APIs are backend-safe versus widget-only conveniences."
            - "The bridge should expose core session operations only; UI hover/selection rendering affordances stay above it."
        - id: FFI-01-02
          title: "Introduce host-facing event/action inventory"
          status: partial
          files_to_add:
            - app_architecture/terminal/FFI_EVENT_INVENTORY.md
            - app_architecture/terminal/FFI_EVENT_ABI.md
          refs:
            - reference_repos/terminals/ghostty/src/apprt/embedded.zig
            - reference_repos/terminals/wezterm/mux/src/pane.rs
            - reference_repos/terminals/rio/rio-backend/src/performer/mod.rs
          notes:
            - "Cover title changes, cwd updates, clipboard requests/data, bell, process exit, link activation, dirty/resize notifications."
            - "Classify each event as pull-based, callback-based, or snapshot-derived."
            - "Milestone-1 queue ABI is now locked for title/cwd/clipboard_write/child_exit in `app_architecture/terminal/FFI_EVENT_ABI.md`."

    - name: "FFI-02 Snapshot and diff ABI"
      tasks:
        - id: FFI-02-01
          title: "Design an FFI-safe terminal snapshot layout"
          status: partial
          files_to_add:
            - app_architecture/terminal/FFI_SNAPSHOT_ABI.md
          files_to_edit:
            - src/terminal/core/snapshot.zig
            - src/terminal/core/snapshot_adapter.zig
          refs:
            - reference_repos/terminals/ghostty/src/terminal/render.zig
            - reference_repos/terminals/wezterm/mux/src/renderable.rs
            - reference_repos/terminals/contour/src/vtbackend/RenderBufferBuilder.h
          notes:
            - "Decide between full-frame flat cells and damage-driven rows/rects."
            - "The first exported ABI should bias toward simplicity over minimal bandwidth."
            - "Baseline documented in `app_architecture/terminal/FFI_SNAPSHOT_ABI.md` and implemented as copy-based full snapshots in `src/terminal/ffi/bridge.zig`."
        - id: FFI-02-02
          title: "Specify ownership rules for exported snapshot buffers"
          status: done
          files_to_edit:
            - app_architecture/terminal/FFI_SNAPSHOT_ABI.md
            - app_architecture/ENGINEERING.md
          notes:
            - "Every owned returned buffer must name its free function."
            - "Document whether snapshots are copied, pinned, or borrowed until next poll."
            - "Current baseline now also requires hosts to validate `abi_version` and `struct_size` on acquired snapshots."
        - id: FFI-02-03
          title: "Define optional damage/diff extension after baseline full snapshot works"
          status: todo
          files_to_edit:
            - app_architecture/terminal/DAMAGE_TRACKING.md
            - app_architecture/terminal/FFI_SNAPSHOT_ABI.md
          notes:
            - "Do not let diff sophistication block milestone 1."
            - "Damage should be an extension surface once correctness and ownership are proven."

    - name: "FFI-03 PTY + host IO seam"
      tasks:
        - id: FFI-03-01
          title: "Define host-driven PTY/session abstraction"
          status: done
          files_to_add:
            - app_architecture/terminal/FFI_PTY_ABI.md
          refs:
            - reference_repos/terminals/wezterm/pty/src/lib.rs
            - reference_repos/terminals/rio/teletypewriter/src/lib.rs
            - reference_repos/terminals/rio/teletypewriter/src/unix/mod.rs
            - reference_repos/terminals/contour/src/contour/TerminalSession.h
          notes:
            - "Support both internal PTY ownership and future external byte-source ownership."
            - "Keep the first implementation desktop-shell focused: internal PTY, explicit poll/drain calls."
            - "Decision locked in `app_architecture/terminal/FFI_PTY_ABI.md`."
        - id: FFI-03-02
          title: "Audit platform split for exported bridge expectations"
          status: todo
          files_to_edit:
            - src/terminal/io/pty_unix.zig
            - src/terminal/io/pty_windows.zig
            - app_architecture/terminal/FFI_PTY_ABI.md
          notes:
            - "Make platform divergence explicit in the bridge doc rather than hiding it behind vague promises."

    - name: "FFI-04 Export surface + smoke host"
      tasks:
        - id: FFI-04-01
          title: "Create minimal exported bridge surface with opaque handles"
          status: partial
          files_to_add:
            - src/terminal/ffi/bridge.zig
            - src/terminal/ffi/c_api.zig
          refs:
            - reference_repos/terminals/ghostty/src/apprt/embedded.zig
            - reference_repos/terminals/ghostty/include/ghostty.h
            - reference_repos/terminals/ghostty/src/lib_vt.zig
          notes:
            - "Initial operations: create/destroy, start, poll, resize, send bytes, send key/text, snapshot acquire/free, event drain."
            - "Implemented first slice in `src/terminal/ffi/{bridge,c_api}.zig` with copy-based snapshots and a derived-event queue for title/cwd/clipboard/child-exit."
        - id: FFI-04-02
          title: "Add standalone Python ctypes smoke host"
          status: done
          files_to_add:
            - examples/terminal_ffi_smoke/main.py
            - examples/terminal_ffi_smoke/README.md
          refs:
            - reference_repos/terminals/ghostty/example/c-vt-sgr/src/main.c
          notes:
            - "The smoke host should prove the bridge without depending on Zide's UI shell."
            - "Use Python ctypes first to keep host friction low while the ABI is still settling."
            - "Required demo: spawn shell, resize, send command, print snapshot rows."
            - "Implemented in `examples/terminal_ffi_smoke/main.py` against `zig-out/lib/libzide-terminal-ffi.so`."
            - "Current smoke proves create/resize/snapshot ownership plus parser-fed title/clipboard event generation; PTY-backed foreign-host smoke remains a separate follow-on slice."
        - id: FFI-04-03
          title: "Add CI-safe bridge smoke test"
          status: done
          files_to_add:
            - src/terminal_ffi_smoke_tests.zig
          notes:
            - "Test ownership/lifetime and a basic shell round-trip."
            - "Environment-gate PTY-dependent cases where necessary, but keep non-PTY contract tests unconditional."
            - "Implemented as unconditional non-PTY Zig tests; PTY-hosting remains a separate smoke path."
        - id: FFI-04-04
          title: "Stabilize PTY-backed foreign-host start as a separate smoke slice"
          status: partial
          files_to_add:
            - src/terminal_ffi_pty_smoke.zig
          notes:
            - "Current slice uses a dedicated Zig verifier executable instead of the Python ctypes host."
            - "Keep the Python smoke authoritative for base FFI ownership/lifetime; use the PTY smoke only for bridge-owned shell startup and polling."
          files_to_edit:
            - src/terminal/ffi/bridge.zig
            - src/terminal/core/pty_io.zig
            - examples/terminal_ffi_smoke/main.py
            - app_architecture/terminal/FFI_PTY_ABI.md
          notes:
            - "Keep the base no-PTY smoke green while iterating on PTY-backed host startup."
            - "Only promote the PTY-backed path once Python can create, start, poll, snapshot, and observe child exit without crashes."

    - name: "FFI-05 Host adapters and future productization"
      tasks:
        - id: FFI-05-01
          title: "Document Flutter adapter design constraints"
          status: todo
          files_to_add:
            - app_architecture/terminal/FLUTTER_ADAPTER_NOTES.md
          notes:
            - "Record why snapshot/diff transport beats trying to export SDL or renderer internals."
            - "Document desktop-first assumptions and texture/view-hosting alternatives."
        - id: FFI-05-02
          title: "Evaluate daemon or multiplexer mode as a follow-on, not a prerequisite"
          status: todo
          files_to_edit:
            - app_architecture/terminal/FFI_BRIDGE_DESIGN.md
          refs:
            - reference_repos/terminals/foot/server.c
            - reference_repos/terminals/contour/docs/drafts/daemon-mode.md
            - reference_repos/terminals/wezterm/docs/multiplexing.md
          notes:
            - "Daemon/session-sharing may be valuable later for embedded-resource goals, but the in-process bridge should land first."

  current_assessment:
    strengths:
      - "Zide already has a real session/snapshot architecture and platform-split PTY files."
      - "App layering docs already forbid terminal backend imports from UI/editor layers."
      - "Replay harness and protocol beta surface give the backend a strong correctness base before export work."
    gaps:
      - "No C ABI or foreign-language-safe ownership model exists yet."
      - "TerminalSnapshot is still an internal borrowed-slice contract, not an exported bridge contract."
      - "Host events/actions are implicit across current APIs instead of formalized as a bridge inventory."
      - "There is no standalone smoke host proving the backend outside Zide's renderer/UI shell."
    position:
      - "Treat FFI bridge work as modularity productization: it validates the backend boundary and makes future host integrations credible."
      - "Do not broaden scope into renderer export until the backend bridge is test-backed and boring."
