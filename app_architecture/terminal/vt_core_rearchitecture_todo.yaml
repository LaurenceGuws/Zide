version: 1

items:
  - id: VTCORE-00
    title: Define the terminal core boundary
    status: done
    priority: high
    notes:
      - Introduce a clear engine-owned center below TerminalSession
      - Engine owns terminal emulation state and protocol behavior
      - PTY, workspace, UI, and FFI must become consumers around that core
      - Concrete boundary and target types are now defined in app_architecture/terminal/VT_CORE_DESIGN.md

  - id: VTCORE-01
    title: Separate VT core from host session/runtime
    status: in_progress
    priority: high
    notes:
      - Shrink TerminalSession into a host/runtime wrapper
      - Remove parser, screen, history, protocol, and terminal-mode gravity from TerminalSession
      - Preserve behavior while moving ownership, not by adding compatibility sludge
      - First code-cut intent: introduce an internal TerminalCore while keeping PTY-backed desktop behavior unchanged
      - First code cut landed: engine-owned screen/history/parser/metadata/palette/kitty state now lives under src/terminal/core/terminal_core.zig, with TerminalSession wrapping it while PTY/runtime/threading stay session-owned
      - Session-construction assembly now also lives under src/terminal/core/session_runtime.zig, so TerminalSession init is moving toward a host-wrapper creation facade instead of owning the full zeroed-field/runtime setup block inline
      - Replay/test-only debug helpers now also live under src/terminal/core/terminal_session_debug.zig, so terminal_session.zig no longer embeds that non-runtime surface inline
      - Dead local root-session helper residue (unused screen-mode/hash/inactive-screen helpers) is now removed, and the remaining test-facing view-cache shim delegates through src/terminal/core/session_rendering.zig instead of owning view-cache plumbing inline
      - Remaining scroll-refresh and OSC clipboard copy wrappers now also delegate through src/terminal/core/session_rendering.zig and src/terminal/core/session_queries.zig, reducing more root-session orchestration residue without changing behavior
      - Backlog hinting now also routes through src/terminal/core/session_runtime.zig instead of session_rendering.zig, keeping transport ingress pressure out of the render/publication owner
      - Host-facing metadata, liveness, and close-confirm signal queries now also route through src/terminal/core/session_host_queries.zig, leaving session_queries.zig focused on terminal-data query surfaces
      - Workspace/runtime input-pressure hinting now also routes through src/terminal/core/session_runtime.zig instead of staying inline in terminal_session.zig
      - Stale private root-session shims for SGR application and key-mode flag reads are now removed, leaving fewer dead internal forwarding surfaces in terminal_session.zig

  - id: VTCORE-02
    title: Make FFI a first-class core interface
    status: in_progress
    priority: high
    notes:
      - FFI must target the new terminal core and stable snapshot contracts
      - Do not keep FFI structurally tied to desktop session/workspace design
      - Support non-UI consumers such as Flutter hosts cleanly
      - Design direction now distinguishes core-facing operations from optional PTY host/runtime operations
      - First code slice landed: shared terminal FFI ABI/state/helpers now live in src/terminal/ffi/shared.zig, and PTY-host operations now live in src/terminal/ffi/host_api.zig while bridge.zig acts as a thinner facade over host-facing and core-facing groups
      - Second code slice landed: the remaining core-facing bridge operations now live in src/terminal/ffi/core_api.zig, leaving bridge.zig as a true facade over core_api + host_api without changing the exported C ABI

  - id: VTCORE-03
    title: Introduce transport-agnostic host integration
    status: in_progress
    priority: high
    notes:
      - PTY must become one transport implementation, not the architectural center
      - Support externally supplied byte streams/write sinks for SSH/mobile/embed hosts
      - Resize and lifecycle delivery must work without host-owned PTY assumptions
      - Target type and ownership rules are now defined in app_architecture/terminal/VT_CORE_DESIGN.md
      - First internal transport contract landed in src/terminal/core/terminal_transport.zig for PTY lifecycle, resize, aliveness, exit polling, and foreground-process metadata
      - Writer path now also goes through the transport boundary: the old raw Pty writer guard was replaced by a transport-owned Writer contract used by session_input and existing protocol write callers
      - Read/poll byte pumps now also go through the transport boundary: io_threads.zig and pty_io.zig consume transport.read(...) and transport.waitForData(...) instead of reaching into raw Pty ownership directly
      - PTY attach/detach setup now also goes through terminal_transport helpers, including the replay harness reply-capture path
      - Low-risk transport existence gates now also route through terminal_transport helpers, so session_input/session_interaction no longer peek at self.pty directly just to answer "is there a writable transport?"
      - OSC 5522 reply/status writes now also go through the transport writer guard instead of direct self.pty access inside protocol code
      - First non-PTY transport shape is now landed internally: terminal_transport.zig has an in-memory external transport, FFI-created sessions attach it by default, and feed_output now goes through transport enqueue + session poll instead of bypassing transport ownership
      - External transport is now also covered in terminal core tests, including enqueue/poll behavior and explicit alive/closed metadata semantics
      - Replay harness now also consumes external transport for normal VT fixtures, leaving PTY attachment only for reply-capture cases that need a writable sink
      - Higher-level callers now use session-owned external transport wrapper methods instead of directly assembling that path through terminal_transport
      - Replay reply-capture PTY attachment now also goes through session-owned wrapper methods instead of raw terminal_transport attach/detach calls
      - Higher-level session assembly paths no longer need raw terminal_transport attach/detach helpers for PTY vs external transport selection
      - Terminal FFI now exposes close_input for no-PTY hosts, and the derived event stream now emits alive_changed when external input is explicitly closed
      - Terminal Python mock-service smoke now validates close_input -> alive_changed -> metadata.alive=false for the external transport path
      - The derived event stream now also emits redraw_ready when snapshot generation advances, giving embedded hosts a minimal wake signal for snapshot pulls without introducing a second damage model
      - Host-side resize now also emits redraw_ready through the same derived event path, so PTY-backed foreign hosts and no-PTY embedded hosts share the same basic wake contract after visible size changes
      - Reference-repo read confirms the same general model: Ghostty wakes after stream/mailbox publication and Alacritty requests redraw after actual visible-state changes, so start() is intentionally left poll-driven rather than gaining a synthetic wake event
      - Native PTY FFI smoke now also requires redraw_ready on poll-driven visible updates, so the wake contract is locked on both the no-PTY and PTY host paths
      - The input-mode query/toggle wrapper surface now routes through session_interaction.zig instead of living inline in terminal_session.zig, shaving another non-runtime API cluster off the root session facade

  - id: VTCORE-04
    title: Move protocol execution onto core/model contracts
    status: in_progress
    priority: high
    notes:
      - CSI/OSC/DCS/APC should execute against terminal core contracts, not session service facades
      - Preserve recent typed seam work and continue replacing session-centric execution targets
      - First slice landed: pure engine-side screen/palette/query protocol helpers moved behind src/terminal/core/terminal_core_protocol.zig, leaving session_protocol with the still session-coupled parts
      - Second slice landed: parser/control/CSI/OSC/DCS/APC dispatch entry helpers now live behind src/terminal/core/terminal_core_dispatch.zig, while byte feed/publication stays in session_protocol because locking and generation publication are still session-owned
      - Third slice landed: parser byte feed itself now runs through src/terminal/core/terminal_core_feed.zig, with session_protocol initially retaining the lock/generation/view-cache publication wrapper
      - Fourth slice landed: saved-cursor restore and alt-screen core state transitions now live behind src/terminal/core/terminal_core_modes.zig, leaving session_protocol with only the remaining session-owned side effects around those transitions
      - Fifth slice landed: RIS/reset core mutation now lives behind src/terminal/core/terminal_core_reset.zig, leaving session_protocol with only the session-owned input snapshot republish step
      - Sixth slice landed: hyperlink allocation, kitty image clearing, and scroll-region mutation helpers now also live behind src/terminal/core/terminal_core_protocol.zig, leaving session_protocol with publication/selection wrappers instead of more pure core-state mutation entrypoints
      - Seventh slice landed: parser feed now returns an explicit core_feed.FeedResult publication contract, and session-owned generation/view-cache publication now runs through src/terminal/core/session_rendering.zig instead of a hidden inline helper in session_protocol
      - Eighth slice landed: the remaining session-owned alt-screen/reset side effects now live under src/terminal/core/session_mode_effects.zig, leaving session_protocol closer to a dispatch facade over core helpers plus explicit session effect owners
      - Ninth slice landed: alt-screen exit presentation timing now also routes through src/terminal/core/session_rendering.zig, so session_mode_effects no longer mutates render/publication timing state inline

  - id: VTCORE-05
    title: Simplify snapshot and render publication
    status: in_progress
    priority: medium
    notes:
      - Keep renderer-agnostic snapshot/damage contracts
      - Reduce session/cache choreography where it is only compensating for session-centered ownership
      - Preserve correctness for widget and FFI render consumers
      - Contract target is now defined in app_architecture/terminal/RENDER_PUBLICATION_CONTRACT.md
      - Start this lane only after the current VT core/session/transport split stops moving fundamental backend ownership every patch
      - First prep slice landed: pure publication/diff helpers now live under src/terminal/core/view_cache_publication.zig, so src/terminal/core/view_cache.zig is beginning to separate projection from publication planning without changing behavior
      - Second prep slice landed: selection projection now lives under src/terminal/core/view_cache_selection.zig, so view_cache.zig no longer owns both selection projection and publication/diff helpers inline
      - Third prep slice landed: viewport-shift/full-vs-partial publication planning now lives under src/terminal/core/view_cache_plan.zig, so view_cache.zig no longer owns those publication decisions inline
      - Fourth prep slice landed: row-hash refinement now lives under src/terminal/core/view_cache_refinement.zig, isolating that optional publication optimization from the base view-cache update flow
      - Fifth prep slice landed: selection-change dirty expansion now lives under src/terminal/core/view_cache_selection_dirty.zig, so selection-driven damage widening is no longer embedded in the base view-cache update path
      - Sixth prep slice landed: base dirty/damage assignment plus partial-damage widening now lives under src/terminal/core/view_cache_damage.zig, so the remaining view_cache.zig path is closer to projection/orchestration than publication policy
      - Seventh prep slice landed: presented-generation acknowledgement and damage retirement now lives under src/terminal/core/session_rendering_retirement.zig, so session_rendering.zig no longer mixes capture/feedback with retirement policy inline
      - Eighth prep slice landed: replay_harness now supports a presented baseline phase plus explicit damage assertions, and the first replay-backed redraw-contract fixtures now lock narrow partial publication for gutter rewrites and indent-guide rewrites after a baseline publish
      - Ninth prep slice landed: replay-backed redraw coverage now also locks dense clear+repaint loops, keeping ED2 plus full visible repaint on the partial path with full-width viewport damage after a presented baseline
      - Tenth prep slice landed: replay-backed redraw coverage now also locks live-bottom viewport-shift publication for full-region scroll, including the current widened full-viewport damage bounds plus tracked viewport_shift_rows metadata after a presented baseline

  - id: VTCORE-06
    title: Keep input encoding as a peer subsystem
    status: todo
    priority: medium
    notes:
      - Input encoding should consume terminal mode state cleanly
      - Avoid re-entangling encoder logic with PTY/session runtime concerns
      - Keep keyboard and mouse encoding usable through FFI hosts

  - id: VTCORE-07
    title: Preserve desktop Zide behavior while opening the embedding path
    status: todo
    priority: medium
    notes:
      - Existing PTY-backed desktop behavior must remain valid during the redesign
      - Flutter/mobile consumers should not require Flutter-specific logic in the terminal core
      - The redesign is about separation of concerns, not rewriting for a single host
