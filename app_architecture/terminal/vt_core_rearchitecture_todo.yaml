      - That SDL/EGL introspection cut is now wired into startup too: `sdl.window` logs `event=wayland_handles ...`, and `sdl.gl` logs `SDL EGL contract ...` with queried `EGL_RENDER_BUFFER`, `EGL_SWAP_BEHAVIOR`, `EGL_SURFACE_TYPE`, `EGL_CONFIG_ID`, surface `width/height`, and EGL `vendor/version/client_apis`.
      - The local design/reference set is now complete enough to start the renderer redesign without another fetch pass: terminal-side architecture refs (`ghostty`, `foot`, `kitty`, `wezterm`, `rio`) plus backend authorities (SDL source, Mesa EGL tree, Wayland/protocol repos, and the expanded Khronos EGL/OpenGL mirror including `eglGetConfigAttrib`, `eglQueryContext`, `eglMakeCurrent`, and `glReadPixels`).
      - Current focused instrumentation now sits inside `copy_back_to_front` itself: `pre_fallback_back` / `pre_fallback_front` are sampled before the explicit blit, while the existing `pre_swap_back` / `pre_swap_front` samples are after the blit but still before swap.
      - The next `copy_back_to_front` run should therefore answer exactly what the explicit back-to-front blit changes on the sampled cells/bands before the remaining post-swap corruption still appears.
      - The next investigation cut is now to inspect that new startup EGL contract log on a failing Wayland run and reconcile the realized `doublebuffer=0` report against the queried `EGL_RENDER_BUFFER`, `EGL_SWAP_BEHAVIOR`, `EGL_SURFACE_TYPE`, and preserved-swap support.
      - Later raw `wiki_life` captures materially ruled the earlier generation-handoff theory down: generation lineage across session/workspace poll, frame snapshot, widget prepare/plan, and retirement is coherent enough that it no longer looks like the primary seam.
      - The live seam is now narrower and backend-owned: `view_cache_publish_final` can emit a partial-dirty generation `N`, then a clean generation `N+1` before widget capture, and `capturePresentation()` then sees only `N+1 dirty=none`, so widget planning correctly does no texture upload while the texture is still stale.
      - The current contract fix is therefore explicit: clean publication must not overwrite an unpresented dirty publication. `view_cache` now preserves pending dirty metadata onto the newer clean cache, and it conservatively promotes to full damage when the pending dirty cache depended on viewport-shift reuse.
      - Session coverage now locks the minimal observed shape too: a dirty publication followed by a newer clean publication without presentation ack must leave the latest render cache dirty (`test "clean publication does not overwrite unpresented dirty publication"`).
      - A fresh raw repro showed that this still is not the whole seam: the disappearing dirty work is first being published on the already-presented generation, then a later clean `N+1` cache replaces it, so the preserved-pending-damage rule never fires on that lane.
      - The active question is now publication entrypoint ownership: which caller is issuing same-generation dirty `updateViewCacheNoLock(...)` work before the outer generation-bump path runs?
      - Debugging support is now sharper for that question too: `terminal.generation_handoff` carries `source=...` tags on `view_cache_clean_advance`, `view_cache_publish`, `view_cache_publish_final`, and `view_cache_preserve_pending_damage`, plus a dedicated `stage=view_cache_same_generation_dirty` log.
      - That source-tagged repro now identified the active bad caller: `setSyncUpdatesLocked` was republishing dirty cache state inline on the already-presented generation.
      - The current fix is explicit: sync-update toggles no longer republish on the presented generation when the published cache is clean; they only advance generation and republish when there is already unpresented or dirty published state to carry forward.
      - Session coverage now locks that DEC 2026 lane too: `test "setSyncUpdates enable does not publish dirty screen state on presented generation"`.
      - That validation is now complete: `wiki_life` is fixed, but the older scrolling lane survives.
      - The latest raw scrolling capture says the surviving lane is not the same backend publication seam: `capturePresentation()` still sees `dirty=partial`, widget planning still chooses `plan_partial=1`, and presented-generation ack still retires those generations cleanly.
      - That validation is now complete: the live narrow-row defect is not present in the backbuffer before swap; it appears across swap/present.
      - The next root-cause / validation step should therefore stay focused on present-side behavior while keeping logging minimal enough not to smooth the bug away. The current suspicion-driven `target_sample` path is the intended low-perturbation probe for that work.
      - Overlay attribution is still available for follow-up cursor/selection debugging, but it now uses `terminal.ui.overlay_probe` instead of the active present-side `terminal.ui.target_sample` tag.
      - Debugging support is now better on that lane too: `Ctrl+Shift+F12` dumps the terminal widget's current visible viewport cache to `zide_terminal_view_dump.txt` in the process cwd. It is intentionally fixed-width ASCII with row numbers, a column ruler, `resolved_bg_runs` per visible row, and a `non_ascii_cells` footer so visible deformation and stale highlight rows can be mapped directly to `target_sample` row/col probes, including alt-screen content.
      - One caution from the current logs: broad same-row `parser.ascii_run` unions are still real upstream and still matter for responsiveness, but they no longer explain the remaining visible corruption by themselves. Backend/publication and background-run seams should not be the default target for the next pass unless new evidence contradicts the current renderer-side conclusion.
      - The replay harness fixture metadata cap is now `1 MiB` instead of `64 KiB`, so heavier real-config redraw fixtures can be loaded directly without treating fixture JSON size itself as a blocker for this lane.
      - Code read after that fixture narrowed the real target further: `view_cache` row spans were already narrow, and the aggregate `damage` box was mostly a coarse union summary; the suspicious widening point was UI-side partial draw planning in `src/ui/widgets/terminal_widget_draw_texture.zig`
      - That made `redraw_nvim_guides_cursorcolumn_move.*` the honest optimization target, but on the publication/render-consumption boundary rather than in the basic row-local dirty-span detection itself
      - UI-side narrowing is now tighter there too: both non-blink partial redraw rows and blink-only partial redraw rows now stay row-local instead of widening to adjacent rows by default
      - The last stale renderer-side carryover is now closed too: clean blink-only frames no longer reuse old `viewport_shift_rows` / `viewport_shift_exposed_only` metadata, so a prior viewport-shift frame no longer forces a later blink-only redraw into an `8x40` full-viewport partial plan
      - Important scope note: the replay fixture's observed `damage` box does not change from that cut, because replay authority currently reflects backend publication, not renderer-side partial-plan expansion; this change is locked by the new unit tests around `markPartialPlanRow(...)` vs `markPartialPlanRows(...)`
      - UI-side partial-plan tests now also lock the sharper result explicitly: the aggregate union bounds for the `cursorcolumn` case remain `rows 0..10 cols 4..33`, but rows `0..7` no longer inherit rows `8..10`'s wider columns, which is the actual renderer-side improvement we were after
      - Live redraw logging now also exposes both aggregate widget partial-plan fields (`plan_rows`, `plan_row_span`, `plan_col_span`) and row-local `spans=...`, with `tools/terminal_summarize_redraw_log.py` added as the cheap readback path for the next manual `nvim` repro; it now parses the key perf fields directly, can emit JSON for scripted comparison, has an `--interesting` mode that skips common lifecycle churn (`init`, `alt_enter`, `alt_exit`), can show the last several interesting frames via `--count`, uses the true current-frame `current_reason` instead of stale `full_dirty_reason`, and pairs redraw records to the same perf frame instead of mixing stale redraw lines
      - Logging control is now finer-grained too: redraw lifecycle frames now emit on `terminal.ui.lifecycle`, while `.zide.lua` can use per-tag sink-level overrides (`logs.file_levels` / `logs.console_levels`) to keep redraw tags visible without pulling unrelated debug/info tags into the file sink
      - The automated backend loop is now also trustworthy for redraw work: `terminal_run_backend_repro.py` respects the requested `--cwd`, fixed `--rows/--cols` survive startup plus deferred resize, and a short-line scripted `nvim -u NONE -N '+set number relativenumber cursorcolumn'` control case stays on narrow one-row gutter updates; broad long-file frames should now be treated as content-shape candidates first, not tool drift
      - The redraw summarizer and backend wrapper can now also select the broadest steady-state frame directly (`latest`, `max-damage-area`, `max-plan-area`, `max-dirty-rows`), which removes another manual step when a real `nvim` run mixes many tiny cursor frames with a few broad redraws
      - Live widget perf logs now also report exact partial-plan area (`plan_cells`) and the coarse union area (`plan_union_cells`), so broad TUI frames like `rain` can be distinguished as sparse-vs-dense redraws instead of only looking like a full-width blowout
      - Live widget perf logs now also split texture update time into `texture_bg_ms`, `texture_glyph_ms`, and `texture_kitty_ms`, so the redraw lane can see whether broad partial frames are dominated by row background work, glyph draw work, or kitty/image work before another behavior change
      - First renderer-cost cleanup on that measurement lane is now landed too: terminal row shaping reuses one renderer-owned Harfbuzz buffer instead of allocating and destroying a buffer per shaping span, so dense redraw probes no longer pay allocator churn inside the glyph hot path
      - Dense renderer cost moved forward again after that: attr-driven shaping fragmentation was removed from the live terminal path, simple width-1 non-special spans now bypass Harfbuzz entirely, and dense `rain` dropped from ~500-650 shaping spans to ~33 with `shape_ms` effectively at `0.00`
      - The next dense renderer hotspot was then tightened at the fill/submission layer: row backgrounds now coalesce by resolved background-color runs, and glyph-cache quad submission now writes directly into reserved vertex capacity instead of building a temporary six-vertex array per glyph; current dense `rain` runs are showing `texture_bg_ms` around `0.03-0.06ms`, so the remaining renderer-side hotspot is direct glyph draw submission rather than shaping or background fill
      - Dense direct-glyph cost then moved sharply too: the direct terminal path now skips plain spaces, uses a cached primary-ASCII glyph-id fast lookup, and routes that common ASCII lane through a stricter simple-geometry draw path instead of the general symbol/overflow logic. Current dense `rain` runs are now down around `texture_glyph_ms ~ 0.18-0.29`, `direct_lookup_ms ~ 0.01-0.02`, and `direct_draw_ms ~ 0.06-0.10`, so the old dense direct-submission hotspot is largely collapsed for the common ASCII workload
      - Renderer cost work is now explicitly split by workload profile instead of being treated as one generic glyph problem, but the current evidence has also narrowed the remaining dashboard hotspot: after the shaping/direct-path cuts, both `btop` and `gping` now bottleneck in the box-heavy special-glyph lane rather than in Harfbuzz or ordinary shaped text
      - The first `gping`-specific renderer cut is now landed too: width-1 special-only runs can bypass Harfbuzz and go straight to the existing special/box submission paths. That dropped broad `gping` frames from roughly `texture_glyph_ms ~ 0.68`, `shape_ms ~ 0.38`, `submit_ms ~ 0.10` down to about `texture_glyph_ms ~ 0.41`, `shape_ms ~ 0.21`, `submit_ms ~ 0.06`, and later measurement brought the broad `gping` max-plan frames down around `texture_glyph_ms ~ 0.28-0.30`
      - That same special-only direct path now also changed the `btop` picture materially: broad `btop` frames no longer spend measurable time in Harfbuzz or ordinary shaped-text submission, and the later quad-write cut in `glyph_cache.addQuad(...)` pushed the broad `btop` dashboard lane down into roughly `texture_glyph_ms ~ 0.75-1.09`
      - The current live counters now separate box-sprite submit, box-rect fallback submit, and sprite lookup. That measurement shows the remaining dashboard hotspot is box-sprite work specifically; box-rect fallback is minor, and both the analytic-box reroute experiment and the one-entry sprite-cache experiment were reverted because they did not produce a clear net win on the heavy `btop` path
      - Live perf logs now also expose `sprite_stats=hits/misses/creates/lookup_ms`, which made the remaining dashboard lane much easier to read: recent broad `gping` frames are around `sprite_stats=167/5/5/0.03`, while broad `btop` frames are around `sprite_stats=472/464/1/0.15`
      - The latest renderer cut in that box-sprite lane is now landed too: repeated same-row box sprite shapes reuse the last hit-path instead of rebuilding the full access path every time. That pushed the heavy `btop` dashboard case down into roughly `texture_glyph_ms ~ 0.77-0.84`, so the remaining work should stay focused on box-sprite hit-path overhead rather than sprite creation, box-rect fallback, or Harfbuzz
      - Backend publication/refinement is now stricter about unpresented bases: row-hash narrowing only applies when the active cache generation is actually presented, while unpresented partial caches may only contribute carried partial truth; that contract is now locked both by session coverage and replay authority in `redraw_unpresented_partial_rewrite.*`
      - `view_cache_plan` now also locks the same conservatism for scroll-shift publication: live scroll shifts are allowed for presented live-bottom history growth, but the same shape is forbidden against an unpresented base
      - Current base-damage conclusion is now explicit too: `visible_history_changed && view.dirty == .none` still falls back to full-viewport partial damage on purpose because the backend currently stops trusting row-local dirty arrays when visible-history context changes; that fallback should only narrow after row-local history-change truth exists earlier in the pipeline
      - Code read now pins down the missing backend truth source for that fallback: `TerminalHistory` currently exposes whole-view invalidation only (`scrollback_generation` / `view_generation` plus rebuilt `view_cache` rows), but no row-local dirty-span authority for visible-history changes, so `view_cache.zig` cannot safely narrow history-driven publication yet without a new history/view diff contract below it
      - The next safe narrowing cut is now landed without giving `TerminalHistory` or the UI redraw-policy ownership: when visible history changes but `view.dirty == .none`, the backend now compares the newly projected cells against the last presented cache and publishes exact row-local damage from that projected diff. The same path is explicitly forbidden against an unpresented base, and session tests now lock both the narrow presented-base case and the conservative unpresented-base fallback
      - Replay harness coverage is now landed cleanly for that same seam too: the harness can now seed baseline scrollback/grid state, set scroll offsets directly, and mutate scrollback cells directly; placeholder harness-api `.vt` newlines are now ignored as non-meaningful input; and scrollback-cell test mutations now advance publication generation before republishing so replay models real unpresented updates. Both visible-history authorities now pass in replay as `redraw_visible_history_projected_diff.*` and `redraw_visible_history_projected_diff_unpresented.*`
      - Selection-driven publication now also follows the same conservatism rule: selection dirty expansion only narrows against a presented base, repeated unpresented selection state is locked in session coverage, and selection mutations now advance `output_generation` so visible selection changes participate in published-generation truth instead of relying only on `view_cache_pending`
      - Scrollback-view publication now follows that same published-generation rule too: scroll-offset changes advance `output_generation` before republishing, so a newer scrolled view no longer reuses the old generation and `acknowledgePresentedGeneration(old_generation)` can no longer retire newer scrollback-view damage by mistake; session coverage now locks both generation advance and old-ack rejection for that path, and replay authority now also exists in `redraw_scrollback_view_generation.*` for the generation-advance side of that contract
      - Presented-generation retirement is now stricter too: `notePresentedGeneration(...)` is monotonic, so stale or out-of-order presentation ack can no longer move `presented_generation` backward even when the ack is rejected for current-damage retirement; session coverage now locks both the general no-regression rule and the stale-old-ack path after newer normal publication
      - Large-scrollback flood measurement now also has an honest backend split: a `cat fixtures/editor/stress/large_highlight_sample.zig` terminal repro with `history=10000` showed the bad frame was not renderer work, view-cache rebuild, or render-cache copy. The draw side was spending ~`95-182ms` almost entirely waiting on `state_mutex`, while the parser thread was holding that lock in repeated flood batches for parse plus publication. A first fairness cut is now landed: once `output_pending` is already true, the parse thread caps backlog processing to much smaller batches (`~4KiB`, `~1ms` window on the measured path), which moved the same large-scrollback repro down from roughly `draw_ms ~ 97-184` and `lock_wait_ms ~ 96-182` to about `draw_ms ~ 64.5` / `lock_wait_ms ~ 63`. The remaining hotspot is still terminal-side parse/publish lock ownership, not glyph rendering
      - Flood cadence is now also better locked as a real architecture question rather than another local tweak hunt. The styled `bat --paging=never --color=always ...; sleep 10` workload clearly improved after backlog publish coalescing, while the remaining plain `/usr/bin/cat ...; sleep 10` startup stall shows a front-loaded ingress burst (`terminal.io` quickly reached multi-megabyte queued input before parse caught up). A naive read-thread sleep/yield cap was tested and reverted because it regressed the styled path back into hundreds of tiny publishes. Reference bias from Alacritty, Ghostty, Kitty, and Foot is now aligned: they all favor aggressive/non-blocking ingress plus bounded parse/render wake policy rather than reader-thread sleeping. The next flood target should therefore be startup-only publish/presentation cadence or bounded parser-visible progress, not raw ingress throttling

