version: 1

meta:
  status_note:
    - The initial VT/render rewrite phase is no longer the primary active lane.
    - The current phase is post-rewrite bug hunting, compatibility hardening,
      and native/FFI convergence on top of the rewritten architecture.
    - Recently closed native compatibility bugs:
      - Codex inline resume history now retires into real primary scrollback on
        the rewritten path.
      - Zig `std.Progress` redraw now rewrites in place correctly because
        reverse-index (`ESC M`) dispatch no longer falls through a dead control
        path.
      - Replay authority for that Zig lane now exists as
        `fixtures/terminal/zig_progress_sync_rewrite_bottom_edge.*`, so the
        synchronized bottom-edge redraw pattern is locked beyond unit tests.

items:
  - id: VTCORE-00
    title: Define the terminal core boundary
    status: done
    priority: high
    notes:
      - Introduce a clear engine-owned center below TerminalSession
      - Engine owns terminal emulation state and protocol behavior
      - PTY, workspace, UI, and FFI must become consumers around that core
      - Concrete boundary and target types are now defined in app_architecture/terminal/VT_CORE_DESIGN.md

  - id: VTCORE-01
    title: Separate VT core from host session/runtime
    status: in_progress
    priority: high
    notes:
      - Shrink TerminalSession into a host/runtime wrapper
      - Remove parser, screen, history, protocol, and terminal-mode gravity from TerminalSession
      - Preserve behavior while moving ownership, not by adding compatibility sludge
      - First code-cut intent: introduce an internal TerminalCore while keeping PTY-backed desktop behavior unchanged
      - First code cut landed: engine-owned screen/history/parser/metadata/palette/kitty state now lives under src/terminal/core/terminal_core.zig, with TerminalSession wrapping it while PTY/runtime/threading stay session-owned
      - Session-construction assembly now also lives under src/terminal/core/session_runtime.zig, so TerminalSession init is moving toward a host-wrapper creation facade instead of owning the full zeroed-field/runtime setup block inline
      - Replay/test-only debug helpers now also live under src/terminal/core/terminal_session_debug.zig, so terminal_session.zig no longer embeds that non-runtime surface inline
      - Dead local root-session helper residue (unused screen-mode/hash/inactive-screen helpers) is now removed, and the remaining test-facing view-cache shim delegates through src/terminal/core/session_rendering.zig instead of owning view-cache plumbing inline
      - Remaining scroll-refresh and OSC clipboard copy wrappers now also delegate through src/terminal/core/session_rendering.zig and src/terminal/core/session_queries.zig, reducing more root-session orchestration residue without changing behavior
      - Backlog hinting now also routes through src/terminal/core/session_runtime.zig instead of session_rendering.zig, keeping transport ingress pressure out of the render/publication owner
      - Host-facing metadata, liveness, and close-confirm signal queries now also route through src/terminal/core/session_host_queries.zig, leaving session_queries.zig focused on terminal-data query surfaces
      - Workspace/runtime input-pressure hinting now also routes through src/terminal/core/session_runtime.zig instead of staying inline in terminal_session.zig
      - Stale private root-session shims for SGR application and key-mode flag reads are now removed, leaving fewer dead internal forwarding surfaces in terminal_session.zig

  - id: VTCORE-02
    title: Make FFI a first-class core interface
    status: in_progress
    priority: high
    notes:
      - FFI must target the new terminal core and stable snapshot contracts
      - Do not keep FFI structurally tied to desktop session/workspace design
      - Support non-UI consumers such as Flutter hosts cleanly
      - Design direction now distinguishes core-facing operations from optional PTY host/runtime operations
      - First code slice landed: shared terminal FFI ABI/state/helpers now live in src/terminal/ffi/shared.zig, and PTY-host operations now live in src/terminal/ffi/host_api.zig while bridge.zig acts as a thinner facade over host-facing and core-facing groups
      - Second code slice landed: the remaining core-facing bridge operations now live in src/terminal/ffi/core_api.zig, leaving bridge.zig as a true facade over core_api + host_api without changing the exported C ABI

  - id: VTCORE-03
    title: Introduce transport-agnostic host integration
    status: in_progress
    priority: high
    notes:
      - PTY must become one transport implementation, not the architectural center
      - Support externally supplied byte streams/write sinks for SSH/mobile/embed hosts
      - Resize and lifecycle delivery must work without host-owned PTY assumptions
      - Target type and ownership rules are now defined in app_architecture/terminal/VT_CORE_DESIGN.md
      - First internal transport contract landed in src/terminal/core/terminal_transport.zig for PTY lifecycle, resize, aliveness, exit polling, and foreground-process metadata
      - Writer path now also goes through the transport boundary: the old raw Pty writer guard was replaced by a transport-owned Writer contract used by session_input and existing protocol write callers
      - Read/poll byte pumps now also go through the transport boundary: io_threads.zig and pty_io.zig consume transport.read(...) and transport.waitForData(...) instead of reaching into raw Pty ownership directly
      - PTY attach/detach setup now also goes through terminal_transport helpers, including the replay harness reply-capture path
      - Low-risk transport existence gates now also route through terminal_transport helpers, so session_input/session_interaction no longer peek at self.pty directly just to answer "is there a writable transport?"
      - OSC 5522 reply/status writes now also go through the transport writer guard instead of direct self.pty access inside protocol code
      - First non-PTY transport shape is now landed internally: terminal_transport.zig has an in-memory external transport, FFI-created sessions attach it by default, and feed_output now goes through transport enqueue + session poll instead of bypassing transport ownership
      - External transport is now also covered in terminal core tests, including enqueue/poll behavior and explicit alive/closed metadata semantics
      - Replay harness now also consumes external transport for normal VT fixtures, leaving PTY attachment only for reply-capture cases that need a writable sink
      - Higher-level callers now use session-owned external transport wrapper methods instead of directly assembling that path through terminal_transport
      - Replay reply-capture PTY attachment now also goes through session-owned wrapper methods instead of raw terminal_transport attach/detach calls
      - Higher-level session assembly paths no longer need raw terminal_transport attach/detach helpers for PTY vs external transport selection
      - Terminal FFI now exposes close_input for no-PTY hosts, and the derived event stream now emits alive_changed when external input is explicitly closed
      - Terminal Python mock-service smoke now validates close_input -> alive_changed -> metadata.alive=false for the external transport path
      - The derived event stream now also emits redraw_ready when snapshot generation advances, giving embedded hosts a minimal wake signal for snapshot pulls without introducing a second damage model
      - Host-side resize now also emits redraw_ready through the same derived event path, so PTY-backed foreign hosts and no-PTY embedded hosts share the same basic wake contract after visible size changes
      - Reference-repo read confirms the same general model: Ghostty wakes after stream/mailbox publication and Alacritty requests redraw after actual visible-state changes, so start() is intentionally left poll-driven rather than gaining a synthetic wake event
      - Native PTY FFI smoke now also requires redraw_ready on poll-driven visible updates, so the wake contract is locked on both the no-PTY and PTY host paths
      - The input-mode query/toggle wrapper surface now routes through session_interaction.zig instead of living inline in terminal_session.zig, shaving another non-runtime API cluster off the root session facade

  - id: VTCORE-04
    title: Move protocol execution onto core/model contracts
    status: in_progress
    priority: high
    notes:
      - CSI/OSC/DCS/APC should execute against terminal core contracts, not session service facades
      - Preserve recent typed seam work and continue replacing session-centric execution targets
      - First slice landed: pure engine-side screen/palette/query protocol helpers moved behind src/terminal/core/terminal_core_protocol.zig, leaving session_protocol with the still session-coupled parts
      - Second slice landed: parser/control/CSI/OSC/DCS/APC dispatch entry helpers now live behind src/terminal/core/terminal_core_dispatch.zig, while byte feed/publication stays in session_protocol because locking and generation publication are still session-owned
      - Third slice landed: parser byte feed itself now runs through src/terminal/core/terminal_core_feed.zig, with session_protocol initially retaining the lock/generation/view-cache publication wrapper
      - Fourth slice landed: saved-cursor restore and alt-screen core state transitions now live behind src/terminal/core/terminal_core_modes.zig, leaving session_protocol with only the remaining session-owned side effects around those transitions
      - Fifth slice landed: RIS/reset core mutation now lives behind src/terminal/core/terminal_core_reset.zig, leaving session_protocol with only the session-owned input snapshot republish step
      - Sixth slice landed: hyperlink allocation, kitty image clearing, and scroll-region mutation helpers now also live behind src/terminal/core/terminal_core_protocol.zig, leaving session_protocol with publication/selection wrappers instead of more pure core-state mutation entrypoints
      - Seventh slice landed: parser feed now returns an explicit core_feed.FeedResult publication contract, and session-owned generation/view-cache publication now runs through src/terminal/core/session_rendering.zig instead of a hidden inline helper in session_protocol
      - Eighth slice landed: the remaining session-owned alt-screen/reset side effects now live under src/terminal/core/session_mode_effects.zig, leaving session_protocol closer to a dispatch facade over core helpers plus explicit session effect owners
      - Ninth slice landed: alt-screen exit presentation timing now also routes through src/terminal/core/session_rendering.zig, so session_mode_effects no longer mutates render/publication timing state inline

  - id: VTCORE-05
    title: Simplify snapshot and render publication
    status: in_progress
    priority: medium
    notes:
      - Keep renderer-agnostic snapshot/damage contracts
      - Reduce session/cache choreography where it is only compensating for session-centered ownership
      - Preserve correctness for widget and FFI render consumers
      - Contract target is now defined in app_architecture/terminal/RENDER_PUBLICATION_CONTRACT.md
      - Start this lane only after the current VT core/session/transport split stops moving fundamental backend ownership every patch
      - First prep slice landed: pure publication/diff helpers now live under src/terminal/core/view_cache_publication.zig, so src/terminal/core/view_cache.zig is beginning to separate projection from publication planning without changing behavior
      - Second prep slice landed: selection projection now lives under src/terminal/core/view_cache_selection.zig, so view_cache.zig no longer owns both selection projection and publication/diff helpers inline
      - Third prep slice landed: viewport-shift/full-vs-partial publication planning now lives under src/terminal/core/view_cache_plan.zig, so view_cache.zig no longer owns those publication decisions inline
      - Fourth prep slice landed: row-hash refinement now lives under src/terminal/core/view_cache_refinement.zig, isolating that optional publication optimization from the base view-cache update flow
      - Fifth prep slice landed: selection-change dirty expansion now lives under src/terminal/core/view_cache_selection_dirty.zig, so selection-driven damage widening is no longer embedded in the base view-cache update path
      - Sixth prep slice landed: base dirty/damage assignment plus partial-damage widening now lives under src/terminal/core/view_cache_damage.zig, so the remaining view_cache.zig path is closer to projection/orchestration than publication policy
      - Seventh prep slice landed: presented-generation acknowledgement and damage retirement now lives under src/terminal/core/session_rendering_retirement.zig, so session_rendering.zig no longer mixes capture/feedback with retirement policy inline
      - Eighth prep slice landed: replay_harness now supports a presented baseline phase plus explicit damage assertions, and the first replay-backed redraw-contract fixtures now lock narrow partial publication for gutter rewrites and indent-guide rewrites after a baseline publish
      - Ninth prep slice landed: replay-backed redraw coverage now also locks dense clear+repaint loops, keeping ED2 plus full visible repaint on the partial path with full-width viewport damage after a presented baseline
      - Tenth prep slice landed: replay-backed redraw coverage now also locks live-bottom viewport-shift publication for full-region scroll after a presented baseline
      - Eleventh prep slice landed: replay-backed redraw coverage now also locks a multi-row narrow rewrite case that currently widens to full-row damage across the viewport, giving the later invalidation lane an explicit regression target instead of a hand-wavy nvim-style complaint
      - First real behavior change landed: live-bottom full-region scroll now publishes as exposed-row viewport shift with exposed-row damage only, and the replay fixture was converted to a pure harness-owned scroll action so the contract is not polluted by stray VT input
      - Twelfth replay contract landed: repeated line-number/sign-column style leading-column churn now has an explicit fixture, giving the invalidation lane concrete gutter authority instead of a hand-wavy complaint
      - Thirteenth replay contract landed: one-column line-number churn now also has a corrected harness-owned fixture, and the adjacent two-column sign-column churn case is now also narrow at cols `0..1` rather than the older broader path
      - Fourteenth VTCORE-05 behavior change landed: unpublished partial refinement now preserves prior dirty rows without dragging forward stale broad column spans, so both one-column line-number churn and single-packet two-column sign-column churn stay on narrow leading-column damage paths
      - Fifteenth replay-contract refinement landed: uniform multi-packet two-column gutter churn also stays narrow, so simple packet accumulation is no longer the right gutter target
      - Sixteenth VTCORE-05 behavior change landed: unpublished partial refinement now restores carried-over row-local column spans in pre-widen form, so previously unpublished rows do not get widened again on every generation
      - That carry-over damage fix keeps one-column line-number churn, single-packet two-column sign-column churn, uniform multi-packet gutter churn, and mixed alternating line-number/sign-column churn all on narrow leading-column damage paths
      - Seventeenth replay contract landed: mixed gutter-plus-guide churn now has an explicit harness-api fixture, and after correcting the harness sidecar input it currently stays on the same narrow leading-column path as the other gutter churn cases
      - Eighteenth replay contract landed: repeated guide updates on already gutter-dirty rows also now have an explicit harness-api fixture, and after correcting the harness sidecar input it currently stays narrow too instead of blowing out to full-viewport damage
      - Guide-mixed replay fixtures are now rebaselined on the honest no-scroll harness path, so they are no longer a valid authority for the older full-width repeat-guide bug hunt
      - Historical note: the focused repeat-guide regressions were useful to isolate publication/refinement behavior, but they are no longer the active optimization authority now that the corrected harness-api guide fixtures are narrow again on the honest no-scroll path
      - Replay-fixture correction landed: harness-api gutter/guide fixtures no longer carry a stray placeholder newline through their `.vt` sidecar files, and the affected replay goldens/damage expectations are now rebaselined on the honest no-scroll path
      - Current rerank: the replay-backed gutter/guide set is now largely narrow and stable again, so the next redraw/publication target should come from a new real reproducer (for example an actual `nvim` gutter/guide trace or a denser mixed rewrite pattern) rather than the corrected guide fixtures
      - Nvim-shaped redraw authority landed: `redraw_nvim_overlay_status_update.*` now locks a simple statusline cursor-position update derived from the existing `nvim_overlay` sample
      - First statusline narrowing change landed too: unconditional per-row `-1/+1` partial-damage widening was removed from view-cache publication, so that `nvim`-shaped status update now publishes on the exact edited span at row 5 cols 7..9 instead of the older row 5 cols 6..10 overshoot
      - Adjacent `nvim`-style overlay authority landed too: `redraw_nvim_overlay_mode_status_update.*` locks combined mode-text plus cursor-position churn on the statusline row, and the current backend already publishes that case exactly at row 5 cols 0..9
      - A two-row `nvim`-style body-plus-status authority landed too: `redraw_nvim_overlay_body_status_update.*` locks command-line text growth plus statusline churn in one frame, and the current backend already keeps that case narrow at rows 4..5 cols 0..9 without dragging in the untouched `:wq` row
      - A real `gping` refresh authority landed too: `redraw_gping_refresh.*` locks a full-clear metric refresh on the honest harness path, and the current backend still publishes it as full-viewport damage at rows 0..5 cols 0..19, which matches the existing clear+repaint contract rather than exposing a new narrowable overlay bug
      - Two more real dashboard-style partial-refresh authorities landed too: `redraw_gping_metric_update.*` and `redraw_gping_metric_width_change.*` lock non-clear metric-only row updates, including width-changing numbers, and the current backend already keeps both cases narrow on the exact touched metric spans at rows 2..3 cols 6..7 and rows 2..3 cols 6..10 respectively
      - Current rerank after the `nvim` overlay and `gping` refresh probes: the earlier in-tree sample family was mostly explained, and the next target now has a fresh real single-session `nvim` gutter authority in `redraw_nvim_gutter_single_session.*`
      - Capture workflow is now explicit in `app_architecture/terminal/REDRAW_CAPTURE_WORKFLOW.md`, with `tools/terminal_capture_pty.py` recording raw PTY output, `tools/terminal_make_redraw_fixture.py` generating harness-api fixture skeletons from real baseline/update byte captures, and `tools/terminal_capture_redraw_fixture.py` now smoke-tested as the preferred staged baseline/update wrapper so the next redraw target can be locked quickly once a fresh repro is observed
      - Replay runner now also supports `--print-observed` and `--observed-file <path>`, so fresh redraw captures can record the current backend dirty/damage contract directly from `zig build test-terminal-replay` instead of hand-transcribing it from logs
      - Replay runner now also supports `--observe-only`, so fresh fixture authoring can record current backend dirty/damage state without first making placeholder fixture assertions pass
      - Fixture generation can now also consume that observed redraw JSON directly, and the staged capture wrapper can hydrate expected redraw fields automatically, so the next fresh `nvim`/TUI repro can move from PTY capture to replay authority with much less manual editing
      - The staged capture wrapper can now also update goldens and validate the new fixture immediately, so the next real redraw repro can be captured, hydrated, and checked in one supported workflow
      - Fixture generation and the staged wrapper can now also strip the shared baseline prefix from fresh update captures, which is important for real PTY-driven apps like `nvim` where a naive second session otherwise repeats the startup stream before the actual redraw delta
      - Fixture generation and the staged wrapper can now also strip a shared baseline suffix, which should make separate baseline/update PTY sessions more usable for apps like `nvim` that share both startup and quit-path terminal noise
      - `terminal_capture_pty.py` now also supports timed stdin steps and timed output checkpoints, which gives the redraw lane a real single-session capture path for apps like `nvim` where separate baseline/update sessions still carry too much startup noise
      - Timed checkpoints now also support a quiet window before flush, so single-session captures are less likely to cut through an active repaint burst and produce misleading partial deltas
      - `terminal_capture_pty.py` now also supports richer staged stdin scripts (`file`, `text`, `hex`), and the staged redraw wrapper can pass those through per phase, which should make it easier to drive longer-lived `nvim` probes without piling up many tiny temp input files
      - The staged redraw wrapper now also supports a true single-session mode with baseline/update checkpoints over one long-lived PTY run, which is the preferred path for real `nvim` movement probes because it avoids restart noise entirely
      - PTY capture now also honors explicit rows/cols, so fresh redraw authorities can trust that the capture viewport matches the replay fixture viewport instead of inheriting host terminal size accidentally
      - First real single-session `nvim` gutter authority is now landed as `redraw_nvim_gutter_single_session.*`, captured from one long-lived PTY session with a baseline checkpoint, a later movement step, and a later redraw checkpoint
      - A cleaner no-wrap single-session `nvim` gutter movement authority is now also landed as `redraw_nvim_gutter_clean_move_down.*`, captured from one long-lived PTY session with a later quiet baseline and a later downward movement step
      - Current observed contract for `redraw_nvim_gutter_clean_move_down.*` is suspicious enough to be the next real redraw target: partial dirty with full-width bottom-row damage plus `viewport_shift_rows=1` / `exposed_only=true` after a small downward gutter move
      - Replay observed-state output now also exposes `history_len`, `total_lines`, and `scroll_offset`; for `redraw_nvim_gutter_clean_move_down.*` the current observed values are `history_len=46`, `total_lines=58`, `scroll_offset=0`, which should make the next shift-classification investigation concrete instead of guesswork
      - Direct plan-level regression now also locks that same classification in `view_cache_plan.zig`: with the observed `nvim` values (`history_len=46`, `active_history_len=45`, `total_lines=58`, `active_total_lines=57`, `rows=12`, `scroll_offset=0`) the current backend deliberately classifies the move as a live scroll shift, so the next step is deciding whether that rule is semantically right or too permissive
      - Adjacent comparator authority is now also landed as `redraw_nvim_gutter_single_j.*`; that capture stays in alt-screen with `history_len=0`, `total_lines=12`, `scroll_offset=0`, and publishes narrow damage at rows `0..9`, cols `0..5` with no viewport shift
      - Current conclusion: not every `nvim` gutter move is being misclassified as a scroll shift; the suspicious `clean_move_down` authority needs to be compared against the narrower `single_j` authority before changing `view_cache_plan`
      - Follow-up staged recapture of the same `5j` movement now shows the real pattern: with an earlier update checkpoint, the delta stays in alt-screen and emits explicit gutter rewrites similar to `redraw_nvim_gutter_single_j.*`; this strongly suggests `redraw_nvim_gutter_clean_move_down.*` is a late-cut capture artifact, not the right backend target
      - A better real gutter target is now landed as `redraw_nvim_gutter_width_shift.*`: it stays in alt-screen with `history_len=0`, `total_lines=12`, `scroll_offset=0`, publishes no viewport shift, and widens naturally to rows `0..9`, cols `2..8` around the `99/100` width-transition region
      - Replay observed output now also exposes per-row dirty spans, which makes the width-transition case less suspicious than the aggregate box alone: most rows only touch col `2`, and the wider spans line up with rows the captured PTY delta actually rewrites more broadly
      - Current redraw conclusion after that row-span inspection: `redraw_nvim_gutter_width_shift.*` is not a clean one-box publication overshoot target either, so the next meaningful optimization target still needs a fresher real non-clear reproducer
      - Capture tooling now also guards against the two failure modes discovered during mixed `nvim` single-session probing: if shared prefix/suffix stripping would erase an update chunk completely, or if a raw staged update is empty, fixture generation aborts instead of writing a fake no-op redraw authority
      - Mixed single-session `nvim` authority now also exists as `redraw_nvim_guides_cursorline_move.*`; it survives the new capture guards, but its broad rows appear to be dominated by real `:set cursorline` command-line churn plus line-highlight/statusline changes, so it should be treated as evidence of a legitimately broad sequence rather than the next narrowable publication bug
      - Cleaner startup-configured mixed `nvim` authority now also exists as `redraw_nvim_guides_clean_move.*`; this one avoids command-line mode churn and currently publishes rows `0..10`, cols `4..49`, with row spans showing gutter-only churn on rows `0..7`, full-width active-row churn on rows `8..9`, and a statusline cursor box at row `10`
      - Cleaner startup-configured cursorcolumn-only authority now also exists as `redraw_nvim_guides_cursorcolumn_move.*`; this is the sharpest mixed redraw evidence so far because its row spans stay narrow (`rows 0..7 col 6`, `rows 8..9 cols 4..6`, `row 10 col 33`) while the aggregate damage box still widens to `rows 0..10 cols 4..33`
      - A denser built-in `nvim` movement authority now also exists as `redraw_nvim_dynamic_builtin_probe.*`, captured from a single session with `number`, `relativenumber`, `signcolumn=yes:2`, `foldcolumn=2`, `cursorline`, `cursorcolumn`, `statuscolumn`, and a dynamic statusline enabled from startup. Its observed backend contract is broad (`rows 0..10 cols 0..59`), but it still preserves the distant statusline region explicitly (`row 10 col 34`) in the same non-shift frame.
      - That probe matters because it rules out one easy explanation: backend publication can already carry a secondary distant dynamic region when `nvim` emits it plainly. The missing invalidation bug reported against heavier user configs is therefore more likely to be an upstream dirty-row completeness problem for those exact dynamic surfaces than a generic inability to represent multi-region non-shift redraws.
      - Two real-config single-session probes are now also landed: `redraw_nvim_real_config_probe.*` and `redraw_nvim_real_config_symbols_probe.*`, both captured against the local plugin-heavy Neovim config (`lualine`, `Snacks.statuscolumn`, `dropbar`, diagnostics UI, etc.).
      - The first real-config probe (`redraw_nvim_real_config_probe.*`) already shows broad non-shift redraw with distant chrome preserved: rows `1..7` run out to col `99`, isolated far-right chrome lands on rows `0` and `8..12`, and the statusline cell still appears at row `15`, col `95`.
      - The symbol-aware real-config probe (`redraw_nvim_real_config_symbols_probe.*`) is broader again: simple cursor movement on a small Zig file rewrites almost the full viewport (`rows 0..15 cols 0..99`) while still preserving remote bottom-row statusline churn. That means at least one real plugin-heavy config path is not suffering from “secondary region dropped”; it is emitting genuinely broad body-plus-chrome redraws.
      - Current rerank after those real-config probes: the next invalidation target should not be another generic “mixed nvim redraw” theory. We now need a more specific reproducer for the user-reported failure shape where a distant dynamic surface is actually missed rather than simply redrawn broadly, likely involving one narrower dynamic source such as winbar/breadcrumbs, diagnostics overlays, or another plugin-owned virtual/text overlay that can change without whole-body churn.
      - The current real-config cursor-step ghosting lane is now narrower too: direct `TerminalGrid.markDirtyRange(...)` tracing shows broad rows are being unioned from multiple same-row requests, e.g. `row=25 request=54..147 was_dirty=1 prev=2..53 next=2..147` and `row=21 request=6..147 was_dirty=1 prev=2..5 next=2..147`. That matches the observed stale relative-number / active-line / notification ghosts much better than dirty-retirement or renderer carryover theories.
      - Dirty-retirement tracing also ruled out the earlier stale-generation theory for these broad body rows: the suspicious real-config frames are followed by `terminal.ui.dirty_retirement result=cleared`, not `result=skipped`.
      - Automation for that real-config lane now exists in `tools/terminal_capture_nvim_real_config_cursor_repro.py`. It can still script the full dashboard -> `:e src/app_logger.zig` -> LSP settle -> mid-buffer jump -> slow `j` steps flow against the local plugin-heavy config for live capture, but it now also has a replay-safe reduced mode (`--open-directly`, `16x100`, one aggregate late cursor-step update).
      - Replay authority now also exists for that reduced real-config cursor-step lane as `redraw_nvim_real_config_cursor_step_probe.*`, captured against `fixtures/terminal/assets/nvim_real_config_cursor_sample.zig` with the real local plugin-heavy config still active. That gives the ghosting investigation a repeatable single-session authority instead of only a manual visible-window repro.
      - A later-step tuned variant is now also checked in as `redraw_nvim_real_config_cursor_step_probe_tuned.*`. It uses the same real-config automation but waits longer before the first captured step and only keeps one later update chunk. It is still broad (`rows 0..15 cols 0..99`), but it trims a lot of startup/dashboard noise and is the better automated base for the next narrowing pass.
      - A heavier tuned real-config authority is now also checked in as `redraw_nvim_real_config_cursor_step_app_logger_tuned.*`, captured against the real `src/app_logger.zig` file instead of the smaller synthetic sample. Its current observed contract is `dirty=partial`, `damage rows 7..15 cols 0..99`, `viewport_shift_rows=9`, `viewport_shift_exposed_only=true`, which makes it the sharper automated base for the user-reported ghosting lane than the smaller reduced sample.
      - Follow-up scripted `app_logger.zig` captures now show that the attempted "pre-shift" authorities are still shift-path cases too. `redraw_nvim_real_config_cursor_step_app_logger_nonshift.*`, `redraw_nvim_real_config_cursor_step_app_logger_top_tmp.*`, and even a single-step `redraw_nvim_real_config_cursor_step_app_logger_pre_shift_single_tmp.*` from `20Gzt` all replay with `viewport_shift_rows=3`, `viewport_shift_exposed_only=true`.
      - Low-level grid attribution on that one-step `20Gzt` case now also identifies the upstream source directly: the broad rows are coming from `origin=scroll_region_up_full`, not from `view_cache` refinement, widget planning, or skipped dirty retirement.
      - A lower-level idle control now narrows that further: an open-direct `app_logger.zig` capture with `20G` and no cursor-step at all still replays as `dirty=partial`, `damage rows 14..15 cols 0..99`, `viewport_shift_rows=2`, `viewport_shift_exposed_only=true`, again with `origin=scroll_region_up_full`. So the current scripted `app_logger` lane is being dominated by async post-open shift churn, not only by the scripted `j`.
      - A longer-settle split now separates startup churn from real movement too. With `--lsp-settle-seconds 12 --baseline-settle-seconds 4`, the idle control goes empty, while movement classes split cleanly: `redraw_nvim_real_config_cursor_step_app_logger_long_settle_20G_l_tmp.*` stays narrow and non-shift (`row 15 cols 75..76`, `viewport_shift_rows=0`), but `redraw_nvim_real_config_cursor_step_app_logger_long_settle_5G_j_tmp.*` and `redraw_nvim_real_config_cursor_step_app_logger_long_settle_20G_k_tmp.*` still publish broad full-width shift-path updates (`rows 13..15` / `14..15`, `viewport_shift_exposed_only=true`).
