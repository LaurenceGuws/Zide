terminal_tabs_todo:
  scope:
    description: "Make `--mode terminal` viable for daily developer use with tab management, while keeping tab orchestration backend-owned and FFI-ready."
    notes:
      - "This work is about multi-session orchestration (new/switch/close/reorder), not VT parser/protocol expansion."
      - "TerminalSession should remain a single-session primitive; tabs belong in a backend workspace layer above TerminalSession."
      - "SDL tab chrome should be a thin projection of backend workspace state, not the source of truth."
      - "First target is terminal-only mode parity for real-world usage; IDE embedding and richer layouts come after stability."
    priorities:
      - "daily-driver stability in `--mode terminal`"
      - "explicit ownership/lifetime for tab and session objects"
      - "resource-aware polling/lifecycle for background tabs"
      - "FFI compatibility without leaking UI concerns"

  zide_integration:
    entry_points:
      - app_architecture/terminal/TERMINAL_API.md
      - app_architecture/terminal/FFI_BRIDGE_DESIGN.md
      - app_architecture/terminal/FFI_EVENT_INVENTORY.md
      - app_architecture/terminal/FFI_EVENT_ABI.md
      - app_architecture/terminal/ffi_bridge_todo.yaml
      - src/main.zig
      - src/terminal/core/terminal.zig
      - src/terminal/core/workspace.zig
      - src/terminal/core/terminal_session.zig
      - src/terminal_workspace_tests.zig
      - src/terminal/ffi/bridge.zig
      - src/terminal/ffi/c_api.zig
      - src/ui/widgets/tab_bar.zig
      - src/ui/widgets/terminal_widget.zig

  architecture_position:
    goals:
      - "Introduce a backend workspace layer that owns multiple TerminalSession instances and exposes stable tab ids."
      - "Keep terminal mode UX fast and predictable: open/close/switch tabs with minimal latency."
      - "Define tab metadata ownership (title/cwd/alive/exit status) so UI and FFI read the same source."
      - "Allow FFI hosts to adopt tabs through the same backend contract once mature."
    non_goals:
      - "Do not couple tab semantics to parser/model/protocol internals."
      - "Do not design pane/split tiling in this milestone."
      - "Do not freeze a new FFI ABI before smoke-host and ownership tests exist."
      - "Do not gate this track on renderer export or non-terminal app modes."
    constraints:
      - "Background tab handling must be resource-aware and explicit (polling cadence and backlog policy documented)."
      - "Replay harness and terminal regression authority remain mandatory when behavior changes."
      - "Exported FFI surfaces must keep explicit acquire/release ownership patterns."

  current_assessment:
    strengths:
      - "App state already stores terminal/session arrays and can host multiple sessions structurally."
      - "Tab UI component exists (`TabBar`) and can be reused for terminal mode shell projection."
      - "FFI baseline already has explicit ownership contracts for snapshots/events/strings."
    gaps:
      - "Terminal-mode tab lifecycle is now implemented at baseline, but still needs battle testing and close-policy hardening."
      - "Backend workspace abstraction exists, but FFI bridge is still single-session."
      - "FFI surface is single-session and has no multi-tab/workspace operations."
      - "No battle-test checklist yet for long-running terminal-only workflows."
    position:
      - "Lower-layer ownership is correct, with one caveat: tabs should live in a backend orchestration layer, not inside VT core/session internals."
      - "Build backend workspace first, then wire UI, then export to FFI."

  milestones:
    - name: "TABS-00 Scope lock and architecture contract"
      tasks:
        - id: TABS-00-01
          title: "Write terminal workspace contract doc (`TerminalWorkspace`/`TerminalTab` model, invariants, ownership)"
          status: done
          files_to_add:
            - app_architecture/terminal/TERMINAL_WORKSPACE.md
          files_to_edit:
            - app_architecture/terminal/TERMINAL_API.md
          notes:
            - "Define stable tab id semantics, active tab behavior, close policy, and metadata authority (title/cwd/exit/alive)."
            - "Keep boundary explicit: session primitive vs workspace orchestration."
        - id: TABS-00-02
          title: "Define resource policy for background tabs"
          status: done
          files_to_edit:
            - app_architecture/terminal/TERMINAL_WORKSPACE.md
            - app_architecture/terminal/terminal_tabs_todo.yaml
          notes:
            - "Document poll cadence goals, backlog handling, and limits for long-lived multi-tab usage."
            - "Capture expected behavior before implementation to avoid accidental per-tab busy loops."

    - name: "TABS-01 Backend workspace implementation"
      tasks:
        - id: TABS-01-01
          title: "Add backend workspace owner for multiple terminal sessions"
          status: done
          files_to_add:
            - src/terminal/core/workspace.zig
          files_to_edit:
            - src/terminal/core/terminal.zig
          notes:
            - "Core operations: create tab, close tab, activate tab, move tab, list tabs by stable id."
            - "TerminalSession remains unchanged as a per-tab engine."
        - id: TABS-01-02
          title: "Add workspace metadata synchronization path"
          status: done
          files_to_edit:
            - src/terminal/core/workspace.zig
            - src/terminal/core/terminal_session.zig
          notes:
            - "Track title/cwd/alive/exit status per tab without duplicating parser/protocol responsibilities."
        - id: TABS-01-03
          title: "Add deterministic workspace tests (create/switch/close/reorder/exit)"
          status: done
          files_to_add:
            - src/terminal_workspace_tests.zig
          files_to_edit:
            - build.zig
          notes:
            - "Use no-PTY or controlled PTY fixtures for deterministic lifecycle assertions."

    - name: "TABS-02 Terminal-only mode UX integration"
      tasks:
        - id: TABS-02-01
          title: "Render and drive terminal tabs in `--mode terminal`"
          status: done
          files_to_edit:
            - src/main.zig
            - src/ui/widgets/tab_bar.zig
          notes:
            - "Terminal mode should show tab affordances and route click/focus to active workspace tab."
            - "Do not duplicate backend state in UI."
            - "Renderer currently uses a shared terminal offscreen target; tab activation now explicitly invalidates the active widget texture cache to prevent stale cross-tab content."
            - "Theme-reload regression fix: existing terminal content now remaps default-colored fg/bg independently (not only when both matched old defaults), and scrollback cache is invalidated so kitty theme switches + config reload repaint current tabs immediately."
            - "Terminal-mode tab bar visibility is config-gated: `terminal.tab_bar.show_single_tab = false` hides the bar until at least 2 tabs exist; UI draw/input/layout follow the same gate."
        - id: TABS-02-02
          title: "Add terminal tab actions + default keybinds"
          status: done
          files_to_edit:
            - src/input/input_actions.zig
            - src/config/lua_config.zig
            - assets/config/init.lua
            - app_architecture/CONFIG.md
          notes:
            - "Required baseline: new tab, close tab, next tab, previous tab, activate tab by index."
        - id: TABS-02-03
          title: "Handle tab close edge cases for live processes"
          status: done
          files_to_edit:
            - src/main.zig
            - src/terminal/core/workspace.zig
          notes:
            - "Define policy for closing running shells (confirm/force policy), and behavior for last-tab close."
            - "Current baseline opens a terminal-mode confirmation modal for running tabs (confirm/cancel), and requests app shutdown when the last tab is closed in terminal-only mode."
            - "Confirmation modal supports keyboard (`Enter`/`Y` confirm, `Esc`/`N` cancel) and button clicks."
            - "Confirmation gate is now core-driven: confirm when foreground process group differs from shell (Unix), semantic prompt reports command in-flight, or terminal app modes are active (alt-screen/mouse-reporting)."
            - "Close-path latency for ordinary shells was reduced by decoupling Unix child reap from synchronous UI teardown and tightening PTY read wait granularity during shutdown."

    - name: "TABS-03 FFI extension for workspace/tabs"
      tasks:
        - id: TABS-03-01
          title: "Extend FFI design docs with workspace and tab-id model"
          status: todo
          files_to_edit:
            - app_architecture/terminal/FFI_BRIDGE_DESIGN.md
            - app_architecture/terminal/FFI_EVENT_INVENTORY.md
            - app_architecture/terminal/FFI_EVENT_ABI.md
        - id: TABS-03-02
          title: "Add FFI workspace operations with explicit ownership and stable ids"
          status: todo
          files_to_edit:
            - src/terminal/ffi/bridge.zig
            - src/terminal/ffi/c_api.zig
            - include/zide_terminal_ffi.h
          notes:
            - "Baseline ops: tab_create/tab_close/tab_activate/tab_list/current_tab."
            - "Preserve compatibility for existing single-session callers."
        - id: TABS-03-03
          title: "Add multi-tab smoke host flow"
          status: todo
          files_to_edit:
            - examples/terminal_ffi_smoke/main.py
            - examples/terminal_ffi_smoke/README.md
          notes:
            - "Demonstrate create/switch/close and per-tab metadata observations through FFI."

    - name: "TABS-04 Battle-test harness and rollout"
      tasks:
        - id: TABS-04-01
          title: "Define terminal-only manual battle-test matrix"
          status: todo
          files_to_add:
            - docs/terminal/terminal_tabs_battle_test.md
          notes:
            - "Track long-running developer workflows: many tabs, shell exits/restarts, large output, cwd/title churn."
        - id: TABS-04-02
          title: "Add regression signals for workspace/tab lifecycle"
          status: todo
          files_to_edit:
            - app_architecture/terminal/REPLAY_HARNESS_SPEC.md
            - fixtures/terminal/README.md
          notes:
            - "Capture minimal deterministic fixtures/events for tab lifecycle without depending on UI rendering."
