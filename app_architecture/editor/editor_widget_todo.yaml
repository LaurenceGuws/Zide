editor_widget_todo:
  scope:
    description: "Build a best-in-class editor widget and text engine for Zide (Linux first), targeting Notepad++-level capability."
    priorities:
      - "core-first: correctness + performance before feature breadth"
      - "modularize editor_widget + renderer into view/render layers"
      - "fast editing on large files with bounded memory"
      - "correctness for unicode + grapheme clusters"
      - "deterministic immediate/cached rendering parity"
      - "snappy baseline search/replace + regex correctness"
      - "defer non-essential UX polish until core gates are green"
  execution_policy:
    rule: "no net-new fancy editor features until baseline core gates are stable"
    baseline_gates:
      - "editing invariants: offsets/cursors/selections/undo remain deterministic"
      - "rendering invariants: immediate vs cached parity + dirty-range correctness"
      - "performance invariants: low-latency typing and bounded cache behavior"
      - "protocol invariants: baseline LSP/editor protocol semantics remain stable"
  zide_integration:
    entry_points:
      - src/main.zig
      - src/editor/editor.zig
      - src/editor/syntax.zig
      - src/ui/widgets/editor_widget.zig
      - src/ui/renderer.zig
  reference_maps:
    editors:
      helix:
        - reference_repos/editors/helix/docs/architecture.md
        - reference_repos/editors/helix/helix-core/src/selection.rs
        - reference_repos/editors/helix/helix-core/src/transaction.rs
        - reference_repos/editors/helix/helix-core/src/syntax.rs
        - reference_repos/editors/helix/helix-core/src/wrap.rs
      neovim:
        - reference_repos/editors/neovim/src/nvim/buffer.c
        - reference_repos/editors/neovim/src/nvim/memline.c
        - reference_repos/editors/neovim/src/nvim/undo.c
        - reference_repos/editors/neovim/src/nvim/search.c
        - reference_repos/editors/neovim/src/nvim/fold.c
        - reference_repos/editors/neovim/src/nvim/drawscreen.c
        - reference_repos/editors/neovim/src/nvim/highlight.c
      kakoune:
        - reference_repos/editors/kakoune/src/buffer.cc
        - reference_repos/editors/kakoune/src/selection.cc
        - reference_repos/editors/kakoune/src/display_buffer.cc
        - reference_repos/editors/kakoune/src/highlighter.cc
      lapce:
        - reference_repos/editors/lapce/lapce-app/src/doc.rs
        - reference_repos/editors/lapce/lapce-app/src/editor.rs
        - reference_repos/editors/lapce/lapce-app/src/find.rs
      zed:
        - reference_repos/editors/zed/crates/editor/src/editor.rs
        - reference_repos/editors/zed/crates/editor/src/display_map.rs
        - reference_repos/editors/zed/crates/editor/src/inlays.rs
        - reference_repos/editors/zed/crates/editor/src/indent_guides.rs
      xi_editor:
        - reference_repos/editors/xi-editor/rust/core-lib/src/editor.rs
        - reference_repos/editors/xi-editor/rust/core-lib/src/selection.rs
        - reference_repos/editors/xi-editor/rust/core-lib/src/syntax.rs
        - reference_repos/editors/xi-editor/rust/core-lib/src/linewrap.rs
        - reference_repos/editors/xi-editor/rust/core-lib/src/width_cache.rs
      lite_xl:
        - reference_repos/editors/lite-xl/src/rencache.c
        - reference_repos/editors/lite-xl/src/renderer.c
    text_libraries:
      ropey:
        - reference_repos/text/ropey/src/rope.rs
        - reference_repos/text/ropey/src/tree.rs
      xi_rope:
        - reference_repos/text/xi-rope/src/rope.rs
        - reference_repos/text/xi-rope/src/engine.rs
      scintilla:
        - reference_repos/text/scintilla/src/Editor.c
        - reference_repos/text/scintilla/src/Document.cxx
        - reference_repos/text/scintilla/src/CellBuffer.cxx
  roadmap:
    - id: ED-00
      status: done
      title: "Editor modularization plan (layers + migration steps)"
      notes:
        - "Plan captured in app_architecture/editor/MODULARIZATION_PLAN.md."

    - id: ED-01
      status: in_progress
      title: "Text model upgrade (large file performance)"
      notes:
        - "Audit complete (see app_architecture/editor/DESIGN.md)."
        - "Decision: rope/piece-tree (see app_architecture/editor/text_model_rope.md)."
        - "Plan: balanced tree + per-node aggregates (bytes + line breaks, later UTF-8/UTF-16)."
        - "Add line index cache via in-tree aggregates or partitioning."
        - "Core rope ops implemented in src/editor/rope.zig."
        - "Rope now used as the sole text model."
        - "File-open path now transfers the read buffer into rope ownership (`Rope.initOwnedOriginal`) instead of duplicating the full file bytes again."
        - "Large file open strategy now uses size-threshold mmap on supported platforms with read-to-alloc fallback."
        - "Horizontal scrollbar width behavior is now viewport/budget scoped only; full-buffer width scanning path removed."
        - "Rope now keeps a bounded line-start cache (with eviction + edit invalidation) to reduce repeated line offset lookups during rendering/scroll paths."
        - "Headless editor perf harness added (`zig build perf-editor-headless`) with raw open/rss, line-start throughput, and viewport-pass metrics for large-file optimization loops."
        - "Headless harness now includes an `editor-scroll` scenario that exercises core editor scroll progression + line width cache paths without SDL/UI."
        - "Initial rope file-load tree now chunks original text into balanced leaf nodes instead of one giant leaf, dramatically reducing lineStart/query cost on large files."
        - "Large-file initial rope chunk size is tuned to ~4KiB (>=8MiB files) to improve open/RSS while keeping line query latency sub-microsecond scale."
        - "Rope undo/redo implemented (per-op text snapshots)."
        - "Undo batching: adjacent inserts/deletes merge (rope)."
        - "Undo grouping hooks added (begin/end group)."
      references:
        - reference_repos/editors/helix/helix-core/src/transaction.rs
        - reference_repos/text/ropey/src/rope.rs
        - reference_repos/text/xi-rope/src/engine.rs
        - reference_repos/text/scintilla/src/CellBuffer.cxx

    - id: ED-02
      status: in_progress
      title: "Undo/redo batching + history model"
      notes:
        - "Group edits by command and merge adjacent inserts."
        - "Expose undo checkpoints for macros and multi-step ops."
        - "Editor now snapshots selection/caret state around edits so undo/redo can restore multi-caret layouts, not only a single cursor offset."
      references:
        - reference_repos/editors/helix/helix-core/src/transaction.rs
        - reference_repos/editors/neovim/src/nvim/undo.c
        - reference_repos/editors/xi-editor/rust/core-lib/src/editor.rs

    - id: ED-03
      status: in_progress
      title: "Selections + multi-cursor + column mode"
      notes:
        - "Selection = anchor/head ranges; support merging and rectangular selections."
        - "Selection set scaffolding in Editor (normalize/merge)."
        - "Rectangular selection scaffolding (per-line expansion)."
        - "Rectangular selection edit: insert/delete across selections."
        - "Zero-length selections now render as extra carets in both immediate and cached draw paths."
        - "Default multi-caret shortcuts now route through the Lua keybind/input-router layer (`editor_add_caret_up` / `editor_add_caret_down`) instead of hardcoded widget key branches."
        - "Mouse drag selection (normal + Alt-rect) wired in editor widget."
        - "Fixed drag selection clearing on cursor updates (setCursorNoClear)."
        - "Selection rendering shows highlight on empty lines."
        - "Long lines use allocated buffers instead of 4KB truncation for rendering/hit testing."
        - "Cursor/selection mapping uses grapheme clusters when non-ASCII text is present."
        - "Per-frame grapheme cache reduces HarfBuzz overhead in editor widget."
        - "Editor primes per-line width cache (grapheme-aware when available) during draw."
        - "Editor widget exposes visual line count helper for wrap groundwork."
        - "Editor widget renders soft-wrapped segments based on visual line counts."
        - "Cursor up/down moves across wrapped segments."
        - "Mouse wheel scrolls by visual rows in soft-wrap mode."
        - "Editor text rendering uses monospace advances to align cursor columns with glyph positions."
        - "Backspace/delete-forward now broadcast across the zero-length multi-caret selection set instead of only editing the primary cursor."
        - "Left/right/home/end and visual up/down now preserve the zero-length multi-caret set instead of collapsing to the primary cursor."
        - "Multi-selection copy now skips empty carets without emitting stray separator newlines."
        - "Primary caret ownership is now preserved across multi-caret restore paths instead of silently promoting the first normalized caret."
        - "The editor model now treats `cursor` as the primary caret and keeps auxiliary zero-length carets only in `selections`, rather than duplicating the primary caret into the auxiliary set."
        - "Editor core now exposes explicit primary/auxiliary caret accessors on top of that model, and more multi-caret internals now consume those helpers instead of raw zero-length selection iteration."
        - "More multi-caret edit paths now share explicit selection/caret helpers instead of repeating normalized descending selection loops."
        - "Descending multi-selection replacement/delete branches now share one offset-remapping helper instead of repeating caret-restore logic per command."
        - "Core word-left/word-right and selection-expanding movement APIs now exist in the editor engine."
        - "Word-wise and expanding movement now route through the Lua keybind/input-router layer instead of staying editor-only helpers, and direct word/line-boundary extend plus add-caret dispatch now have app-level helper coverage."
        - "Visual `Shift+Up/Down` selection growth now routes through widget/view helpers, has app-level dispatch coverage, and is covered in both wrapped and non-wrapped movement paths."
        - "Shift+arrow selection now avoids the widget's raw plain-arrow path, so left/right/up/down extend the visible selection overlay instead of collapsing to unmodified cursor movement."
        - "Shift-based extend actions now preserve multi-caret zero-length selections as per-caret ranges for horizontal, word-wise, line-boundary, and visual vertical extension."
        - "Ctrl+Shift+up/down now route as large visual selection-extension jumps (five rows), matching ctrl+up/down movement."
        - "Multi-range extend now preserves existing anchor/head pairs across the whole selection set instead of only supporting the zero-length-caret starting case."
        - "Plain unmodified left/right now explicitly collapse mixed multi-range selections to directional edges while preserving the full caret set."
        - "Plain unmodified up/down now mirror that same mixed multi-range collapse policy (up -> start edges, down -> end edges)."
        - "Large visual move/extend jump size is now configurable via `editor.large_cursor_jump_rows`."
        - "Ctrl+up/down now route as larger visual cursor jumps (five visual rows), complementing ctrl+left/right word jumps."
        - "Rectangular selection clipboard semantics are now regression-tested as per-line column slices, and cursor movement explicitly collapses column selections."
        - "Editor-core rectangular expansion now has a cluster-provider variant so non-widget callers can reuse the same cluster-aware visual-column rules as widget/view selection mapping."
        - "Cluster-aware rectangular editing is now regression-tested for both replacement and deletion, including the editor-core cluster-provider path."
      references:
        - reference_repos/editors/helix/helix-core/src/selection.rs
        - reference_repos/editors/kakoune/src/selection.cc
        - reference_repos/editors/xi-editor/rust/core-lib/src/selection.rs

    - id: ED-04
      status: todo
      title: "Syntax highlighting pipeline (incremental + cached)"
      notes:
        - "Incremental tree-sitter parse with query caching per visible range."
        - "Highlight layers (syntax + diagnostics + search hits)."
      references:
        - reference_repos/editors/helix/helix-core/src/syntax.rs
        - reference_repos/editors/xi-editor/rust/core-lib/src/syntax.rs
        - reference_repos/editors/neovim/src/nvim/highlight.c

    - id: ED-05
      status: todo
      title: "Soft wrap + line layout engine"
      notes:
        - "Implement fast line wrapping with width cache."
        - "Handle tabs, wide glyphs, and grapheme clusters."
      references:
        - reference_repos/editors/xi-editor/rust/core-lib/src/linewrap.rs
        - reference_repos/editors/xi-editor/rust/core-lib/src/width_cache.rs
        - reference_repos/editors/helix/helix-core/src/wrap.rs

    - id: ED-06
      status: in_progress
      title: "Search/replace with regex + Find-in-files"
      notes:
        - "Incremental search and replace across buffer."
        - "Regex search with highlighting and replace preview."
        - "Search query scaffold landed in Editor state (query + byte-range matches + epoch invalidation hooks)."
        - "Editor draw path now overlays search match ranges in both immediate and cached pipelines."
        - "Added next/prev active search match navigation with cursor jumps to active range start."
        - "Regex mode scaffold added (`setSearchQueryRegex`) using minimal regex subset parity with tree-sitter predicate matching."
        - "Baseline replace-current and replace-all editor semantics landed with grouped undo support."
        - "Search match state now refreshes on undo/redo to keep render overlays and navigation aligned."
        - "Active search match selection now follows cursor/query context and stays stable across recomputes instead of snapping back to the first hit."
        - "Status bar now hosts the first search query entry UI, with default keybinds for open/next/prev search."
        - "Status-bar search text now uses background-aware text rendering so the light theme keeps typed queries readable."
        - "Cached editor draw no longer wipes live search state while consuming highlight dirty ranges; search overlays/counts work without the temporary immediate-draw fallback."
        - "Highlight-dirty cache invalidation is now handed off before widget draw, keeping the cached editor render path read-only with respect to editor state."
        - "Highlighter initialization and max-line-width scanning now run before draw; cached/immediate editor widget rendering no longer mutates core editor state during paint."
      references:
        - reference_repos/editors/neovim/src/nvim/search.c
        - reference_repos/editors/lapce/lapce-app/src/find.rs
        - reference_repos/text/scintilla/src/Editor.c

    - id: ED-07
      status: todo
      title: "Code folding + outline"
      notes:
        - "Deferred behind core-first policy until baseline editor gates are stable."
        - "Tree-sitter folds + manual fold markers."
        - "Folded line rendering and interaction."
      references:
        - reference_repos/editors/neovim/src/nvim/fold.c
        - reference_repos/editors/zed/crates/editor/src/display_map.rs
        - reference_repos/text/scintilla/src/Editor.c

    - id: ED-08
      status: in_progress
      title: "Rendering cache + damage tracking"
      notes:
        - "Render-to-texture cache for editor view implemented (editor texture)."
        - "Dirty redraw based on per-line/segment hashing implemented."
        - "Highlight token cache keyed by line hash + epoch implemented."
        - "Highlight tokens are primed in update with a per-frame line budget; draw uses cached tokens only."
        - "Line width cache is primed in update with a per-frame line budget to reduce draw-thread work."
        - "Wrap line counts are primed in update with a per-frame line budget when wrap is enabled."
        - "EditorDrawList command buffer integrated into cached draw path."
        - "Render cache regression test added for dirty-line updates."
        - "Highlight token ordering comparator is now shared between immediate and cached paths to keep draw ordering deterministic for equal-range captures."
        - "Cache eviction now prunes least-recent entries instead of clearing everything."
        - "Scrollbars route through draw list when cached draw is active."
        - "Non-cached scrollbars now use the draw list path."
        - "Cached draw snapshot baseline added to editor tests."
      references:
        - reference_repos/editors/lite-xl/src/rencache.c
        - reference_repos/editors/neovim/src/nvim/drawscreen.c
        - reference_repos/editors/zed/crates/editor/src/element.rs

    - id: ED-09
      status: todo
      title: "Gutters: line numbers, diagnostics, and bookmarks"
      notes:
        - "Keep implementation minimal while core rendering/search invariants are still hardening."
        - "Line numbers, change markers, diagnostics icons."
        - "Bookmarks + quick jump."
      references:
        - reference_repos/editors/lapce/lapce-app/src/doc.rs
        - reference_repos/editors/neovim/src/nvim/sign.c
        - reference_repos/editors/zed/crates/editor/src/editor.rs

    - id: ED-10
      status: todo
      title: "Indentation guides + bracket matching"
      notes:
        - "Indent guide rendering and scope-based highlighting."
        - "Match/brace highlighting with minimal latency."
      references:
        - reference_repos/editors/zed/crates/editor/src/indent_guides.rs
        - reference_repos/editors/helix/helix-core/src/match_brackets.rs
        - reference_repos/editors/neovim/src/nvim/search.c

    - id: ED-11
      status: todo
      title: "Multi-tab + split view + shared buffers"
      notes:
        - "Deferred until single-view editor correctness/performance gates are stable."
        - "Multiple views over same buffer with independent selections."
        - "Tab bar and view splits with shared rendering model."
      references:
        - reference_repos/editors/helix/docs/architecture.md
        - reference_repos/editors/zed/crates/editor/src/split.rs
        - reference_repos/editors/neovim/src/nvim/window.c

    - id: ED-12
      status: todo
      title: "Macros + recording/playback"
      notes:
        - "Deferred behind baseline undo/search/render correctness gates."
        - "Record edit operations and reapply as a single undo unit."
      references:
        - reference_repos/editors/helix/helix-core/src/macros.rs
        - reference_repos/editors/xi-editor/rust/core-lib/src/editor.rs

    - id: ED-13
      status: in_progress
      title: "Clipboard + multi-line paste handling"
      notes:
        - "Preserve indentation and line endings."
        - "Baseline paste semantics now split plain multi-selection paste from column paste: plain sets broadcast one payload, while rectangular selections trim CRLF row endings, preserve trailing empty rows, repeat a single row, map exact row counts 1:1, cycle clipboard rows when counts mismatch, and treat visual columns through cluster boundaries plus shared visual-width rules instead of raw byte columns."
      references:
        - reference_repos/editors/neovim/src/nvim/clipboard.c
        - reference_repos/editors/zed/crates/editor/src/editor.rs

    - id: ED-14
      status: todo
      title: "LSP integration + diagnostics + code actions"
      notes:
        - "Diagnostics decorations, code actions, rename, go-to."
      references:
        - reference_repos/editors/helix/helix-lsp/src/lib.rs
        - reference_repos/editors/lapce/lapce-app/src/lsp.rs
        - reference_repos/editors/zed/crates/editor/src/hover_popover.rs

    - id: ED-15
      status: todo
      title: "Theme + syntax color pipeline"
      notes:
        - "Theme definition + token-to-color mapping."
      references:
        - reference_repos/editors/helix/runtime/themes/monokai_pro.toml
        - reference_repos/editors/neovim/src/nvim/highlight_group.c
        - reference_repos/editors/zed/crates/theme/src/theme.rs
