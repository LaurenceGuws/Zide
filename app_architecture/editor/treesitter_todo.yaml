treesitter_todo:
  scope:
    description: "Tree-sitter integration for syntax highlighting and semantic metadata."
    priorities:
      - "match Neovim query/capture semantics for highlight metadata"
      - "incremental updates based on changed ranges"
      - "low-latency highlight application with stable priorities"
      - "query + capture caching per language"
  references:
    neovim:
      - reference_repos/editors/neovim/runtime/doc/treesitter.txt
      - reference_repos/editors/neovim/runtime/lua/vim/treesitter/highlighter.lua
      - reference_repos/editors/neovim/runtime/lua/vim/treesitter/query.lua
  tasks:
    - id: TS-01
      status: done
      title: "Query + capture pipeline (highlights)"
      notes:
        - "Load language highlight queries from runtime path."
        - "Compile and cache query per language."
        - "Capture names map to token kinds or highlight groups."
        - "Honor capture names that start with '_' as no-op."
    - id: TS-02
      status: in_progress
      title: "Metadata + priorities"
      notes:
        - "Support metadata fields used by Neovim: priority, conceal, conceal_lines, url."
        - "Preserve priority ordering with subpriority per injected tree."
        - "Spell/no-spell captures mirror Neovim semantics."
        - "Implemented priority metadata parsing via #set!; tokens carry priority/metadata (not yet used for conceal/url)."
        - "Current ordering only sorts by start + priority (no overlap-splitting yet)."
    - id: TS-03
      status: in_progress
      title: "Predicates + directives"
      notes:
        - "Implement predicates used by Neovim highlights (eq?, any-of?, match?, contains?)."
        - "Implement directives set!, offset!, gsub!, trim! (as needed)."
        - "Allow custom predicate/directive registry for extensions."
        - "Implemented eq?/any-of?/contains?/match? predicates; match? uses a minimal regex subset (anchors + . * + ?)."
        - "Implemented set! directive for priority/conceal/conceal_lines/url metadata; offset!/gsub!/trim! pending."
    - id: TS-04
      status: in_progress
      title: "Incremental invalidation"
      notes:
        - "Track changed ranges and recompute highlight spans for those ranges only."
        - "Avoid full-query recompute on small edits."
        - "Added tree edit + changed range tracking; editor records dirty highlight line ranges."
        - "Render cache now invalidates highlight entries by dirty line range (no full clear on each edit)."
        - "Undo/redo forces full Tree-sitter reparse to avoid corrupted incremental trees."
        - "Added highlight replay test comparing incremental edits to full reparse output."
        - "Replay harness covers multiline delete spanning comment tokens."
        - "Replay harness now includes a larger Zig fixture with multiple token types."
        - "Added a test to ensure applyEdit changed ranges cover edited line spans."
    - id: TS-05
      status: todo
      title: "Injected languages"
      notes:
        - "Support language injections in queries."
        - "Maintain highlight order so injected nodes override parents."
        - "Extend query packaging + runtime loading beyond highlights.scm (injections, locals, tags, textobjects, indents) per language."
    - id: TS-06
      status: todo
      title: "Render integration"
      notes:
        - "Translate capture spans into editor HighlightToken ranges."
        - "Ensure stable token ordering for cached draws."
        - "Add cached draw tests for tree-sitter highlight spans."
    - id: TS-07
      status: done
      title: "Dynamic grammar loader"
      notes:
        - "Load parser .so from cache dir and resolve tree_sitter_<lang> symbol."
        - "Read highlights.scm from cache dir when present."
        - "Fallback to assets/queries for bundled languages."
      references:
        - app_architecture/editor/treesitter_dynamic_roadmap.md
    - id: TS-08
      status: done
      title: "Grammar pack install tooling"
      notes:
        - "Install packs from tools/grammar_packs/dist into ~/.config/zide/grammars."
        - "Optional: add download support from release URLs."
      references:
        - app_architecture/editor/treesitter_dynamic_roadmap.md
