editor_protocol_todo:
  scope:
    description: "Text engine + editing semantics (buffer model, undo, selection, search, folding)."
    priorities:
      - "core-first protocol semantics before advanced features"
      - "modularize editor view/state before behavior changes"
      - "large-file performance + bounded allocations"
      - "correctness for unicode + graphemes"
      - "predictable undo/redo and cursor mapping"
      - "search semantics parity before find-in-files UX expansion"
  quality_bar:
    acceptance:
      - "every protocol/state change has focused regression coverage"
      - "no behavior-only refactors mixed with feature deltas"
      - "editing/search state remains deterministic under undo/redo"
  reference_maps:
    helix:
      - reference_repos/editors/helix/docs/architecture.md
      - reference_repos/editors/helix/helix-core/src/transaction.rs
      - reference_repos/editors/helix/helix-core/src/selection.rs
    neovim:
      - reference_repos/editors/neovim/src/nvim/buffer.c
      - reference_repos/editors/neovim/src/nvim/undo.c
      - reference_repos/editors/neovim/src/nvim/search.c
      - reference_repos/editors/neovim/src/nvim/fold.c
    kakoune:
      - reference_repos/editors/kakoune/src/buffer.cc
      - reference_repos/editors/kakoune/src/selection.cc
    xi_editor:
      - reference_repos/editors/xi-editor/rust/core-lib/src/editor.rs
      - reference_repos/editors/xi-editor/rust/core-lib/src/selection.rs
      - reference_repos/editors/xi-editor/rust/core-lib/src/linewrap.rs
    scintilla:
      - reference_repos/text/scintilla/src/Editor.c
      - reference_repos/text/scintilla/src/Document.cxx
      - reference_repos/text/scintilla/src/CellBuffer.cxx
    ropey:
      - reference_repos/text/ropey/src/rope.rs
      - reference_repos/text/ropey/src/tree.rs
    xi_rope:
      - reference_repos/text/xi-rope/src/rope.rs
      - reference_repos/text/xi-rope/src/engine.rs
  tasks:
    - id: EP-01
      status: done
      title: "Text model audit + upgrade plan"
      notes:
        - "Audit complete; see app_architecture/editor/DESIGN.md."
        - "Decision: rope/piece-tree."
      references:
        - reference_repos/text/ropey/src/rope.rs
        - reference_repos/text/xi-rope/src/engine.rs
        - reference_repos/text/scintilla/src/CellBuffer.cxx

    - id: EP-02
      status: in_progress
      title: "Undo/redo model + batching rules"
      notes:
        - "Merge consecutive inserts/deletes (rope)."
        - "Added begin/end undo group hooks; grouped undo supported in rope."
        - "Editor groups selection replace (delete + insert) into one undo."
        - "Editor widget groups edits per input tick to avoid over-merging inserts."
        - "Undo/redo now returns cursor offset; editor syncs cursor to undo/redo location."
        - "Editor now layers selection/caret snapshots onto undo/redo so multi-caret edits restore the pre/post caret set instead of only a scalar cursor offset."
      references:
        - reference_repos/editors/helix/helix-core/src/transaction.rs
        - reference_repos/editors/neovim/src/nvim/undo.c
        - reference_repos/editors/xi-editor/rust/core-lib/src/editor.rs

    - id: EP-03
      status: in_progress
      title: "Selections, multi-cursor, and column mode"
      notes:
        - "Selection set scaffolding added to Editor (add/clear/normalize/merge)."
        - "Column selection scaffolding: rectangular selections + expand per-line."
        - "Rectangular selection editing: insert/delete per line."
        - "Broadcast insert/delete now preserves the selection set as zero-length carets instead of clearing it."
        - "Multi-caret vertical expansion now has keycode-routed editor actions (`editor_add_caret_up` / `editor_add_caret_down`) instead of widget-local shortcut branches."
        - "Backspace/delete-forward now apply across the multi-caret selection set with grouped undo, including mixed caret/range cases."
        - "Caret-only movement now preserves the multi-caret selection set for left/right/home/end and widget-routed visual up/down."
        - "selectionTextAlloc now skips zero-length carets cleanly so multi-selection copy/cut does not emit trailing blank separators."
        - "Primary cursor ownership now survives multi-caret restore/edit paths instead of always snapping to the first normalized caret."
        - "Caret storage is now more explicit: `cursor` is the primary caret, while zero-length entries in `selections` are auxiliary carets instead of duplicating the primary caret into both places."
        - "Editor core now exposes explicit primary/auxiliary caret accessors, and more multi-caret internals now consume those helpers instead of iterating raw zero-length selections ad hoc."
        - "More edit branches now share explicit selection/caret helpers instead of open-coding normalized descending selection loops."
        - "Selection replacement/delete branches now share one offset-remapping helper for descending multi-selection edits instead of duplicating per-command caret restoration logic."
        - "Editor core now exposes baseline word-wise navigation and selection-expanding movement APIs."
        - "Rectangular selection copy/move semantics are now explicit: copy yields per-line column slices, and plain cursor movement collapses the rectangular set."
        - "Word-wise and expanding movement now route through the keybind/input-router layer (`editor_move_word_*`, `editor_extend_*`) instead of being editor-only APIs, and app-level helper coverage now exists for direct word/line-boundary extend actions plus add-caret routing."
        - "Visual vertical selection growth now routes through keybind actions (`editor_extend_up` / `editor_extend_down`) and has app-level dispatch coverage plus regression coverage for both wrapped visual rows and plain logical-line movement."
        - "Shift+arrow selection semantics now defer to routed extend actions instead of falling through the raw cursor path, so overlay selection behaves like standard editor selection for left/right/up/down."
        - "Shift-based extend actions now preserve zero-length multi-caret sets as real per-caret ranges for left/right/word/line-boundary extend and visual up/down extend, instead of collapsing to the primary cursor."
        - "Ctrl+Shift+up/down now route as large visual selection extension jumps (five visual rows), matching the large ctrl+up/down cursor jumps."
        - "Extend actions now preserve existing multi-range anchor/head pairs across the full selection set, not only zero-length carets."
        - "Ctrl+up/down now route as larger visual cursor jumps (five visual rows per step), alongside existing ctrl+left/right word jumps."
        - "Paste semantics are now explicit: plain multi-selection paste broadcasts one payload to every selection, while rectangular selections trim CRLF row endings, preserve trailing empty rows, repeat a single row, map exact row counts 1:1, cycle clipboard rows when counts mismatch, and interpret visual columns via cluster boundaries plus core visual widths (tabs, combining marks, wide glyphs) instead of raw bytes."
        - "Editor-core rectangular expansion now has a cluster-provider entrypoint so non-widget callers can use the same cluster-aware visual-column mapping as view/widget selection code."
        - "Cluster-aware rectangular editing now has regression coverage for both replacement and deletion, including the editor-core cluster-provider path."
        - "Column selection and editing."
      references:
        - reference_repos/editors/helix/helix-core/src/selection.rs
        - reference_repos/editors/kakoune/src/selection.cc
        - reference_repos/editors/xi-editor/rust/core-lib/src/selection.rs

    - id: EP-04
      status: in_progress
      title: "Search/replace and regex engine"
      notes:
        - "Incremental search state with highlights."
        - "Replace preview and replace-all."
        - "Added initial editor search state scaffold (query string + byte-range matches + active index placeholder)."
        - "Search state increments a dedicated epoch and marks highlight dirty range for render cache invalidation."
        - "Added active-match navigation API (`activateNextSearchMatch` / `activatePrevSearchMatch`) and cursor jump behavior."
        - "Added regex search entrypoint (`setSearchQueryRegex`) for a minimal regex subset while preserving literal mode API."
        - "Added baseline replace semantics: active-match replace + replace-all are grouped undo operations."
        - "Undo/redo now refresh search matches so highlight/navigation state stays synchronized with history."
        - "Search query/recompute now picks or preserves the active match nearest the cursor/previous active location instead of always resetting to the first hit."
        - "IDE status bar now exposes a live literal search field (`Ctrl+F`), with `Enter`/`F3` next and `Shift+Enter`/`Shift+F3` previous navigation."
        - "Status-bar search text now renders against the real bar background so light-theme search input stays legible under linear text correction."
        - "Cached editor rendering now preserves search state; taking highlight dirty ranges no longer clears active query/matches during draw."
        - "Search-panel key routing now has app-level tests, and editor draw no longer initializes highlighters or advances max-width scans as paint-time side effects."
        - "Current priority: harden baseline literal/regex correctness + replace semantics before adding Find-in-files UX layers."
      references:
        - reference_repos/editors/neovim/src/nvim/search.c
        - reference_repos/editors/lapce/lapce-app/src/find.rs
        - reference_repos/text/scintilla/src/Editor.c

    - id: EP-05
      status: todo
      title: "Folding model + markers"
      notes:
        - "Deferred by core-first policy until EP-02/03/04 semantics are stable and test-backed."
        - "Syntax-driven folds + manual fold markers."
      references:
        - reference_repos/editors/neovim/src/nvim/fold.c
        - reference_repos/editors/zed/crates/editor/src/display_map.rs
        - reference_repos/text/scintilla/src/Editor.c
