dependencies_todo:
  scope:
    description: "Evaluate and phase in Zig-managed native dependencies to reduce host-package coupling while preserving current runtime behavior."
    goals:
      - "Keep system-library builds working during migration."
      - "Add reproducible Zig package options for SDL3 and other core deps."
      - "Stage dependency migration behind explicit build flags."
      - "Document tradeoffs (build time, binary size, platform parity) per step."
    non_goals:
      - "No terminal/editor behavior changes in this track."
      - "No renderer architecture rewrite."
      - "No forced one-shot switch away from system packages."

  constraints:
    - "Default developer path remains stable and buildable at each checkpoint."
    - "Each dependency move must have a rollback path."
    - "Migration is extraction/wiring first; behavior parity must hold."

  entry_points:
    - build.zig
    - build.zig.zon
    - docs/DEPENDENCIES.md
    - app_architecture/BOOTSTRAP.md

  external_candidates:
    sdl3:
      recommended: "github:castholm/SDL"
      notes:
        - "Primary Zig package candidate for SDL3 packaging."
        - "Wire behind a build option before flipping defaults."
    freetype_harfbuzz:
      recommended: "github:hexops/mach-freetype"
      notes:
        - "Candidate for Zig-managed FreeType/HarfBuzz integration."
        - "Validate shaping parity and startup/runtime performance."
    lua54:
      recommended: "github:natecraddock/ziglua"
      notes:
        - "Candidate for Lua runtime dependency management."
    treesitter:
      recommended: "github:tree-sitter/zig-tree-sitter"
      notes:
        - "Evaluate only if it materially improves reproducibility vs current vendor flow."

  validation_gates:
    required_per_slice:
      - zig build
      - zig build test
      - zig build check-app-imports
      - zig build check-input-imports
      - zig build check-editor-imports
    manual_smokes:
      - zig build run -- --mode terminal
      - zig build run -- --mode editor
      - zig build run -- --mode ide

  milestones:
    - name: "DEP-00 Baseline + build interface"
      tasks:
        - id: DEP-00-01
          title: "Add dependency source selection interface in build config"
          status: done
          notes:
            - "Define one explicit selector."
            - "Current selector: `-Dpath=link|zig`."
            - "No dependency backend switch yet; interface only."
        - id: DEP-00-02
          title: "Document dependency migration policy and rollback expectations"
          status: done
          files_to_edit:
            - docs/DEPENDENCIES.md
            - app_architecture/BOOTSTRAP.md

    - name: "DEP-01 SDL3 Zig package path"
      tasks:
        - id: DEP-01-01
          title: "Introduce SDL3 Zig package backend behind build selector"
          status: done
          notes:
            - "Keep current system-lib backend intact."
            - "Later updated: SDL moved into normal Zig-managed flow."
            - "No behavior changes in runtime code."
            - "Implemented via `-Dpath=zig` with `castholm/SDL` package (`artifact(\"SDL3\")`)."
            - "Current state: `-Dpath` no longer gates SDL/Lua; retained for next migration slice."
        - id: DEP-01-02
          title: "Parity-check system vs Zig SDL3 builds"
          status: done
          notes:
            - "Record compile/runtime parity notes in architecture docs."
            - "2026-03-05 (non-GUI parity): `zig build`, `zig build -Dpath=zig`, `zig build test`, and `zig build test -Dpath=zig` all passed."
            - "Current caveat line removed after SDL/Lua were moved to normal flow."
            - "2026-03-05 cleanup: removed remaining SDL2-era runtime branches in input/window paths and switched keyboard/text event access to SDL3-only fields. Retained one guarded DPI symbol call (`SDL_GetDisplayDPI`) for SDL3 header-variant compatibility."

    - name: "DEP-02 FreeType/HarfBuzz Zig package path"
      tasks:
        - id: DEP-02-01
          title: "Add optional Zig-managed FreeType/HarfBuzz backend"
          status: in_progress
          notes:
            - "Research baseline captured in `app_architecture/DEPENDENCIES.md` (package API constraints and migration shape)."
            - "2026-03-05 attempt: direct Mach `freetype` + `harfbuzz` package artifacts were wired and then reverted."
            - "Blocker: package build scripts currently fail against our Zig toolchain with `Build.addStaticLibrary` API mismatch."
            - "Keep `-Dpath` as migration surface and revisit DEP-02 once compatible package revisions are identified."
            - "2026-03-06: extracted build-level text-stack hooks (`linkTextStack`, `addTextStackIncludes`) so future package wiring can be added in one place without per-target churn."
            - "2026-03-06 retry: initial direct package wiring via `pkg.machengine.org` `freetype`/`harfbuzz` remained blocked by `Build.addStaticLibrary` incompatibility on Zig 0.15.2."
            - "2026-03-06 follow-up: pinned Zig 0.15.2-compatible forks (`LaurenceGuws/freetype-zig015`, `LaurenceGuws/harfbuzz-zig015`) and re-enabled `-Dpath=zig` text-stack wiring."
            - "2026-03-06 follow-up: fixed Zide wiring to source freetype from its own dep handle and linked `z` for freetype gzip symbols."
            - "2026-03-06 parity checkpoint: `zig build`, `zig build test`, `zig build -Dpath=zig`, `zig build test -Dpath=zig`, `zig build -Dpath=zig test-editor`, `zig build -Dpath=zig check-{app,input,editor}-imports`, `zig build -Dpath=zig test-terminal-workspace`, `zig build -Dpath=zig test-terminal-ffi`, `zig build -Dpath=zig test-terminal-focus-reporting`, and `zig build -Dpath=zig test-terminal-kitty-query-parse` pass."
        - id: DEP-02-02
          title: "Validate font shaping/rasterization parity against system path"
          status: in_progress
          notes:
            - "Use existing terminal/editor/font-sample flows for parity checks."
            - "2026-03-06 non-GUI parity checkpoint: terminal-focused suites pass on both paths (`link` and `zig`): `test-terminal-focus-reporting`, `test-terminal-kitty-query-parse`, `test-terminal-workspace`, `test-terminal-ffi`."
            - "Remaining work: manual visual parity passes for terminal/editor/font-sample rasterization and shaping behavior."

    - name: "DEP-03 Lua runtime dependency path"
      tasks:
        - id: DEP-03-01
          title: "Add optional Zig-managed Lua backend"
          status: done
          notes:
            - "2026-03-05: Lua source migration scaffolded in `build.zig`."
            - "2026-03-05: Zig Lua path enabled and wired to ziglua `artifact(\"lua\")` + emitted include tree."
            - "Builds confirmed at migration time: `zig build -Dpath=zig` and parser/backend parity checkpoints."
            - "2026-03-05: backend split scaffold landed for config parser migration:"
            - "  - Initial phase used a temporary facade selector during migration."
            - "  - Final phase removed selector/fallbacks and kept native ziglua path only."
        - id: DEP-03-02
          title: "Validate config reload and Lua API behavior parity"
          status: pending
        - id: DEP-03-03
          title: "Parallel migration plan: move lua_config functions to ziglua backend by ownership groups"
          status: done
          notes:
            - "Ownership group A (lifecycle + merge): loadConfig, freeConfig, mergeConfig, loadConfigFromFile, parseConfigFromStack, parseConfigFromSnippet."
            - "Ownership group B (keybind parsing): parseKeybinds, parseKeybindScope, parseKeyField, parseModsField, parseActionField, parseRepeatField, readModString, applyMod, sameBindingIdentity, mergeKeybinds."
            - "Ownership group C (theme parsing): parseThemeFromTable, parseThemePaletteTable, parseIndexedAnsiColors, parseNamedAnsiColors, parseThemeSyntaxTable, applyEditorThemeSchema, applyEditorThemeColorSection, applyEditorThemeLinkSection, resolveEditorThemeColor, resolveEditorThemeColorFromSection, parseEditorThemeColorFromValue, editorThemeLinkTargetFromValue."
            - "Ownership group D (theme mapping/apply): applyThemeConfig, mergeThemeConfig, setThemeColorByEditorName, lookupThemeColorByEditorName, themeColorSlotByEditorName, normalizeEditorThemeName."
            - "Ownership group E (Lua utility + scalar parsers): parseFontHinting, parseGlyphOverflowPolicy, parseTerminalBlink, parseTerminalDisableLigatures, parseTabBarWidthMode, parseCursorShape, parseFontTable, parseLogFiltersFromTable, parseSdlLogLevel, parseColorField, parseColorFromValue, parseHexColor, parseHexByte, parseColorChannel, luaStringToOwned, luaStringToSlice, luaStringListToOwned, luaAbsIndex, luaPushStringSlice, luaGetTableByNameWithCaptureFallback."
            - "Checkpoint: shared pure logic extracted into `lua_config_shared.zig` and used by both backends (`freeConfig`, `applyThemeConfig`) to reduce cross-backend coupling."
            - "Checkpoint: ziglua backend now owns top-level config orchestration (assets/user/project layering) and calls parser/merge helpers directly; no single-call loadConfig delegation remains."
            - "Checkpoint: ziglua backend now performs Lua state init/library open/file load/protected call through `zlua`; CAPI bridge is currently retained only for stack table parsing + merge helpers."
            - "Checkpoint: merge pipeline moved to shared backend utility (`lua_config_shared.mergeConfig` + shared theme overlay merge), removing ziglua dependency on capi merge implementation."
            - "Checkpoint: runtime now logs whether CAPI parse bridge is active (`capi_parse_bridge=0|1`) to make migration state explicit during smoke tests."
            - "Checkpoint: remaining CAPI parse dependency was isolated behind `lua_config_capi_bridge.zig`; ziglua backend no longer imported full capi module directly."
            - "Checkpoint: ziglua parser seam introduced (`lua_config_ziglua_parse.zig`) and routed from backend loader."
            - "Checkpoint: ziglua parser seam now handles nil/non-table short-circuit natively via zlua before bridge fallback."
            - "Checkpoint: ziglua parser seam now applies native top-level scalar overlay (`editor_wrap`, `terminal_focus_report_window`, `terminal_focus_report_pane`, `editor_large_jump_rows`, `sdl_log_level`) over bridge parse output."
            - "Checkpoint: native scalar overlay expanded (`terminal_cursor_blink`, `terminal_tab_bar_show_single_tab`, `keybinds_no_defaults`, `font_lcd`, `font_autohint`, `text_linear_correction`, `text_gamma`, `text_contrast`, `editor_tab_bar_width_mode`, `terminal_tab_bar_width_mode`, `terminal_cursor_shape`)."
            - "Checkpoint: native enum-string scalar overlay expanded (`terminal_blink_style`, `terminal_disable_ligatures`, `editor_disable_ligatures`, `font_hinting`, `font_glyph_overflow`)."
            - "Checkpoint: native overlay now includes font path/feature strings and scalar sizes (`app/editor/terminal_font_*`, `terminal_scrollback_rows`) with allocator-safe lifecycle."
            - "Checkpoint: native overlay now handles log filter fields (`log_file_filter`, `log_console_filter`) and `logs.{file,console,enable}` string/list forms."
            - "Checkpoint: native numeric overlay expanded (`editor_highlight_budget`, `editor_width_budget`)."
            - "Checkpoint: native section overlay parsing added for `app`, `editor`, `terminal`, and `font_rendering` (for currently migrated scalar/font/tab/cursor/focus fields)."
            - "Checkpoint: native overlay now normalizes terminal scrollback range (100..100000 with 1000 default), maps `terminal_blink_style=\"ghostty\"` to `.off`, and parses section forms `sdl.log_level` + `keybinds.no_defaults`."
            - "Checkpoint: ziglua native overlay now parses `theme`, `app.theme`, `editor.theme`, and `terminal.theme` through a dedicated CAPI theme bridge entrypoint (no full-config bridge dependency for these fields)."
            - "Checkpoint: ziglua native overlay now parses `keybinds` table bindings through a dedicated CAPI keybind bridge entrypoint and keeps `keybinds.no_defaults` native."
            - "Checkpoint: ziglua native overlay now mirrors `log` and `raylib.log_level` compatibility aliases, and parses `editor.theme` via dedicated CAPI editor-theme bridge (schema/link resolution parity)."
            - "Checkpoint: ziglua backend no longer calls full-config CAPI parse bridge; `parseConfigFromLuaState` now returns native ziglua parse output directly while retaining focused CAPI bridge helpers for themes/keybinds."
            - "Checkpoint: runtime startup diagnostics now report CAPI bridge granularity (`parse/full/theme/keybind`) to track migration progress explicitly."
            - "Checkpoint: keybind parsing is now native in `lua_config_ziglua_parse.zig`; CAPI keybind bridge usage is removed (`uses_capi_keybind_bridge=0`)."
            - "Checkpoint: base theme parsing (`theme`, `app.theme`, `terminal.theme`) is now native in ziglua seam, including palette/syntax/ansi color decoding; only `editor.theme` remains on bridge for schema/link resolution."
            - "Checkpoint: `editor.theme` schema/link resolution is now native; ziglua parser no longer calls CAPI bridge functions (`uses_capi_parse_bridge=0`, `full=0`, `theme=0`, `keybind=0`)."
            - "Checkpoint: `lua_config_capi_bridge.zig` was removed after ziglua path became fully native."
            - "Checkpoint: bridge-era scaffolding was removed (`uses_capi_*` flags and bridge-specific startup diagnostics)."
            - "Checkpoint: build/runtime now hard-wire config parsing to ziglua and remove `-Dlua-impl` selector surface."
            - "Checkpoint: `lua_config_iface.zig` now owns config/theme type definitions directly and `lua_config_capi.zig` has been removed from the active source tree."

    - name: "DEP-04 Tree-sitter packaging decision"
      tasks:
        - id: DEP-04-01
          title: "Evaluate tree-sitter packaging changes vs current vendor strategy"
          status: done
          notes:
            - "Adopt only if it clearly improves reproducibility/maintenance."
            - "Vendored `tree-sitter-zig` parser C is no longer linked in build targets."
            - "Zig grammar language pointers now resolve through `src/editor/zig_language.zig` via GrammarManager cache loading."
            - "2026-03-06: pinned `tree_sitter/tree-sitter` package in `build.zig.zon`."
            - "2026-03-06: build now links tree-sitter core via package artifact `tree-sitter` in normal flow."
        - id: DEP-04-02
          title: "Decide keep-vendor vs package and document decision"
          status: done
          notes:
            - "Decision: package-managed tree-sitter core is the primary path; vendored tree-sitter core wiring removed from build graph."
            - "2026-03-06: `zide-terminal` build target no longer links tree-sitter core and no longer adds tree-sitter include plumbing."
            - "2026-03-06: terminal-focused runtime paths are compile-time gated to avoid pulling editor shortcut/active-view wiring into the terminal target."
        - id: DEP-04-03
          title: "Auto-bootstrap missing grammars (run/install grammar-update flow)"
          status: done
          notes:
            - "When runtime grammar lookup fails, provide a guided auto-bootstrap path instead of hard panic."
            - "Design should support non-interactive CI and user-local interactive workflows."
            - "Capture failure policy per mode (terminal/editor/ide) and fallback UX messaging."
            - "2026-03-06: added opt-in runtime hook via `ZIDE_GRAMMAR_AUTO_BOOTSTRAP=1` that attempts one-shot `zig build grammar-update -- --skip-git --continue-on-error` on first missing grammar, then retries load."
            - "2026-03-06: added one-shot user-visible guidance when grammar remains missing (with/without auto-bootstrap), avoiding repeated spam."

    - name: "DEP-05 Default flip readiness"
      tasks:
        - id: DEP-05-01
          title: "Define criteria to make Zig-managed deps default"
          status: pending
          notes:
            - "Require successful parity runs and documented platform caveats."
        - id: DEP-05-02
          title: "Update docs and developer bootstrap once defaults change"
          status: pending
