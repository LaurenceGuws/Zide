ui_widget_modularization_todo:
  scope:
    description: "Modularize Zide UI widgets into small, testable units while preserving behavior and keeping the SDL3 renderer path stable."
    priorities:
      - "keep hot paths allocation-light (frame budget friendly)"
      - "reduce single-file widgets to clear submodules"
      - "preserve existing look/interaction; extraction-only by default"
      - "enforce import/layering constraints via existing checks"

  context:
    notes:
      - "Terminal backend modularization is tracked separately under app_architecture/terminal/* and is already largely complete."
      - "Renderer work is tracked under app_architecture/ui/renderer_todo.yaml."
      - "SDL3 migration work is tracked under app_architecture/ui/sdl3_migration_todo.yaml."

  zide_integration:
    entry_points:
      - src/main.zig
      - src/ui/widgets.zig
      - src/ui/renderer.zig
      - src/ui/widgets/terminal_widget.zig
      - src/ui/widgets/editor_widget.zig

  conventions:
    widget_pattern:
      - "Keep <name>_widget.zig as the orchestrator (state + wiring)."
      - "Prefer splitting into <name>_widget_draw.zig and <name>_widget_input.zig when a widget exceeds ~800 LOC."
      - "Put reusable helpers in src/ui/widgets/common.zig or a new focused file under src/ui/widgets/*.zig."
    widget_api_shape:
      notes:
        - "Widgets are UI-only orchestration objects (small amounts of UI state + wiring)."
        - "Core app logic owns long-lived sessions (Editor/Terminal); widgets render from snapshots and emit action intents."
      lifecycle:
        - "init(...) -> Widget: returns a fully-formed widget value; keep allocations out of hot draw paths."
        - "deinit(self): frees UI-side caches/resources owned by the widget (e.g. GL textures, cached lists)."
      input:
        - "handleInput(self, shell, ..., input_batch) -> !bool: consumes per-frame input and returns whether anything was handled."
        - "When a widget needs to trigger an app action (open file, etc.), it stores a pending request and exposes a take* method."
      draw:
        - "draw(self, shell, x, y, width, height, input_snapshot): draws using renderer + snapshot-derived view data; avoid per-frame allocations."
        - "Any hover state used by draw is computed during input handling and cached on the widget (draw reads cached state)."
      actions:
        - "takePendingOpenRequest()/take*: transfers ownership of any allocated payload to the caller; widget clears its pending state."
    guardrails:
      - "Default mode is extraction-only: no behavior changes while splitting files."
      - "Avoid new allocations in per-frame draw paths; preallocate + retain capacity."
      - "Use existing layering checks: zig build check-app-imports, zig build check-editor-imports, zig build check-input-imports."

  phases:
    - name: "Phase 0 - Baseline + Contracts"
      tasks:
        - id: UI-0-01
          title: "Document widget API shape (init/deinit, handleInput, draw, take actions)"
          status: done
          files_to_edit:
            - app_architecture/ui/ui_widget_modularization_todo.yaml
          notes:
            - "Capture de-facto conventions already used by EditorWidget + TerminalWidget so new widgets are consistent."

        - id: UI-0-02
          title: "Add UI layering notes to app import rules (no new check target)"
          status: done
          files_to_edit:
            - app_architecture/ui/DEVELOPMENT_JOURNEY.md
          notes:
            - "Prefer documenting what check-app-imports enforces rather than adding a new build step." 

    - name: "Phase 1 - Terminal Widget Split (UI-side)"
      tasks:
        - id: UI-TW-01
          title: "Extract ctrl+click open logic from terminal_widget"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget.zig
          files_to_add:
            - src/ui/widgets/terminal_widget_open.zig
          notes:
            - "Move: token extraction + parsePathAndLocation + PendingOpen plumbing helpers."
            - "Keep behavior identical to current P8-10 implementation in terminal_widget_todo." 

        - id: UI-TW-02
          title: "Extract kitty image upload + texture cache"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget.zig
          files_to_add:
            - src/ui/widgets/terminal_widget_kitty.zig
          notes:
            - "Move: kitty_textures, pending upload set/list, GL texture lifetime."
            - "Keep renderer-facing structs (Texture, GL calls) local to this module."

        - id: UI-TW-03
          title: "Extract hover/link underline overlay path"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget.zig
          files_to_add:
            - src/ui/widgets/terminal_widget_hover.zig
          notes:
            - "Move: hover state tracking, linkIdAtCell + underline draw decisions."
            - "Keep the existing no-full-redraw overlay pass behavior." 

        - id: UI-TW-04
          title: "Split terminal widget into draw vs input modules"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget.zig
          files_to_add:
            - src/ui/widgets/terminal_widget_draw.zig
            - src/ui/widgets/terminal_widget_input.zig
          notes:
            - "Mirror the pattern already used by EditorWidget (editor_widget_draw.zig / editor_widget_input.zig)."
            - "Goal: terminal_widget.zig becomes a thin orchestrator (ideally <500 LOC)."

        - id: UI-TW-05
          title: "Add terminal widget micro-bench hooks (draw time + uploads)"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget.zig
            - src/ui/renderer/time_utils.zig
          notes:
            - "Keep disabled by default; log via app_logger when enabled." 

    - name: "Phase 2 - Editor Widget Followups"
      tasks:
        - id: UI-EW-01
          title: "Confirm editor widget already split (draw/input) and keep stable"
          status: done
          files:
            - src/ui/widgets/editor_widget.zig
            - src/ui/widgets/editor_widget_draw.zig
            - src/ui/widgets/editor_widget_input.zig
          notes:
            - "This is the reference pattern for TerminalWidget splitting." 

    - name: "Phase 3 - Widgets Registry + Shared UI Helpers"
      tasks:
        - id: UI-W-01
          title: "Make src/ui/widgets.zig a thin registry (no large logic blocks)"
          status: done
          files_to_edit:
            - src/ui/widgets.zig
          notes:
            - "Move non-registry logic into src/ui/widgets/common.zig or a dedicated module." 
            - "Verified: src/ui/widgets.zig is already a pure re-export registry."

        - id: UI-W-02
          title: "Consolidate small shared helpers (hit-testing, cell math, DPI)"
          status: done
          files_to_edit:
            - src/ui/widgets/common.zig
          notes:
            - "Avoid cross-widget copy/paste. Keep helpers UI-only (no terminal core imports)."
            - "Added shared helpers: computeScrollbarThumb(...) + pointInRect(...); applied to TerminalWidget + EditorWidget." 

    - name: "Phase 4 - Verification"
      tasks:
        - id: UI-V-01
          title: "Build + run smoke after each extraction"
          status: done
          commands:
            - zig build run -- --mode terminal
            - zig build run
          notes:
            - "Terminal mode validates TerminalWidget wiring. Default run validates app composition." 
            - "Ran both commands locally (short smoke; window loop ran until timeout)."

        - id: UI-V-02
          title: "Run import checks after each phase"
          status: done
          commands:
            - zig build check-app-imports
            - zig build check-editor-imports
            - zig build check-input-imports

    - name: "Phase 5 - UI Thread/Backend Decoupling"
      tasks:
        - id: UI-PERF-01
          title: "Reduce terminal widget draw lock scope to snapshot-only"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget_draw.zig
            - src/terminal/core/terminal_session.zig
          notes:
            - "Do not hold session state mutex across shaping, glyph batching, or long draw loops."
            - "Capture needed view/snapshot data under lock, then draw lock-free."
            - "2026-03-07: `TerminalWidget.draw` now locks only long enough to refresh/copy render cache into widget-owned snapshot buffers."
            - "2026-03-07: HarfBuzz shaping, glyph batching, kitty overlay draws, and selection/cursor/overlay passes now run without holding session state mutex."
            - "2026-03-07: Added generation-guarded `TerminalSession.clearDirtyIfGeneration(...)` to safely clear dirty flags after lock-free draw."
            - "2026-03-07: Removed per-frame UI-thread blink detection scan across all terminal cells; `RenderCache.has_blink` is now computed in view-cache update and consumed directly by draw invalidation logic."
            - "2026-03-07: Blink presence no longer unconditionally forces full texture redraw; full redraw now gates on actual blink phase toggles (`blink_phase_changed_pending`)."
            - "2026-03-08: Pending view-cache refreshes are now consumed under the draw snapshot lock before copying the published render cache, instead of a best-effort lock-free read of possibly stale cache state."
            - "2026-03-08: Cursor blink arming and widget blink-phase checks no longer read `TerminalSession.renderCache()` lock-free from app/widget code; they use widget-owned snapshot state."

        - id: UI-PERF-02
          title: "Avoid blocking lock in terminal widget input path"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget_input.zig
            - src/terminal/core/terminal_session.zig
          notes:
            - "Keep optimistic tryLock behavior; avoid unconditional fallback waits on hot input paths."
            - "Defer non-critical hover/open calculations when lock contention is high."
            - "2026-03-07: Removed fallback blocking lock waits from terminal widget input; lock-dependent hover/open/selection/scrollbar work is skipped under contention while key/focus paths remain responsive."
            - "2026-03-07: `TerminalSession.keyModeFlagsValue()` now reads the atomic input snapshot (`input_snapshot.key_mode_flags`) to support lock-light input reads."
            - "2026-03-08: Input-mode reads used by the widget now come from `TerminalSession.input_snapshot`, expanded to include bracketed paste, auto-repeat, alternate-scroll, alt-screen state, and live screen dimensions."
            - "2026-03-08: CSI mode transitions and alt-screen enter/exit now refresh that input snapshot so UI-side input decisions do not race plain session state."
            - "2026-03-08: `terminal_widget_input` now derives hover hit-testing, ctrl+click open, and selection hit-mapping from the widget-owned published draw cache instead of live session snapshot reads."
            - "2026-03-08: Session locking in `terminal_widget_input` is now explicit and narrow: only OSC clipboard pickup, selection/scroll mutations, middle-click paste send, and terminal mouse-reporting stay on the locked path."
            - "2026-03-09: Fixed a nested-lock deadlock in the locked scrollback selection/scrollbar path by using `setScrollOffsetLocked`, `scrollByLocked`, and `*SelectionLocked` helpers inside the widget-owned session lock."
            - "2026-03-09: Wheel-scroll and scrollbar drag offset mapping now go through backend helpers (`scrollWheelLocked`, `setScrollOffsetFromNormalizedTrackLocked`) instead of widget-local scrollback mutation policy."
            - "2026-03-09: Multi-click selection gesture policy now goes through backend helpers (`beginClickSelectionLocked`, `extendGestureSelectionLocked`) and one backend-defined gesture state struct instead of widget-local anchor/mode branching."
            - "2026-03-09: Row-content gating for click and late-start drag selection now lives in backend helpers (`beginClickSelectionLocked`, `selectOrUpdateCellInRowLocked`), so the widget no longer consults selection row semantics directly."
            - "2026-03-09: Terminal scrollbar drag state now lives on `TerminalWidget` instead of generic app runtime state, and the terminal input/draw hook chain no longer threads terminal-only drag pointers through app glue."
            - "2026-03-09: Left-button release now resets terminal scrollbar/selection drag state in one authoritative widget path, removing duplicated per-branch reset logic in terminal input handling."
            - "2026-03-09: Selection drag-threshold and left-release reset transitions were factored into explicit widget-input helpers (`selectionDragIsActive`, `resetLeftDragState`) to reduce duplicated branch-local state mutation."
            - "2026-03-08: Visible-terminal polling now requests redraws from active-session published cache generation changes rather than `hasData()`/poll activity alone, so frame scheduling follows cache publication instead of threaded PTY pressure heuristics."
            - "2026-03-08: Added reloadable `terminal.texture_shift` renderer config as a kill-switch for the viewport texture self-copy optimization; disabling it preserves the normal redraw fallback path."
            - "2026-03-08: Extracted viewport texture-shift gating into a pure draw helper and added unit coverage for shift-enabled, shift-disabled, oversize-shift, forced-full, and scrollback-view cases."
            - "2026-03-08: Workspace poll metrics now treat active-tab spillover as either PTY readiness or unpublished-generation backlog, and poll probes log both current-generation and published-generation movement instead of treating `hasData()` as the only backlog signal."

        - id: UI-PERF-03
          title: "Bound terminal workspace polling cost per frame"
          status: done
          files_to_edit:
            - src/app/visible_terminal_frame.zig
            - src/app/poll_visible_terminal_sessions_runtime.zig
            - src/terminal/core/workspace.zig
          notes:
            - "Introduce poll budget/fairness with active-tab priority."
            - "Ensure many-tab output does not stall UI update."
            - "2026-03-07: Added workspace-owned bounded polling policy (`PollBudget` model; later exposed to app runtime through `pollForFrame(...)`) with active-tab-first + bounded background round-robin polling."
            - "2026-03-07: Visible-terminal runtime now uses tighter per-frame budgets when input is active and slightly larger budgets when idle."
            - "2026-03-07: Regression tuning for terminal TUIs (rain/stress): added bounded multi-poll passes for active tab and raised runtime poll budgets to improve frame smoothness and key-to-pixel latency while keeping polling bounded."
            - "2026-03-07: Terminal passive-move gating now uses explicit per-frame `InputBatch.mouse_moved` signal instead of relying on mouse events list population."
            - "2026-03-07: Renderer key/text/focus input queues now use O(1) head-pop with per-frame compaction instead of O(n) orderedRemove(0) front pops."

        - id: UI-PERF-04
          title: "Remove synchronous grammar bootstrap from frame path"
          status: done
          files_to_edit:
            - src/app/editor_display_prepare.zig
            - src/editor/editor.zig
          notes:
            - "No spawnAndWait from update/draw hooks."
            - "Use async/pending state and user-facing notice path."
            - "2026-03-07: Replaced frame-path grammar auto-bootstrap `spawnAndWait` with detached background worker + shared state (`idle/running/succeeded/failed`)."
            - "2026-03-07: Highlighter init now returns immediately while bootstrap is running; load is retried after completion without blocking update/draw."

    - name: "Phase 6 - Terminal UI Boundary Cleanup"
      tasks:
        - id: UI-TB-01
          title: "Shrink TerminalWidget to presentation/orchestration only"
          status: todo
          files_to_edit:
            - src/ui/widgets/terminal_widget.zig
            - src/ui/widgets/terminal_widget_draw.zig
            - src/ui/widgets/terminal_widget_input.zig
          notes:
            - "Current hotspot review (2026-03-09): the widget still owns backend/app policy including dirty ack, kitty upload lifecycle, selection/scrollbar policy, and open/hover policy."
            - "Do not mix this with `TerminalSession` decomposition until ownership contracts are written down."

        - id: UI-TB-02
          title: "Remove duplicate snapshot-vs-visible hover/open paths"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget_hover.zig
            - src/ui/widgets/terminal_widget_open.zig
            - src/ui/widgets/terminal_widget_input.zig
          notes:
            - "The current code keeps both visible-cache and snapshot-based paths; converge on one authoritative UI-side contract after boundary cleanup."
            - "2026-03-09: Removed the stale snapshot-based hover/open path and rewired the remaining tests to the visible-cache seam that production input uses."

        - id: UI-TB-03
          title: "Move terminal dirty acknowledgement out of widget draw"
          status: todo
          files_to_edit:
            - src/ui/widgets/terminal_widget_draw.zig
            - src/terminal/core/terminal_session.zig
            - src/terminal/core/view_cache.zig
          notes:
            - "Current hotspot review (2026-03-09): widget draw still calls generation-guarded dirty-clear APIs after upload."
            - "Long-term target: renderer consumes published terminal state; backend owns ack/publication lifecycle."

        - id: UI-PERF-05
          title: "Move search recompute off UI thread with generation cancellation"
          status: done
          files_to_edit:
            - src/editor/editor.zig
            - src/app/editor_input_runtime.zig
          notes:
            - "Literal/regex search recompute should not block keystroke handling."
            - "Only latest generation result may commit."
            - "2026-03-07: Added background search worker in `Editor` with generation-based cancellation and non-blocking queueing."
            - "2026-03-07: Search results are now applied during `editor_display_prepare` via `editor.applyPendingSearchWork()`."
            - "2026-03-07: Kept synchronous search recompute path only for replace operations that require immediate correctness."

        - id: UI-PERF-06
          title: "Remove synchronous file detect I/O from terminal ctrl+click path"
          status: done
          files_to_edit:
            - src/app/terminal_widget_input_runtime.zig
            - src/app/file_detect.zig
          notes:
            - "Avoid open/stat/read in immediate input callback."
            - "Use deferred check or optimistic open policy."
            - "2026-03-07: Removed sync open/stat/read probe from ctrl+click path; file-detect is now a cheap no-I/O extension heuristic."
            - "2026-03-07: Ctrl+click open uses guarded optimistic open calls and logs failures without bubbling errors through input callback."

        - id: UI-PERF-07
          title: "Add frame-phase metrics for lock wait and poll budgets"
          status: done
          files_to_edit:
            - src/app/frame_render_idle_runtime.zig
            - src/terminal/core/workspace.zig
            - src/ui/widgets/terminal_widget_draw.zig
          notes:
            - "Track lock wait time, poll bytes/tabs processed, and per-frame spillover."
            - "2026-03-07: Added terminal poll frame metrics snapshot in workspace (`lastPollFrameMetrics`) with active/background budget usage and spillover/backlog hints."
            - "2026-03-07: Added terminal draw phase latency snapshot in terminal widget draw (`latestFrameLatencyMetrics`) for lock/snapshot vs render timing."
            - "2026-03-07: Integrated terminal poll/draw metrics into existing `input.latency` logging with sequence-gated emission to avoid stale/noisy repeats."
            - "2026-03-07: Expanded terminal draw metrics to expose `cache_copy_ms`, `texture_update_ms`, and `overlay_ms`; added `terminal.ui.perf` log tag and mirrored phase fields into `input.latency` output."
            - "2026-03-07: Added `sync` + `clear_ok` fields to `terminal.ui.perf` and generation-guarded render-cache-only dirty clear during synchronized updates to diagnose/avoid sticky partial texture updates."
            - "2026-03-07: Removed generation-only redraw forcing; cache generation now updates without texture invalidation when view content is unchanged (`view.dirty == .none`)."
            - "2026-03-07: Made viewport texture-shift copy one-shot per new cache generation to prevent repeated `partial=1` redraws when `dirty=none`."
            - "2026-03-07: Removed scroll-path full-damage forcing and switched full-screen scroll mutation to row-range partial damage, allowing scroll-heavy TUIs (e.g. `rain`) to avoid unnecessary full redraws."
            - "2026-03-07: Reverted an experimental 'shift-on-full' texture optimization after it introduced visible scrollback tearing/late text reveal; correctness takes priority over that optimization path."
            - "2026-03-07: Fixed viewport-shift partial redraw to repaint full-width newly exposed rows (do not reuse stale dirty column ranges for shift rows), addressing blank/invisible scrollback blocks under heavy output."
            - "2026-03-07: Reduced idle-loop sleep to 1ms while active terminal output is pending (`session.hasData()`), preventing 100ms idle backoff from causing visible stutter/frozen lines during high-throughput terminal output."

        - id: UI-PERF-08
          title: "Verification pass for latency under heavy terminal output and large editor files"
          status: pending
          commands:
            - zig build run -- --mode terminal
            - zig build run
          notes:
            - "Use local perf logs to confirm update/draw phases stay bounded."
            - "2026-03-08: High-refresh terminal investigation is now the primary verification target; see `app_architecture/review/TERMINAL_240HZ_RAIN_INVESTIGATION.md`."
            - "2026-03-08: Kitty differential review indicates no explicit high-Hz guard; likely issue surface is Zide redraw scheduling and/or viewport texture-shift partial update correctness."
            - "2026-03-08: Reproduction updated: issue correlates more strongly with large single-tile Hyprland layout size than refresh rate alone."
            - "2026-03-08: Added temporary investigation guard disabling render-target self-copy shift path in `src/ui/renderer/gl_backend.zig` to validate compositor/driver-sensitive texture-shift hypothesis."
            - "2026-03-08: User validation reported no meaningful improvement from the shift-copy guard alone; continue with redraw scheduling and large-target texture sync probes."
            - "2026-03-08: Parse thread wait-timeout warnings were downgraded (timeout is expected), reducing log spam while preserving non-timeout warning signal."
            - "2026-03-08: Probe clarification: logs came from one `ascii-rain` process while only resizing the same window between smaller/larger sizes (not multi-instance load)."
            - "2026-03-08: Added temporary guard in `src/ui/widgets/terminal_widget_draw.zig` to force full texture update on generation/dirty activity, isolating partial invalidation correctness as a root-cause candidate."
            - "2026-03-08: Correction from user logs: symptom is not resize-event-specific; launching directly in large full-tile state reproduces while half-tile state often does not."
            - "2026-03-08: Added instrumentation-only `terminal.ui.statebug` logs (draw-gap/gen-delta/dirty spans + idle-pressure snapshots) in `terminal_widget_draw`, `terminal_widget`, and `frame_render_idle_runtime`."
            - "2026-03-08: Added poll-path probe logging in `poll_visible_terminal_sessions_runtime` for `hasData` pre/post and generation pre/post to validate idle-backoff false-negative hypothesis."
            - "2026-03-08: Logs confirmed `idle_backoff_after_gen_advance` windows (`sleep_ms=0.033`) shortly after generation movement when `hasData=0`; applied fix candidate in `frame_render_idle_runtime` to hold 1ms sleep for 250ms after generation advances."
            - "2026-03-08: Stronger fault signal: large-tile traces stay in `dirty=full` for long stretches, keeping the terminal on full-surface redraws. Updated `view_cache` so `clear_generation` churn from live-bottom scrollback updates does not force full damage when `scroll_offset==0`."
            - "2026-03-08: Added full-dirty source attribution (`FullDirtyReason` + `full_dirty_seq`) from grid -> render cache -> `terminal.ui.perf`/`terminal.ui.statebug` so each `dirty=full` frame reports who requested it."
            - "2026-03-08: Added terminal-session regression coverage for the live-bottom scroll case: a full-region scroll now publishes `dirty=partial` with `viewport_shift_rows=1` instead of forcing a clear-generation full redraw."
            - "2026-03-08: Removed the no-thread `feedOutputBytes(...)` blanket force-full request and added regression coverage so direct parser feeds keep incremental damage after the initial baseline publish."
            - "2026-03-09: Fresh rain logs showed top rows do participate in partial damage on many frames; the more consistent remaining bug is redraw cadence (`draw_gap_ms~120`) while generations jump sharply between draws."
            - "2026-03-09: `frame_render_idle_runtime` now treats `currentGeneration != publishedGeneration` as terminal pressure, so parse-thread backlog keeps the UI loop on 1ms sleeps instead of falling into 33/100ms idle backoff."
            - "2026-03-09: Added temporary `cache_refine` tracing in `view_cache` to compare source dirty spans with post-hash refined dirty spans on the next repro run."
            - "2026-03-09: New `cache_refine` logs showed the stronger bug: source damage still starts at row 0, but row-hash refinement was diffing against the newest published cache even when draw had not presented that generation yet, collapsing dirty rows toward the bottom."
            - "2026-03-09: Added `presented_generation` tracking from `terminal_widget_draw` back into `TerminalSession`; `view_cache` now only performs row-hash refinement when the refinement base matches the last presented cache generation."
            - "2026-03-09: Added regression coverage for repeated scroll publications without an intervening draw so top-row damage cannot be refined away by unseen intermediate publications."
            - "2026-03-09: Full-screen rain repro after the presented-generation fix now keeps refinement aligned and is visually close to correct; user reported it as the best result so far."
            - "2026-03-09: Removed temporary `cache_refine`/row-dirty probe logging from the hot path and dropped the obsolete `generation changed + dirty=none => full redraw` fallback from `terminal_widget_draw`."
            - "2026-03-09: Removed the blanket `scroll_offset > 0 => full redraw` policy from `terminal_widget_draw`; partial texture uploads are now allowed while scrolled when the render cache itself reports partial damage."
            - "2026-03-09: Added draw-path unit coverage for the new texture update plan so scrolled partial damage stays test-locked while texture-not-ready still forces a full upload."
            - "2026-03-09: Retired the temporary `terminal.ui.statebug` investigation probes from widget draw, visible-terminal poll, and idle scheduling paths after the render-path diagnosis converged."
            - "2026-03-09: Removed widget-local scroll-history redraw forcing from `terminal_widget_draw`; scroll/viewport redraw policy now trusts the published render cache instead of a second widget-side scroll-change bit."
            - "2026-03-09: Removed widget-local alt-screen transition forcing from the draw texture update plan; alt-screen redraw policy now follows the published render cache, while alt-exit timing logs remain intact."
            - "2026-03-09: Removed the `viewport texture shift unavailable => full redraw` fallback; shift is now a pure optimization, and disabled/oversize/forced-full cases fall back to normal published damage instead."
            - "2026-03-09: Narrowed kitty-driven full redraws so static kitty content no longer forces a full texture update by itself; that renderer-side overlap policy was later superseded by backend-published kitty dirty ranges plus partial kitty repainting."
            - "2026-03-09: Blink phase changes now use the partial redraw path instead of acting as a blanket full-redraw reason; kitty overlap no longer forces full because partial draws repaint kitty layers directly."
            - "2026-03-09: Removed the redundant sync-updates `requestForceFullDamage(...)` path from `TerminalSession`; disabling sync updates now relies on model-published full dirty, and enabling sync updates stays clean when nothing else changed."
            - "2026-03-09: `view_cache` now publishes visible scrollback-history generation, so scrolled history mutations can be row-hash diffed against the last presented cache instead of leaning on generic force-full invalidation."
            - "2026-03-09: Visible-history changes without a presented diff base now stay on the partial path as full-width damage instead of escalating to a formal `view_cache` full redraw."
            - "2026-03-09: Pure `clear_generation` deltas no longer trigger `view_cache` full redraws by themselves; they now only invalidate cache reuse while visible repaint still follows the screen model's own damage."
            - "2026-03-09: Reverse-video toggles and palette remaps now publish full-width partial damage instead of formal full redraw, and `view_cache` no longer treats screen-reverse state change as a separate forced-full path."
            - "2026-03-09: `screen.clear()` and full `ED` variants now stay on the partial path as full-width damage instead of formal full redraw."
