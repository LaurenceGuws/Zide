sdl3_migration:
  scope:
    description: "Add SDL3 build path behind a switch, then make SDL3 the default."
    priorities:
      - "extraction-only refactors (no behavior change)"
      - "keep the fallback path stable"
      - "shim layer to isolate SDL API differences"
      - "small, reviewable commits"
  constraints:
    - "SDL3 is default while validation completes."
    - "No behavior changes while wiring the shim."
    - "Keep logging output identical where possible."

  entry_points:
    - src/ui/renderer.zig
    - src/platform/window.zig
    - src/platform/input.zig
    - build.zig

  phase_0_build:
    - id: S0-01
      title: "Add SDL3 build path behind a switch"
      status: done
      files_to_edit:
        - build.zig
    - id: S0-02
      title: "Document SDL3 install + build flag"
      status: done
      files_to_edit:
        - docs/DEPENDENCIES.md
        - app_architecture/BOOTSTRAP.md

  phase_1_shim:
    - id: S1-01
      title: "Create SDL shim module"
      status: done
      files_to_add:
        - src/platform/sdl_api.zig
      files_to_edit:
        - src/ui/renderer/gl.zig
    - id: S1-02
      title: "Route window creation + GL context through shim"
      status: done
      files_to_edit:
        - src/ui/renderer/window_init.zig

  phase_2_events:
    - id: S2-01
      title: "Shim event structs/enums for window + input"
      status: done
      files_to_edit:
        - src/platform/input_events.zig
        - src/platform/window_events.zig
        - src/ui/renderer.zig
    - id: S2-02
      title: "Shim text input + text editing payloads"
      status: done
      files_to_edit:
        - src/platform/input_events.zig
        - src/ui/renderer.zig

  phase_3_sdl3_backend:
    - id: S3-01
      title: "Add SDL3 implementation inside shim"
      status: done
      files_to_edit:
        - src/platform/sdl_api.zig
        - build.zig
    - id: S3-02
      title: "SDL3 build smoke check (compile-only)"
      status: done
      notes:
        - "zig build"
        - "Note: the -Dsdl-version switch was removed; SDL3 is the only build path."

  phase_4_validation:
    - id: S4-01
      title: "Runtime smoke: window + input + text input"
      status: done
      notes:
        - "Run on Linux first."
        - "Use build/run: zig build run -- --mode terminal"
    - id: S4-02
      title: "Fix SDL3 text input pointer lifetime (process events immediately)"
      status: done
      files_to_edit:
        - src/ui/renderer.zig
        - src/ui/renderer/sdl_input.zig
      notes:
        - "SDL3 event polling now handled on the main thread; terminal-only text input flows on Wayland."
    - id: S4-03
      title: "Clean up temporary SDL3 input logging"
      status: pending
      notes:
        - "Remove input.sdl/raw pointer logs once SDL3 text input is stable across Linux."

  phase_5_cleanup:
    - id: S5-01
      title: "Decide when to drop the fallback build"
      status: done
      notes:
        - "SDL2 fallback removed; SDL3-only build path now active."
