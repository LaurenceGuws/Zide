renderer_todo:
  scope:
    description: "Renderer modularization + OS abstraction boundaries (Linux SDL3+OpenGL stable; Windows prep)."
    priorities:
      - "extraction-only refactors (no behavior change)"
      - "clear OS boundary (platform window/input vs renderer backend)"
      - "stable renderer interface for multi-backend targets"
      - "minimal churn in UI widgets"
  constraints:
    - "Do not change behavior during extraction-only moves."
    - "Keep diffs small and reviewable."
    - "Run manual smoke checks after each extraction step."

  entry_points:
    - src/ui/renderer.zig
    - src/app_shell.zig
    - src/main.zig

  references:
    - app_architecture/ui/DEVELOPMENT_JOURNEY.md
    - app_architecture/APP_LAYERING.md
    - reference_repos/editors/lite-xl/README.md
    - reference_repos/terminals/kitty/docs/overview.rst
    - reference_repos/terminals/ghostty/README.md

  boundaries:
    renderer_core:
      - "src/ui/renderer.zig: orchestration, state, public API"
      - "src/ui/renderer/interface.zig: backend-agnostic surface"
      - "src/ui/renderer/types.zig: shared renderer types"

    renderer_helpers:
      gl_backend:
        - src/ui/renderer/gl_backend.zig
        - src/ui/renderer/gl_resources.zig
        - src/ui/renderer/targets.zig
      input:
        - src/ui/renderer/sdl_input.zig
        - src/ui/renderer/input_state.zig
        - src/ui/renderer/input_queue.zig
        - src/ui/renderer/input_logging.zig
        - src/ui/renderer/key_state.zig
        - src/ui/renderer/key_queue.zig
        - src/ui/renderer/mouse_state.zig
        - src/ui/renderer/mouse_wheel.zig
        - src/ui/renderer/text_input.zig
        - src/ui/renderer/text_composition.zig
      window:
        - src/ui/renderer/window_init.zig
        - src/ui/renderer/window_flags.zig
        - src/ui/renderer/window_metrics_state.zig
      draw:
        - src/ui/renderer/draw_ops.zig
        - src/ui/renderer/draw_batch.zig
        - src/ui/renderer/shape_utils.zig
        - src/ui/renderer/shape_draw.zig
        - src/ui/renderer/texture_draw.zig
        - src/ui/renderer/target_draw.zig
      text:
        - src/ui/renderer/text_draw.zig
        - src/ui/renderer/terminal_glyphs.zig
        - src/ui/renderer/terminal_underline.zig
      misc:
        - src/ui/renderer/font_manager.zig
        - src/ui/renderer/clipboard.zig
        - src/ui/renderer/clipboard_state.zig
        - src/ui/renderer/texture_utils.zig
        - src/ui/renderer/scale_utils.zig
        - src/ui/renderer/time_utils.zig

    platform_surface:
      - src/platform/window.zig
      - src/platform/window_events.zig
      - src/platform/window_metrics.zig
      - src/platform/input.zig
      - src/platform/input_events.zig
      - src/platform/mouse_state.zig

    backend_stubs:
      - src/ui/renderer/backends/wgl.zig
      - src/ui/renderer/backends/egl.zig
      - src/ui/renderer/backends/metal.zig
      - src/ui/renderer/backends/gles.zig

  status:
    extraction_phase: complete
    build:
      last_check: "zig build (2026-01-31)"
      status: pass

  remaining_work:
    - "Only extract when a renderer block grows beyond a single responsibility or crosses platform/renderer boundaries."
    - "Add focused tests once a replay harness exists (see workflow constraints)."
    - "Revisit Windows smoke build deps once vcpkg env is ready."
