terminal_ligatures_todo:
  scope:
    description: "Add first-class terminal ligature support (kitty/ghostty parity) without breaking monospace grid correctness."
    goals:
      - "Programming ligatures render by default for compatible fonts (examples: ->, ~>, =>, !=, ===)."
      - "Users can control ligature behavior with proven strategies from kitty/ghostty conventions."
      - "Cursor, selection, copy, and styling remain predictable while ligatures are enabled."
    non_goals:
      - "No broad editor-pipeline changes in this track (terminal-first scope)."
      - "No speculative feature additions unrelated to ligature shaping behavior."

  references:
    kitty:
      - "reference_repos/terminals/kitty/kitty/options/definition.py"
      - "reference_repos/terminals/kitty/kitty/fonts.c"
      - "reference_repos/terminals/kitty/kitty/screen.c"
      - "reference_repos/terminals/kitty/kitty/state.h"
    ghostty:
      - "reference_repos/terminals/ghostty/src/config/Config.zig"
      - "reference_repos/terminals/ghostty/src/font/shaper/feature.zig"
      - "reference_repos/terminals/ghostty/src/font/shaper/run.zig"
      - "reference_repos/terminals/ghostty/src/terminal/Screen.zig"

  zide_code:
    - "src/ui/widgets/terminal_widget_draw.zig"
    - "src/ui/terminal_font.zig"
    - "src/ui/renderer.zig"
    - "src/config/lua_config.zig"
    - "assets/config/init.lua"
    - "src/main.zig"

  constraints:
    - "Preserve cell width invariants from the terminal model (no width poisoning from shaping)."
    - "No regressions for combining marks, emoji ZWJ, or fallback font boundaries."
    - "Run splitting must remain deterministic around style and cursor boundaries."
    - "Keep diff reviewable: config/wiring, shaping, and fixtures staged as separate steps."

  commands:
    always:
      - zig build
      - zig build test
      - zig build check-app-imports
      - zig build check-input-imports
      - zig build check-editor-imports
    smoke:
      - zig build run -- --mode terminal
      - ZIDE_FONT_SAMPLE_FRAMES=3 zig build run -- --mode font-sample

  phases:
    - name: "Phase 0 - Behavior Contract"
      tasks:
        - id: TL-0-01
          title: "Write ligature behavior contract and parity notes"
          status: todo
          files_to_edit:
            - app_architecture/ui/terminal_ligatures_todo.yaml
            - app_architecture/ui/font_rendering_architecture.md
          notes:
            - "Capture exact semantics for default behavior and disable strategies."
            - "Document differences between general ligatures (liga/dlig) and programming ligatures (calt) based on kitty docs."

    - name: "Phase 1 - Config Surface (Kitty/Ghostty conventions)"
      tasks:
        - id: TL-1-01
          title: "Add terminal disable_ligatures strategy"
          status: done
          files_to_edit:
            - src/config/lua_config.zig
            - assets/config/init.lua
            - src/main.zig
          notes:
            - "Strategy values: never | cursor | always (kitty-style naming/meaning)."
            - "Default should match first-class ligature support expectation (render ligatures unless strategy disables)."

        - id: TL-1-02
          title: "Add terminal font_features override"
          status: done
          files_to_edit:
            - src/config/lua_config.zig
            - assets/config/init.lua
            - src/main.zig
          notes:
            - "Support HarfBuzz-like feature strings inspired by ghostty/kitty conventions."
            - "Allow disabling/enabling calt/liga/dlig explicitly from user config."

    - name: "Phase 2 - Shaping Pipeline Refactor"
      tasks:
        - id: TL-2-01
          title: "Refactor run shaping to accept feature policy"
          status: done
          files_to_edit:
            - src/ui/widgets/terminal_widget_draw.zig
            - src/ui/terminal_font.zig
          notes:
            - "Remove hardcoded forced disabling of liga/clig/dlig/hlig/calt."
            - "Build feature list per run from config + strategy."
            - "Implemented: per-run feature array combines parsed terminal.font_features with strategy-driven calt disable when requested."

        - id: TL-2-02
          title: "Implement cursor-aware run splitting strategy"
          status: in_progress
          files_to_edit:
            - src/ui/widgets/terminal_widget_draw.zig
            - src/terminal/model/screen/screen.zig
          notes:
            - "When disable strategy is cursor, split runs around cursor like ghostty's shaping-break cursor behavior."
            - "Ensure cursor movement marks impacted rows dirty for reshape correctness."
            - "Current implementation splits shaping spans around cursor cell in draw path and disables programming ligatures for cursor span."

        - id: TL-2-03
          title: "Preserve style boundaries while ligatures are enabled"
          status: todo
          files_to_edit:
            - src/ui/widgets/terminal_widget_draw.zig
          notes:
            - "A ligature must not cross style boundaries that would cause wrong coloring."
            - "Keep selection/underline behavior coherent for multi-cell glyph clusters."

    - name: "Phase 3 - Rendering + Interaction Correctness"
      tasks:
        - id: TL-3-01
          title: "Map ligature clusters to cells deterministically"
          status: todo
          files_to_edit:
            - src/ui/widgets/terminal_widget_draw.zig
          notes:
            - "Cell hit-testing, cursor placement, and selection drag must stay cell-based."
            - "No visual overlap bugs when ligature spans multiple columns."

        - id: TL-3-02
          title: "Clipboard and selection audit for ligature runs"
          status: todo
          files_to_edit:
            - src/ui/widgets/terminal_widget_input.zig
            - src/terminal/core/selection.zig
          notes:
            - "Copied text must remain source codepoints, not shaped glyph artifacts."
            - "Double-click/word-select should behave predictably near ligature clusters."

    - name: "Phase 4 - Fixtures, Perf, and Rollout"
      tasks:
        - id: TL-4-01
          title: "Add ligature fixture strings and screenshots"
          status: todo
          files_to_edit:
            - src/ui/font_sample_view.zig
            - fixtures/ui/font_sample/README.txt
            - fixtures/ui/font_sample/*.ppm
          notes:
            - "Include ->, ~>, =>, ==, ===, !=, !==, <=, >=, <=>, and mixed-style boundary probes."
            - "Capture both cursor-over and cursor-away cases for strategy validation."

        - id: TL-4-02
          title: "Add terminal replay/smoke verification checklist"
          status: todo
          files_to_edit:
            - app_architecture/ui/terminal_ligatures_todo.yaml
          notes:
            - "Track required smoke scenarios for kitty/ghostty-like ligature behavior."

        - id: TL-4-03
          title: "Benchmark run-shaping overhead with ligatures enabled"
          status: todo
          files_to_edit:
            - src/ui/widgets/terminal_widget_draw.zig
            - app_architecture/ui/terminal_ligatures_todo.yaml
          notes:
            - "Record baseline and post-change frame timings in terminal-heavy scenes."
            - "Keep expected perf envelope explicit before default rollout."
