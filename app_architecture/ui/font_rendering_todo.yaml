font_rendering_todo:
  scope:
    description: "Make Zide's editor + terminal text rendering competitive with modern terminals (kitty/ghostty-tier): crisp at small sizes, consistent weight, correct blending, robust across font families, and stable metrics."
    note: "Editor and terminal do not need to share the same font stack; they optimize for different constraints."
    primary_fonts:
      - "assets/fonts/JetBrainsMonoNerdFont-Regular.ttf (currently acceptable with existing pipeline)"
      - "assets/fonts/IosevkaTermNerdFont-Regular.ttf (primary stress font; still under iteration)"
    priorities:
      - "correct color pipeline (linear blending + predictable gamma)"
      - "hinting policy control (light/normal/none + autohint)"
      - "atlas formats match data (coverage vs color glyphs)"
      - "performance: keep glyph upload incremental + bounded per-frame"
      - "terminal/editor splits are explicit and documented"

  context:
    reference_repos:
      - "kitty: reference_repos/terminals/kitty (freetype load flags + shader gamma tuning)"
      - "ghostty: reference_repos/terminals/ghostty (atlas split + linear blending + optional weight correction)"
    architecture_doc:
      - "app_architecture/ui/font_rendering_architecture.md"
    zide_code:
      - "glyph rasterization + atlas upload: src/ui/terminal_font.zig"
      - "renderer/blending + shader: src/ui/renderer/gl_backend.zig"
      - "font init + scale: src/ui/renderer/font_manager.zig"
      - "text helpers (non-terminal UI): src/ui/renderer/text_draw.zig"
    known_current_gaps:
      - "Terminal run-based shaping is implemented (FR-3-01). Remaining work is verification + edge-case mapping (clusters spanning cells, fallback boundaries, and width policy)."
      - "Combining marks are supported but currently capped (cell stores 2 combining codepoints; FR-3-00)."
      - "Double-width glyph layout (wcwidth/east-asian-width policy) is not explicitly implemented in the model/render pipeline."
      - "LCD/subpixel AA is not a final solution and remains opt-in/experimental."

  constraints:
    - "This work changes rendering behavior; introduce a repeatable visual/metric harness before large changes."
    - "SDL3/OpenGL path is the current baseline; keep builds/tests green throughout."
    - "Avoid platform-specific rabbit holes early; get Linux OpenGL path correct first, then expand."

  commands:
    always:
      - zig build
      - zig build test
      - zig build check-app-imports
      - zig build check-input-imports
      - zig build check-editor-imports
    smoke:
      - zig build run -- --mode terminal
      - zig build run
    debug_toggles_env:
      - "ZIDE_TERMINAL_UI_BENCH=1 (per-frame terminal draw timing)"
      - "config.font_rendering.lcd=true (subpixel path; not a final solution)"
      - "config.font_rendering.hinting=\"default\"|\"none\"|\"light\"|\"normal\""
      - "config.font_rendering.autohint=true (forces FreeType autohint)"
      - "ZIDE_FONT_SAMPLE_SIZE=<float> (font sample mode initial size)"
      - "ZIDE_FONT_SAMPLE_FRAMES=<n> (font sample mode auto-close after n frames; useful for smoke/CI)"
      - "ZIDE_FONT_SAMPLE_SCREENSHOT=<path> (write a .ppm screenshot on auto-close in font sample mode)"
      - "config.font_rendering.text.gamma=<float> (coverage gamma; default 1.0)"
      - "config.font_rendering.text.contrast=<float> (coverage contrast; default 1.0)"
      - "config.font_rendering.text.linear_correction=true/false (linear correction; default true)"

  phases:
    - name: "Phase 0 - Architecture + Fixture Authority"
      tasks:
        - id: FR-0-00
          title: "Document font rendering architecture and module contracts"
          status: done
          files_to_edit:
            - app_architecture/ui/font_rendering_architecture.md
            - app_architecture/ui/font_rendering_todo.yaml
          notes:
            - "Define shaping/raster/atlas/renderer responsibilities and conversion boundaries."
            - "Explicitly allow editor and terminal font stacks to diverge."

        - id: FR-0-01
          title: "Add a deterministic font sample grid view (or screenshot-like buffer)"
          status: done
          files_to_edit:
            - src/main.zig
            - src/ui/font_sample_view.zig
          notes:
            - "Goal: A/B compare JetBrainsMono vs IosevkaTerm at multiple sizes without manual terminal interaction."
            - "Keep it dev-only or gated behind env var/flag."
            - "Implemented as a dedicated app mode: `zig build run -- --mode font-sample` (renders JetBrainsMono vs IosevkaTerm side-by-side)."
            - "Size control: set `ZIDE_FONT_SAMPLE_SIZE=<float>` and adjust interactively with +/- keys."
            - "For a short smoke-run without interaction: `ZIDE_FONT_SAMPLE_FRAMES=3 zig build run -- --mode font-sample`."

        - id: FR-0-02
          title: "Expand reference captures (sizes/backgrounds/strings)"
          status: done
          files_to_edit:
            - fixtures/ui/font_sample/README.txt
            - fixtures/ui/font_sample/*.ppm
          notes:
            - "Not called goldens yet. Used to catch obvious regressions while iterating."
            - "Use JetBrainsMonoNerdFont + IosevkaTermNerdFont."
            - "Sizes: 12/14/16/20."
            - "Backgrounds: normal bg, selection bg, inverted cursor cell."
            - "Strings: ASCII stems, punctuation, box drawing, braille, combining marks, Nerd Font icons, emoji sequences."

    - name: "Phase 1 - Correct Blending Pipeline (ghostty-style)"
      tasks:
        - id: FR-1-01
          title: "Split terminal font atlas into coverage vs color"
          status: done
          files_to_edit:
            - src/ui/terminal_font.zig
          notes:
            - "Coverage atlas: 8-bit single channel (coverage/mask only)."
            - "Color atlas: RGBA8 premultiplied for emoji/color glyphs."

        - id: FR-1-02
          title: "Add glyph/text shader path that supports linear blending + fallback"
          status: done
          files_to_edit:
            - src/ui/renderer/gl_backend.zig
          notes:
            - "Model after ghostty: reference_repos/terminals/ghostty/src/renderer/shaders/glsl/cell_text.f.glsl and common.glsl."
            - "If we can't rely on an sRGB framebuffer, unlinearize in shader for compatibility."
            - "Implemented linear offscreen rendering + explicit present conversion; includes optional luminance correction."

        - id: FR-1-03
          title: "Remove CPU-side gamma baking during glyph upload"
          status: done
          files_to_edit:
            - src/ui/terminal_font.zig
          notes:
            - "Coverage stays linear; appearance tuning belongs in the shader pipeline."

        - id: FR-1-04
          title: "Add a text weight/gamma tuning knob"
          status: done
          files_to_edit:
            - src/ui/renderer/gl_backend.zig
          notes:
            - "Kitty uses text_gamma_adjustment; ghostty uses optional linear correction."
            - "Start with one option, wire it through, then iterate."

    - name: "Phase 2 - Hinting + Shaping Consistency (kitty-style controls)"
      tasks:
        - id: FR-2-01
          title: "Introduce configurable hinting policy (none/light/normal + autohint)"
          status: done
          files_to_edit:
            - src/ui/terminal_font.zig
          notes:
            - "Map to FT_LOAD_TARGET_LIGHT/NORMAL and FT_LOAD_NO_HINTING."
            - "Implemented in Lua config: font_rendering.hinting and font_rendering.autohint."

        - id: FR-2-02
          title: "Set HarfBuzz FT load flags to match rasterization"
          status: done
          files_to_edit:
            - src/ui/terminal_font.zig
          notes:
            - "Use hb_ft_font_set_load_flags(...) like kitty does so shaping/metrics align with render."

    - name: "Phase 3 - Terminal Shaping (run-based)"
      tasks:
        - id: FR-3-00
          title: "Support combining marks as grapheme clusters in terminal cells"
          status: done
          files_to_edit:
            - src/terminal/model/screen/screen.zig
            - src/terminal/model/types.zig
            - src/ui/widgets/terminal_widget_draw.zig
            - src/ui/terminal_font.zig
          notes:
            - "Combining marks should attach to the previous cell (no cursor advance)."
            - "Renderer should shape the cluster and draw with correct offsets in linear pipeline."
            - "Include in view-cache hashes + snapshot debug output."

        - id: FR-3-01
          title: "Implement run-based shaping for terminal lines"
          status: done
          files_to_edit:
            - src/ui/terminal_font.zig
            - src/ui/widgets/terminal_widget_draw.zig
          notes:
            - "Move beyond per-codepoint shaping; shape runs and map results back to the monospace grid."
            - "Must preserve stable cell metrics; fallbacks must not poison cell width."
            - "Terminal shaping disables common ligature features (liga/clig/dlig/hlig/calt) to avoid multi-cell ligatures breaking the grid."

    - name: "Phase 4 - Editor Text Pipeline Parity"
      tasks:
        - id: FR-4-01
          title: "Background-aware correction under selections/highlights"
          status: in_progress
          files_to_edit:
            - src/ui/renderer.zig
            - src/ui/renderer/text_draw.zig
          notes:
            - "Editor must supply bg color for text draws (selection, current line, etc.)."
            - "Goal: editor text matches terminal quality under overlays."
            - "Implemented for editor line rendering (current line + selection + gutter) via per-text background in editor draw list."

    - name: "Phase 5 - LCD/Subpixel (optional, only after linear blending is correct)"
      tasks:
        - id: FR-3-01
          title: "Evaluate LCD/subpixel AA with correct color pipeline"
          status: todo
          files_to_edit:
            - src/ui/terminal_font.zig
            - src/ui/renderer/gl_backend.zig
          notes:
            - "Treat as opt-in; behavior varies by subpixel layout and can regress on some displays."

    - name: "Phase 6 - Verification"
      tasks:
        - id: FR-V-01
          title: "Run smoke: terminal mode + default run"
          status: done
          commands:
            - zig build run -- --mode terminal
            - zig build run
          notes:
            - "Smoke-run verified via short `timeout` runs (no crash on startup)."

        - id: FR-V-02
          title: "Regression check: font sample grid screenshot/buffer compare"
          status: in_progress
          notes:
            - "Once FR-0-01 exists, gate larger refactors behind it."
            - "Generated an ad-hoc screenshot via: ZIDE_FONT_SAMPLE_FRAMES=3 ZIDE_FONT_SAMPLE_SCREENSHOT=zig-cache/font_sample.ppm zig build run -- --mode font-sample"
