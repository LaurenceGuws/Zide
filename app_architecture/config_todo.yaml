config_todo:
  scope:
    description: "Treat Lua config as a core subsystem with an explicit parser/runtime/reload contract."
    notes:
      - "The goal is not just to parse tables, but to provide a coherent configuration layer for app shell, renderer, editor, terminal, and input routing."
      - "This is an early-development contract: conservative docs, explicit caveats, and tracked drift matter more than surface breadth."
    priorities:
      - "parser/runtime/reload alignment"
      - "clear default vs override semantics"
      - "consistent validation and diagnostics"
      - "documented alias/compat policy"
      - "accurate public examples"

  zide_integration:
    entry_points:
      - app_architecture/CONFIG.md
      - assets/config/init.lua
      - src/config/lua_config.zig
      - src/main.zig
      - src/input/input_actions.zig
      - src/ui/renderer.zig
      - src/ui/widgets/editor_widget_draw.zig
      - src/ui/widgets/terminal_widget_draw.zig

  current_surface:
    implemented:
      - "logging filters"
      - "SDL log level"
      - "theme palette + syntax"
      - "per-domain theme overrides (app, editor, terminal)"
      - "font rendering knobs"
      - "editor wrap + render budgets"
      - "editor/terminal ligature settings"
      - "terminal cursor/blink/focus reporting/scrollback"
      - "keybind routing with default-fill merge behavior"
    caveats:
      - "per-domain font config is parsed but collapses to one effective runtime font choice"
      - "font rendering options are startup-applied but not reload-applied"
      - "legacy aliases still exist without a clean policy"
      - "modifier support is incomplete for altgr"

  milestones:
    - name: "CFG-01 Contract and docs baseline"
      tasks:
        - id: CFG-01-01
          title: "Replace the old logging-only config doc with a real subsystem doc"
          status: done
          files_to_edit:
            - app_architecture/CONFIG.md
            - docs/INDEX.md
          notes:
            - "Document parser surface, merge rules, runtime consumers, and reload truth."
        - id: CFG-01-02
          title: "Create a dedicated config todo/accuracy tracker"
          status: done
          files_to_add:
            - app_architecture/config_todo.yaml
          notes:
            - "Track config drift the same way terminal/editor/UI subsystems are tracked."
        - id: CFG-01-03
          title: "Classify every current field as reloadable, restart-only, partial, or legacy"
          status: done
          files_to_edit:
            - app_architecture/CONFIG.md
          notes:
            - "Keep this status table current when behavior changes."

    - name: "CFG-02 Runtime truth alignment"
      tasks:
        - id: CFG-02-01
          title: "Decide whether app/editor/terminal fonts are truly separate or intentionally shared"
          status: partial
          files_to_edit:
            - app_architecture/CONFIG.md
            - assets/config/init.lua
            - src/main.zig
            - src/ui/renderer/font_manager.zig
          notes:
            - "Either implement separate font stacks or narrow the public config shape to shared-font truth."
            - "Current decision: public docs/defaults now reflect shared-font truth with precedence `terminal > editor > app`; true separation remains a future implementation task if needed."
        - id: CFG-02-02
          title: "Make reload behavior explicit for every startup-applied field"
          status: todo
          files_to_edit:
            - app_architecture/CONFIG.md
            - src/main.zig
          notes:
            - "Do not leave parsed-on-reload but ignored-at-runtime settings undocumented."
        - id: CFG-02-03
          title: "Reapply font_rendering settings on config reload or mark them permanently restart-only"
          status: done
          files_to_edit:
            - src/main.zig
            - app_architecture/CONFIG.md
            - assets/config/init.lua
          notes:
            - "Reload now reapplies renderer text/font-rendering options, rebuilds fonts, and refreshes terminal sizing."

    - name: "CFG-03 Input and binding correctness"
      tasks:
        - id: CFG-03-01
          title: "Finish modifier-model truth for keybinds"
          status: done
          files_to_edit:
            - src/config/lua_config.zig
            - src/input/input_actions.zig
            - src/types/input.zig
            - app_architecture/INPUT.md
            - app_architecture/CONFIG.md
          notes:
            - "Resolved altgr drift across parser, merge identity, and runtime matching."
            - "Policy choice: altgr stays supported as an advanced desktop/layout-specific exact-match modifier."
        - id: CFG-03-02
          title: "Document and test keybind merge semantics end to end"
          status: partial
          files_to_edit:
            - src/config/lua_config.zig
            - assets/config/init.lua
            - app_architecture/INPUT.md
            - app_architecture/CONFIG.md
          notes:
            - "Merge-by-default is now implemented, but config-level end-to-end tests are still thin."
        - id: CFG-03-03
          title: "Extend Lua-configurable bindings to pointer gestures on the same semantic action layer"
          status: todo
          files_to_edit:
            - src/config/lua_config.zig
            - src/input/input_actions.zig
            - src/ui/widgets/editor_widget_input.zig
            - app_architecture/INPUT.md
            - app_architecture/CONFIG.md
          notes:
            - "Do not hardcode editor multi-cursor gestures into widget logic."

    - name: "CFG-04 Validation and compat policy"
      tasks:
        - id: CFG-04-01
          title: "Normalize validation behavior across config sections"
          status: partial
          files_to_edit:
            - src/config/lua_config.zig
            - app_architecture/CONFIG.md
          notes:
            - "Rule chosen: explicit invalid enum/string/bool values should warn and fall back to documented defaults."
            - "Current coverage now includes SDL log level, ligature strategy fields, terminal blink, and font_rendering fields."
        - id: CFG-04-02
          title: "Define and document alias policy"
          status: todo
          files_to_edit:
            - src/config/lua_config.zig
            - app_architecture/CONFIG.md
            - assets/config/init.lua
          notes:
            - "Examples: raylib->sdl alias, flat theme keys, syntax field synonyms, bool shorthand forms."
        - id: CFG-04-03
          title: "Make parse failures and allocation failures consistent"
          status: todo
          files_to_edit:
            - src/config/lua_config.zig
          notes:
            - "Some helpers swallow errors while others propagate; the subsystem needs one coherent rule."

    - name: "CFG-05 Coverage and reload authority"
      tasks:
        - id: CFG-05-01
          title: "Add config field matrix tests for parser shape and merge behavior"
          status: partial
          files_to_add:
            - src/config_tests.zig
          notes:
            - "Prefer table-driven coverage for sections, aliases, and override order."
            - "Initial authority now exists in `src/config_tests.zig` via `lua_config.zig` parser/merge tests and the dedicated `zig build test-config` target."
        - id: CFG-05-02
          title: "Add reload authority for every field classified as reloadable"
          status: todo
          files_to_edit:
            - src/main.zig
            - src/config/lua_config.zig
          notes:
            - "Config reload should be treated as a tested feature, not a best-effort convenience."
        - id: CFG-05-03
          title: "Keep defaults and docs synchronized as part of every config change"
          status: partial
          files_to_edit:
            - assets/config/init.lua
            - app_architecture/CONFIG.md
            - app_architecture/config_todo.yaml
          notes:
            - "This policy exists now; it needs to stay enforced."
