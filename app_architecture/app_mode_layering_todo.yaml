            - "In progress: editor/terminal tab activation intent emission paths are now routed through dedicated AppState helpers (`activateEditorTabAtCurrentIndex`, `routeTerminalActiveWorkspaceTabIntent`, `routeTerminalActivateTabIdIntent`)."
            - "In progress: shortcut action switch-body routing is now centralized in `handleShortcutAction(...)`."
