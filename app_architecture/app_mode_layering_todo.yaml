            - "Done: terminal shortcut action decoding (`new/close/next/prev/focus`) is centralized in `src/app/modes/ide/terminal_shortcuts.zig`; `main.zig` now dispatches through one `handleTerminalShortcutIntent(...)` route."
            - "Done: terminal tab drag reorder (`move`) and tab-click focus (`activate`) now route through adapter intents; parity diagnostics are available via `app.mode.parity` logging."
            - "Done: close-confirm intent emission now routes through shared tab-action helpers; focused unit tests cover close/reorder intent helper behavior."
            - "Done: terminal action emission is being consolidated through `routeTerminalTabActionAndSync(...)` to reduce duplicated adapter sync logic."
