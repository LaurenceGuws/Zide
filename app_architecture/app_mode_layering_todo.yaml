app_mode_layering_todo:
  scope:
    description: "Split app mode orchestration into shared runtime contracts + backend implementations + thin IDE composition, enabling focused binaries without behavior regressions."
    goals:
      - "Reduce `src/main.zig` ownership to bootstrap + host wiring."
      - "Create a shared public mode layer reusable by terminal-only/editor-only and IDE hosts."
      - "Keep current runtime `--mode` behavior compatible while preparing build-time focused binaries."
      - "Enforce regression gates between each extraction slice."
    non_goals:
      - "No feature changes to editor or terminal behavior."
      - "No FFI ABI expansion in this track."
      - "No renderer architecture redesign in this track."

  layering_model:
    shared_public_layer:
      path: "src/app/modes/shared/"
      responsibilities:
        - "Mode contracts, action DTOs, shared tab/session abstractions."
        - "Host-agnostic mode lifecycle and routing interfaces."
    backend_layer:
      path: "src/app/modes/backend/"
      responsibilities:
        - "Concrete editor and terminal mode implementations."
        - "Bridges from shared contracts to existing editor/terminal backends."
    ide_layer:
      path: "src/app/modes/ide/"
      responsibilities:
        - "Thin composition of backend modes for full IDE workflow."
        - "IDE-only policy switches; no backend ownership."

  zide_integration:
    entry_points:
      - src/main.zig
      - src/input/input_actions.zig
      - src/ui/widgets/tab_bar.zig
      - src/ui/widgets/editor_widget.zig
      - src/ui/widgets/terminal_widget.zig
      - src/terminal/core/workspace.zig
      - src/editor/editor.zig
      - app_architecture/APP_LAYERING.md

  regression_gates:
    required_after_each_slice:
      - zig build test
      - zig build check-app-imports
      - zig build check-input-imports
      - zig build check-editor-imports
    required_mode_smokes:
      - zig build run
      - zig build run -- --mode terminal
      - zig build run -- --mode editor
      - zig build run -- --mode ide
    required_backend_regressions:
      - zig build test-terminal-replay -- --all
    notes:
      - "Do not advance to the next slice until all gates pass for the current slice."
      - "If a gate fails, either fix in-slice or revert that slice before proceeding."

  milestones:
    - name: "MODE-00 Architecture + contracts"
      tasks:
        - id: MODE-00-01
          title: "Add shared mode contract interfaces and action DTOs"
          status: done
          files_to_add:
            - src/app/modes/shared/contracts.zig
            - src/app/modes/shared/actions.zig
            - src/app/modes/shared/types.zig
          notes:
            - "Extraction-only. No behavior deltas."
        - id: MODE-00-02
          title: "Document mode-layer boundaries and import constraints"
          status: done
          files_to_edit:
            - app_architecture/APP_LAYERING.md
            - app_architecture/app_mode_layering_todo.yaml
          notes:
            - "Shared/backend/ide import allow/deny constraints are now explicitly documented and authoritative."
            - "Until dedicated checks are added, enforce this task by review + existing import checks."
        - id: MODE-00-03
          title: "Extend import checks with mode-layer specific rules"
          status: done
          files_to_edit:
            - tools/app_import_check.zig
            - build.zig
          notes:
            - "Add explicit rule validation for shared/backend/ide boundaries in `src/app/modes/*`."
            - "Keep this separate from extraction work; no behavior changes."

    - name: "MODE-01 Backend extraction"
      tasks:
        - id: MODE-01-01
          title: "Extract terminal mode backend implementation"
          status: in_progress
          files_to_add:
            - src/app/modes/backend/terminal_mode.zig
          files_to_edit:
            - src/main.zig
            - src/terminal/core/workspace.zig
          notes:
            - "Must preserve terminal tab behavior, close modal policy, and focus reporting."
            - "In progress: terminal tab shortcut intents (`create/close/next/prev/focus`) now route through `TerminalMode` adapter alongside runtime behavior."
            - "In progress: terminal shortcut action decoding (`new/close/next/prev/focus`) is centralized in `src/app/modes/ide/terminal_shortcuts.zig`; `main.zig` now dispatches through one `handleTerminalShortcutIntent(...)` route."
            - "In progress: terminal tab drag reorder (`move`) and tab-click focus (`activate`) now route through adapter intents; parity diagnostics are available via `app.mode.parity` logging."
            - "In progress: close-confirm intent emission now routes through shared tab-action helpers; focused unit tests cover close/reorder intent helper behavior."
            - "In progress: terminal action emission is being consolidated through `routeTerminalTabActionAndSync(...)` to reduce duplicated adapter sync logic."
            - "In progress: terminal close-confirm and shortcut close paths now both emit close intent via shared routed helper (`routeTerminalCloseIntentForActiveWorkspaceTabAndSync(...)`), with focused main-level tests for close-intent and reorder sync routing."
            - "In progress: terminal `next/prev` shortcut actions now route through `routeTerminalTabActionAndSync(...)` (removed direct apply path)."
            - "In progress: terminal `create` shortcut action now routes through `routeTerminalTabActionAndSync(...)` before workspace/tab-bar mutation, keeping terminal tab intent emission on the shared route."
            - "In progress: parity diagnostics now label first mismatching editor/terminal tab id/title explicitly in `app.mode.parity` logs."
            - "In progress: terminal activation intent emission now routes through a single optional-id helper (`routeTerminalActivateIntentByTabIdAndSync(...)`) for both workspace-active sync and tab-drag click activation paths."
            - "In progress: terminal shortcut cycle/focus branches are now routed through dedicated helpers (`requestCycleTerminalTabWithIntent`, `requestFocusTerminalTabWithIntent`) to keep `handleTerminalShortcutIntent(...)` orchestration-only."
