app_mode_layering_todo:
  scope:
    description: "Split app mode orchestration into shared runtime contracts + backend implementations + thin IDE composition, enabling focused binaries without behavior regressions."
    goals:
      - "Reduce `src/main.zig` ownership to bootstrap + host wiring."
      - "Create a shared public mode layer reusable by terminal-only/editor-only and IDE hosts."
      - "Keep current runtime `--mode` behavior compatible while preparing build-time focused binaries."
      - "Enforce regression gates between each extraction slice."
    non_goals:
      - "No feature changes to editor or terminal behavior."
      - "No FFI ABI expansion in this track."
      - "No renderer architecture redesign in this track."

  layering_model:
    shared_public_layer:
      path: "src/app/modes/shared/"
      responsibilities:
        - "Mode contracts, action DTOs, shared tab/session abstractions."
        - "Host-agnostic mode lifecycle and routing interfaces."
    backend_layer:
      path: "src/app/modes/backend/"
      responsibilities:
        - "Concrete editor and terminal mode implementations."
        - "Bridges from shared contracts to existing editor/terminal backends."
    ide_layer:
      path: "src/app/modes/ide/"
      responsibilities:
        - "Thin composition of backend modes for full IDE workflow."
        - "IDE-only policy switches; no backend ownership."

  zide_integration:
    entry_points:
      - src/main.zig
      - src/input/input_actions.zig
      - src/ui/widgets/tab_bar.zig
      - src/ui/widgets/editor_widget.zig
      - src/ui/widgets/terminal_widget.zig
      - src/terminal/core/workspace.zig
      - src/editor/editor.zig
      - app_architecture/APP_LAYERING.md

  regression_gates:
    required_after_each_slice:
      - zig build test
      - zig build check-app-imports
      - zig build check-input-imports
      - zig build check-editor-imports
    required_mode_smokes:
      - zig build run
      - zig build run -- --mode terminal
      - zig build run -- --mode editor
      - zig build run -- --mode ide
    required_backend_regressions:
      - zig build test-terminal-replay -- --all
    notes:
      - "Do not advance to the next slice until all gates pass for the current slice."
      - "If a gate fails, either fix in-slice or revert that slice before proceeding."

  milestones:
    - name: "MODE-00 Architecture + contracts"
      tasks:
        - id: MODE-00-01
          title: "Add shared mode contract interfaces and action DTOs"
          status: done
          files_to_add:
            - src/app/modes/shared/contracts.zig
            - src/app/modes/shared/actions.zig
            - src/app/modes/shared/types.zig
          notes:
            - "Extraction-only. No behavior deltas."
        - id: MODE-00-02
          title: "Document mode-layer boundaries and import constraints"
          status: done
          files_to_edit:
            - app_architecture/APP_LAYERING.md
            - app_architecture/app_mode_layering_todo.yaml
          notes:
            - "Shared/backend/ide import allow/deny constraints are now explicitly documented and authoritative."
            - "Until dedicated checks are added, enforce this task by review + existing import checks."
        - id: MODE-00-03
          title: "Extend import checks with mode-layer specific rules"
          status: done
          files_to_edit:
            - tools/app_import_check.zig
            - build.zig
          notes:
            - "Add explicit rule validation for shared/backend/ide boundaries in `src/app/modes/*`."
            - "Keep this separate from extraction work; no behavior changes."

    - name: "MODE-01 Backend extraction"
      tasks:
        - id: MODE-01-01
          title: "Extract terminal mode backend implementation"
          status: in_progress
          files_to_add:
            - src/app/modes/backend/terminal_mode.zig
          files_to_edit:
            - src/main.zig
            - src/terminal/core/workspace.zig
          notes:
            - "Must preserve terminal tab behavior, close modal policy, and focus reporting."
            - "In progress: terminal tab shortcut intents (`create/close/next/prev/focus`) now route through `TerminalMode` adapter alongside runtime behavior."
            - "In progress: terminal shortcut action decoding (`new/close/next/prev/focus`) is centralized in `src/app/modes/ide/terminal_shortcuts.zig`; `main.zig` now dispatches through one `handleTerminalShortcutIntent(...)` route."
            - "In progress: terminal tab drag reorder (`move`) and tab-click focus (`activate`) now route through adapter intents; parity diagnostics are available via `app.mode.parity` logging."
            - "In progress: close-confirm intent emission now routes through shared tab-action helpers; focused unit tests cover close/reorder intent helper behavior."
            - "In progress: terminal action emission is being consolidated through `routeTerminalTabActionAndSync(...)` to reduce duplicated adapter sync logic."
            - "In progress: terminal `next/prev` shortcut actions now route through `routeTerminalTabActionAndSync(...)` (removed direct apply path)."
            - "In progress: pure tab-intent helpers were extracted from `main.zig` into `src/app/modes/ide/tab_intents.zig`."
            - "In progress: tab projection + active-projection construction moved from `main.zig` into `src/app/modes/ide/projections.zig`."
            - "In progress: terminal close-intent emission is centralized via `applyTerminalCloseIntentForActiveWorkspaceTab()` in `main.zig` (deduped shortcut + confirm paths)."
            - "In progress: terminal close-tab shortcut path now uses `requestCloseActiveTerminalTab(...)` helper in `main.zig` for unified close/confirm side effects."
            - "In progress: terminal focus-tab action-to-index mapping moved from `main.zig` into `src/app/modes/ide/tab_intents.zig`."
            - "In progress: terminal focus-tab shortcut handling now uses typed `terminalFocusRouteForAction(...)` (index + intent) to keep `main.zig` branch decode-free."
            - "In progress: terminal close-confirm input decision logic moved from `main.zig` into `src/app/modes/ide/terminal_close_confirm.zig`."
            - "In progress: terminal close-confirm modal layout math moved from `main.zig` into `src/app/modes/ide/terminal_close_confirm.zig`."
            - "In progress: terminal close-confirm pending-tab reconciliation moved to pure helper (`reconcilePendingTab`) in `src/app/modes/ide/terminal_close_confirm.zig`."
            - "In progress: terminal tab drag end decision helpers moved from `main.zig` into `src/app/modes/ide/tab_drag.zig`."
            - "In progress: IDE editor tab reordering now reuses shared drag-end intent helper (`reorderIntentForDragEnd`)."
            - "In progress: both terminal and IDE-editor drag-release paths now consume shared release plans from `src/app/modes/ide/tab_drag.zig`."
            - "In progress: low-level tab drag frame processing (`mouseDown`/`mouseReleased`) is centralized in `processDragFrame(...)` within `src/app/modes/ide/tab_drag.zig`."
            - "In progress: active kind switching + adapter sync now routes through `setActiveKindAndSyncIfChanged(...)` helper in `main.zig` (mouse route branches deduped)."
            - "In progress: mouse pressed route branches (`ide`/`terminal`/`editor`) are now factored into dedicated AppState helpers to keep the input loop thin."
            - "In progress: terminal and IDE tab-drag input paths are now factored into dedicated AppState handlers, leaving the input loop to orchestration only."
            - "In progress: editor scrollbar + mouse-selection/drag input orchestration is now factored into dedicated AppState helpers."
            - "In progress: terminal widget input + pending-open request handling is now deduplicated via dedicated AppState helpers."
            - "In progress: editor visible-cache precompute and terminal polling are now routed through dedicated AppState helpers."
            - "In progress: search-panel input consumption for the frame is now factored into `handleSearchPanelFrameInput(...)`."
            - "In progress: active editor-frame and visible terminal-frame orchestration are now each routed through dedicated AppState helpers."
            - "In progress: mouse debug click logging and post-frame workspace sync are now routed through dedicated AppState helpers."
            - "In progress: top-level active-view frame orchestration is now collapsed into `handleActiveViewFrame(...)`."
            - "In progress: editor/terminal tab activation intent emission paths are now routed through dedicated AppState helpers (`activateEditorTabAtCurrentIndex`, `routeTerminalActiveWorkspaceTabIntent`, `routeTerminalActivateTabIdIntent`)."
            - "In progress: shortcut action switch-body routing is now centralized in `handleShortcutAction(...)`."
            - "In progress: mouse-pressed routing + optional debug logging are now centralized in `handleMousePressedFrame(...)`."
            - "In progress: action-loop orchestration and tab-drag orchestration are each collapsed into dedicated frame helpers (`handleInputActionsFrame`, `handleTabDragFrame`)."
            - "In progress: pointer redraw heuristics and terminal split-resize dragging are now routed through dedicated frame helpers (`handlePointerActivityFrame`, `handleTerminalSplitResizeFrame`)."
            - "In progress: window-resize event handling, cursor blink-arming updates, and deferred terminal resize apply are now routed through dedicated frame helpers."
            - "In progress: pre-input shortcut/clipboard routing is consolidated via dedicated helpers and `handlePreInputShortcutFrame(...)`."
            - "In progress: `update()` prelude (font-sample frame, widget input refresh, config-reload notice tick, and focus-based input routing) is now split into dedicated helpers."
            - "In progress: post-preinput phase and interaction phase in `update()` are now collapsed behind `handlePostPreInputFrame(...)` and `handleInteractiveFrame(...)`."
        - id: MODE-01-02
          title: "Extract editor mode backend implementation"
          status: in_progress
          files_to_add:
            - src/app/modes/backend/editor_mode.zig
          files_to_edit:
            - src/main.zig
            - src/editor/editor.zig
          notes:
            - "Must preserve editor search/selection/scroll behavior."
            - "In progress: editor tab create/activate intents now route through `EditorMode` adapter alongside runtime behavior."
            - "In progress: IDE tab drag reorder now routes editor `move` intents through the adapter."
            - "In progress: editor action emission now has `routeEditorTabActionAndSync(...)` to reduce duplicate adapter routing + sync callsites."

    - name: "MODE-02 IDE composition layer"
      tasks:
        - id: MODE-02-01
          title: "Add thin IDE host composition wrapper"
          status: done
          files_to_add:
            - src/app/modes/ide/host.zig
          files_to_edit:
            - src/main.zig
          notes:
            - "IDE layer should compose backend modes and keep policy-only logic."
        - id: MODE-02-02
          title: "Move residual mode-switching logic out of main app file"
          status: done
          files_to_edit:
            - src/main.zig
            - src/app/modes/ide/host.zig
            - src/app/modes/ide/layout_policy.zig
          notes:
            - "Target: main file owns bootstrap + host startup only."
            - "Completed: mode routing, tab policy, terminal strip geometry, layout, action/shortcut gating, and mouse routing are now routed through `app/modes/ide` helpers."

    - name: "MODE-03 Build-time focused binaries"
      tasks:
        - id: MODE-03-01
          title: "Add separate executable roots for terminal/editor/full IDE"
          status: done
          files_to_edit:
            - build.zig
          files_to_add:
            - src/app/entry_terminal.zig
            - src/app/entry_editor.zig
            - src/app/entry_ide.zig
          notes:
            - "Keep runtime `--mode` on full IDE binary for compatibility."
        - id: MODE-03-02
          title: "Add run/install steps for focused binaries"
          status: done
          files_to_edit:
            - build.zig
          notes:
            - "Expected steps: run-terminal, run-editor, run-ide."

    - name: "MODE-04 Compatibility verification + rollout"
      tasks:
        - id: MODE-04-01
          title: "Capture pre/post compatibility matrix"
          status: done
          files_to_add:
            - docs/app_mode_layering_validation.md
          notes:
            - "Record command matrix and expected outcomes for all modes."
        - id: MODE-04-02
          title: "Lock regression fixture authority for mode extraction"
          status: todo
          files_to_edit:
            - app_architecture/terminal/REPLAY_HARNESS_SPEC.md
            - app_architecture/editor/editor_widget_todo.yaml
          notes:
            - "Mark which fixtures/harnesses are blocking for each extraction slice."
