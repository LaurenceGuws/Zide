file_layout_todo:
  scope:
    description: "File and folder layout cleanup focused on ownership clarity, navigability, and removal of split/flat structural code smells."
    priorities:
      - "split large general folders into focused ownership domains"
      - "split true god-files into cohesive submodules"
      - "collapse extraction-residue micro-files where independent ownership is fake"
      - "avoid churn: no bulk moves without an explicit domain map and validation"

  context:
    references:
      - app_architecture/review/FILE_LAYOUT_HOTSPOTS_REVIEW.md
      - app_architecture/review/SRC_APP_DOMAIN_MAP.md
      - app_architecture/terminal/MODULARIZATION_PLAN.md
      - app_architecture/ui/ui_widget_modularization_todo.yaml
      - app_architecture/editor/MODULARIZATION_PLAN.md
      - app_architecture/ui/renderer_todo.yaml
    notes:
      - "Reference layout guidance is comparative, not prescriptive: Ghostty is the stronger structural model for Zide than Kitty."
      - "Do not collapse recently-correct subsystem splits just because file count increased."
      - "Extraction-only rules still apply unless a task explicitly scopes behavior changes."

  strict_cleanup_queue:
    - "FL-APP-01 define stable src/app domain map and move one slice at a time"
    - "FL-ED-01 split src/editor/editor.zig into a real subsystem layout"
    - "FL-ED-02 split src/editor/syntax.zig into focused syntax modules"
    - "FL-UI-01 split terminal_widget_draw.zig by draw ownership"
    - "FL-UI-02 split editor_widget_draw.zig by draw ownership"
    - "FL-UI-03 thin src/ui/renderer.zig against src/ui/renderer/"
    - "FL-UI-04 move terminal_font.zig under a focused font/text subsystem"
    - "FL-TERM-01 collapse low-value session_* micro-files into fewer coherent owners"
    - "FL-UI-05 collapse low-value src/ui/renderer micro-files"
    - "FL-CFG-01 split lua_config_ziglua_parse.zig by parser/validation/domain mapping concerns"

  phases:
    - name: "Phase 0 - Structural Baseline"
      tasks:
        - id: FL-0-01
          title: "Record file-layout hotspot review and reference comparisons"
          status: done
          files:
            - app_architecture/review/FILE_LAYOUT_HOTSPOTS_REVIEW.md
            - app_architecture/file_layout_todo.yaml
          notes:
            - "Local evidence source: tree/scc/file-count review of src/."
            - "Reference repos reviewed: Ghostty, Kitty, Alacritty."

        - id: FL-0-02
          title: "Adopt file-layout cleanup as active architecture track"
          status: done
          files:
            - docs/AGENT_HANDOFF.md
            - docs/INDEX.md
          notes:
            - "Handoff should point new sessions to this review/todo."

    - name: "Phase 1 - Folder-Level Dumping Ground Cleanup"
      tasks:
        - id: FL-APP-01
          title: "Define a stable domain map for src/app"
          status: done
          files:
            - src/app
            - app_architecture/review/SRC_APP_DOMAIN_MAP.md
          notes:
            - "Goal: replace suffix-driven flatness with domain-owned folders."
            - "Likely targets: runtime, frame, terminal, editor, tabs, search, config."
            - "Done: authoritative domain map recorded in `app_architecture/review/SRC_APP_DOMAIN_MAP.md`."
            - "Move order starts with `src/app/terminal/` as the first high-value subtree."

        - id: FL-APP-02
          title: "Move terminal-owned app runtime files under a focused src/app/terminal subtree"
          status: done
          files:
            - src/app
            - src/app/terminal
          notes:
            - "Includes terminal frame/runtime/intent/tab/close-confirm glue where ownership is terminal-specific."
            - "2026-03-10: started with the terminal close-confirm cluster (`terminal_close_*`) moved under `src/app/terminal/` as the first extraction-only subtree slice."
            - "2026-03-10: moved the terminal shortcut/intent/tab-routing cluster (`terminal_shortcut_*`, `terminal_intent_route*`, `terminal_runtime_intents`, `terminal_tab_*`, `terminal_tabs*`, `terminal_workspace_route`) under `src/app/terminal/` as the second subtree slice."
            - "2026-03-10: moved the clipboard/input-surface/bootstrap cluster (`terminal_clipboard_shortcuts*`, `terminal_widget_input*`, `terminal_active_widget`, `terminal_draw_surface_runtime`, `terminal_surface_gate`, `terminal_grid`, `terminal_theme_apply`, `terminal_refresh_sizing_runtime`, `terminal_session_bootstrap`) under `src/app/terminal/` as the third subtree slice."
            - "2026-03-10: moved the remaining terminal runtime/pacing/resize/frame wrappers (`terminal_frame_pacing_runtime`, `terminal_poll_runtime`, `terminal_resize`, `terminal_scrollback_pager`, `terminal_split_resize_frame`, `visible_terminal_frame*`, `poll_visible_terminal_sessions_runtime`, `deferred_terminal_resize_frame`) under `src/app/terminal/` as the final terminal subtree sweep."
            - "Validation passed for the moved slice: `zig build test`, `zig build check-app-imports`, `zig build check-input-imports`."

        - id: FL-APP-03
          title: "Move editor/search/tab runtime files under focused app subtrees"
          status: done
          files:
            - src/app
          notes:
            - "Do this after terminal slice establishes the domain-map pattern."
            - "2026-03-10: moved the search-panel cluster (`search_panel_frame_runtime`, `search_panel_input`, `search_panel_runtime`, `search_panel_state`) under `src/app/search/` as the first non-terminal subtree slice."
            - "2026-03-10: moved the editor host-glue cluster (`new_editor_runtime`, `editor_actions`, `editor_*runtime`, `editor_*intents`, `editor_*prepare`, `active_editor_frame`, `open_file_runtime`, `file_detect`) under `src/app/editor/` as the second non-terminal subtree slice."
            - "2026-03-10: moved the shared tab cluster (`tab_action_apply*`, `tab_action_route`, `tab_bar_width`, `tab_drag_*`, `tabbar_draw_runtime`) under `src/app/tabs/` as the third non-terminal subtree slice."
            - "Validation passed for the moved slice: `zig build test`, `zig build check-app-imports`, `zig build check-input-imports`."

    - name: "Phase 2 - Large File Splits"
      tasks:
        - id: FL-ED-01
          title: "Split src/editor/editor.zig into focused editor subsystem modules"
          status: in_progress
          files:
            - src/editor/editor.zig
            - src/editor/search_highlight.zig
          notes:
            - "Keep editor.zig as facade/orchestrator."
            - "Avoid creating a spray of tiny files; group by editing ownership."
            - "2026-03-10: first slice landed in progress by extracting the search/highlight subsystem into `src/editor/search_highlight.zig`, leaving `editor.zig` as the owning facade over search worker, regex matching, query replacement, and highlighter lifecycle behavior."
            - "2026-03-10: second slice landed in progress by extracting selection, multi-caret, rectangular selection, and undo-selection bookkeeping into `src/editor/selection_state.zig`, leaving `editor.zig` as a thinner owner over editing operations."
            - "2026-03-10: third slice landed in progress by extracting cursor movement, selection extension, cursor setters, and cursor position bookkeeping into `src/editor/navigation.zig`, reducing `editor.zig` to a smaller orchestration surface."
            - "2026-03-10: fourth slice landed in progress by extracting text mutation operations into `src/editor/edit_ops.zig`, including insert/delete/replace flows and the mutation-side highlight update plumbing."

        - id: FL-ED-02
          title: "Split src/editor/syntax.zig into a focused syntax subdir"
          status: done
          files:
            - src/editor/syntax.zig
            - src/editor/syntax_queries.zig
          notes:
            - "Likely boundaries: registry, parse/update orchestration, highlight state, language/query helpers."
            - "2026-03-10: first slice landed in progress by extracting syntax query loading, capture-kind mapping, and query-cache ownership into `src/editor/syntax_queries.zig`, leaving `syntax.zig` focused more tightly on runtime highlighting and injection execution."
            - "2026-03-10: second slice landed in progress by extracting syntax highlighter runtime lifecycle and layered injection execution into `src/editor/syntax_runtime.zig`, leaving `syntax.zig` more focused on predicate/directive/token utility logic."
            - "2026-03-10: third slice landed in progress by extracting predicate evaluation, directive handling, injection-setting collection, node-text helpers, and the mini regex engine into `src/editor/syntax_predicates.zig`, reducing `syntax.zig` to token assembly, overlap splitting, and top-level facade wiring."
            - "2026-03-10: final slice landed by extracting token overlap splitting/post-processing into `src/editor/syntax_tokens.zig`; `syntax.zig` is now a small facade over query/runtime/predicate/token subsystems instead of another large mixed-responsibility file."

        - id: FL-UI-01
          title: "Split src/ui/widgets/terminal_widget_draw.zig by draw ownership"
          status: done
          files:
            - src/ui/widgets/terminal_widget_draw.zig
          notes:
            - "Possible owners: grid/text, overlays, chrome/scrollbar, kitty draw path."
            - "2026-03-10: first slice landed in progress by extracting terminal grid/text rendering ownership into `src/ui/widgets/terminal_widget_draw_grid.zig`, including row background drawing, HarfBuzz shaping runs, underline drawing, sprite/box glyph paths, and glyph-cache submission. `terminal_widget_draw.zig` now keeps higher-level draw orchestration, texture update policy, overlays, cursor, selection, and scrollbar chrome."
            - "2026-03-10: second slice landed in progress by extracting overlay/chrome ownership into `src/ui/widgets/terminal_widget_draw_overlay.zig`, including selection overlays, hover underline, cursor drawing, IME composition preview, scrollbar chrome, and the scrollback badge. `terminal_widget_draw.zig` now leans much more heavily toward texture-update orchestration plus the remaining kitty/presentation-specific glue."
            - "2026-03-10: third slice landed in progress by extracting viewport-shift, texture-update, and partial redraw planning into `src/ui/widgets/terminal_widget_draw_texture.zig`, including the test-backed partial-plan helpers. `terminal_widget_draw.zig` is now primarily draw orchestration plus remaining kitty/presentation glue."
            - "2026-03-10: task closed. After the grid, overlay, and texture-planning splits, `terminal_widget_draw.zig` is down to coordinator size and the remaining kitty/presentation/perf glue reads as legitimate top-level orchestration rather than another hidden subsystem owner."

        - id: FL-UI-02
          title: "Split src/ui/widgets/editor_widget_draw.zig by draw ownership"
          status: done
          files:
            - src/ui/widgets/editor_widget_draw.zig
            - src/ui/widgets/editor_widget_draw_overlay.zig
            - src/ui/widgets/editor_widget_draw_text.zig
            - src/ui/widgets/editor_widget_draw_cache.zig
          notes:
            - "Possible owners: text/layout, gutter/chrome, overlays/cursor/selection."
            - "2026-03-10: first slice landed in progress by extracting draw-list primitives, selection/search overlays, caret helpers, selection-state hashing, and scrollbar rendering into `src/ui/widgets/editor_widget_draw_overlay.zig`. `editor_widget_draw.zig` now keeps text/layout/highlight assembly, cached-vs-live draw orchestration, and precompute/hash helpers."
            - "2026-03-10: second slice landed in progress by extracting byte-range mapping, selection-text background splitting, token color selection, and highlighted segment rendering into `src/ui/widgets/editor_widget_draw_text.zig`. `editor_widget_draw.zig` is now down near coordinator size and mostly owns draw entrypoints plus precompute/hash fallback helpers."
            - "2026-03-10: task closed. Fallback tokenization, precompute passes, and segment-hash planning now live in `src/ui/widgets/editor_widget_draw_cache.zig`. `editor_widget_draw.zig` is down to 807 LOC and now reads as a real draw coordinator over overlay/text/cache helper modules rather than another mixed-ownership file."

        - id: FL-UI-03
          title: "Thin src/ui/renderer.zig into a real facade over src/ui/renderer/"
          status: done
          files:
            - src/ui/renderer.zig
            - src/ui/renderer
          notes:
            - "Only move logic that already has a natural renderer sub-owner."
            - "2026-03-10: first slice landed in progress by extracting SDL/input event polling, event dispatch, and frame queue compaction into `src/ui/renderer/input_runtime.zig`, leaving `renderer.zig` thinner around top-level renderer orchestration."
            - "2026-03-10: second slice landed in progress by extracting font-feature config plus UI-scale/zoom runtime into `src/ui/renderer/font_runtime.zig`, leaving `renderer.zig` thinner around rendering entrypoints instead of also owning font runtime policy inline."
            - "2026-03-10: third slice landed in progress by extracting text/glyph rendering, shaping, and terminal cell draw paths into `src/ui/renderer/text_runtime.zig`, leaving `renderer.zig` thinner around draw coordination and backend wrappers."
            - "2026-03-10: task closed. After the input, font-runtime, and text-runtime splits, `renderer.zig` is down to facade/coordinator size; what remains is legitimate renderer ownership and wrapper glue rather than another hidden subsystem blob."

        - id: FL-UI-04
          title: "Move src/ui/terminal_font.zig under a focused font/text subsystem"
          status: done
          files:
            - src/ui/terminal_font.zig
          notes:
            - "Prefer one cohesive subsystem move over another giant top-level file."
            - "2026-03-10: first slice landed in progress by extracting atlas allocation/upload/compaction into `src/ui/font/atlas.zig`, establishing `src/ui/font/` as the focused font subsystem root and shrinking `terminal_font.zig` around font selection/shaping/fallback ownership."
            - "2026-03-10: second slice landed in progress by extracting preferred/fallback face selection policy into `src/ui/font/fallback.zig`, reducing `terminal_font.zig` around glyph shaping and system font discovery instead of also carrying the full fallback preference matrix inline."
            - "2026-03-10: third slice landed in progress by extracting special-glyph sprite generation, powerline outline rasterization, and sprite-cache population into `src/ui/font/special_glyphs.zig`, leaving `terminal_font.zig` thinner around regular glyph shaping/draw flow and system font discovery."
            - "2026-03-10: fourth slice landed in progress by extracting regular glyph shaping, grapheme shaping, glyph-advance lookup, and draw placement into `src/ui/font/shaping.zig`, leaving `terminal_font.zig` thinner around face selection and system font discovery."
            - "2026-03-10: final slice landed by extracting system font discovery, FreeType face loading, and platform fallback resolution into `src/ui/font/system_fallback.zig`. `terminal_font.zig` is now under 1k LOC and acts as the root owner over focused font subsystem modules instead of remaining another large mixed-responsibility file."

        - id: FL-CFG-01
          title: "Split src/config/lua_config_ziglua_parse.zig by parser/validation/domain mapping concerns"
          status: in_progress
          files:
            - src/config/lua_config_ziglua_parse.zig
            - src/config/lua_config_font_parse.zig
          notes:
            - "Keep public config loading entrypoints stable."
            - "2026-03-10: first slice landed in progress by extracting theme/color/editor-theme parsing into `src/config/lua_config_theme_parse.zig`. `lua_config_ziglua_parse.zig` now focuses more tightly on scalar option parsing and keybind parsing instead of also owning the full theme parser."
            - "2026-03-10: second slice landed in progress by extracting keybind parsing into `src/config/lua_config_keybind_parse.zig`. `lua_config_ziglua_parse.zig` now focuses more tightly on scalar/domain option parsing instead of also owning the full keybind parser."
            - "2026-03-10: third slice landed in progress by extracting log/filter/SDL-log parsing into `src/config/lua_config_log_parse.zig`. `lua_config_ziglua_parse.zig` now focuses more tightly on the remaining scalar domain config groups instead of also owning the full logging parser."
            - "2026-03-10: fourth slice landed in progress by extracting top-level font settings, nested app/editor/terminal font option parsing, and the `font_rendering` table into `src/config/lua_config_font_parse.zig`. `lua_config_ziglua_parse.zig` now focuses more tightly on the remaining scalar runtime/domain groups instead of also owning the full font/rendering parser."

    - name: "Phase 3 - Over-Split Artifact Collapse"
      tasks:
        - id: FL-TERM-01
          title: "Collapse low-value session_* micro-files into fewer coherent owners"
          status: done
          files:
            - src/terminal/core
          notes:
            - "Target only the smallest adjacent helpers where the split no longer pays for itself."
            - "Keep protocol/input/rendering/runtime as distinct owners."
            - "2026-03-10: first slice landed in progress by collapsing `session_clipboard.zig` into `session_interaction.zig`. Paste fallback policy and input-snapshot/OSC 5522 interaction were already one cohesive surface, so the extra file only added navigation overhead without buying a real ownership boundary."
            - "2026-03-10: second slice landed in progress by collapsing `session_publication.zig` into `session_rendering.zig`. Generation tracking, backlog hints, presented-generation acknowledgement, and presentation feedback were already one presentation lifecycle surface, so the split no longer paid for itself."
            - "2026-03-10: task closed after those two collapses. The remaining `session_*` files still map cleanly to real owners (`input`, `protocol`, `rendering`, `runtime`, `selection`, `queries`, `content`, `config`), so more merging there would re-mix domains rather than reduce layout smell."

        - id: FL-UI-05
          title: "Collapse low-value renderer micro-files into stronger local owners"
          status: in_progress
          files:
            - src/ui/renderer
          notes:
            - "Examples include tiny queue/state/flag helper files that add navigation cost without owning real behavior."
            - "2026-03-10: first slice landed in progress by collapsing the renderer input micro-files (`key_state.zig`, `mouse_state.zig`, `mouse_wheel.zig`, `key_queue.zig`, `input_queue.zig`, `text_composition.zig`) into `input_state.zig`, `input_runtime.zig`, and the root renderer facade. Those files only wrapped trivial input-state reads/resets/queue pops and were adding navigation cost without owning a real subsystem boundary."
            - "2026-03-10: second slice landed in progress by collapsing `clipboard_state.zig` into `clipboard.zig`. The old split was just a forwarding layer over SDL clipboard calls plus copy/logging helpers, so keeping both files only added another navigation hop without creating a meaningful renderer ownership boundary."
            - "2026-03-10: third slice landed in progress by collapsing `window_flags.zig` into `input_runtime.zig`. Resize/close event classification only existed to support the SDL input loop, so keeping it as a standalone file was another low-value wrapper rather than a real renderer subsystem."
            - "2026-03-10: fourth slice landed in progress by collapsing `window_metrics_state.zig` into `renderer.zig`. That file only wrapped one local begin-frame size refresh and had no independent renderer ownership, so the separate file was pure navigation overhead."

    - name: "Phase 4 - Verification and Drift Control"
      tasks:
        - id: FL-V-01
          title: "Validate build and import checks after each structural slice"
          status: todo
          commands:
            - zig build test
            - zig build check-app-imports
            - zig build check-editor-imports
            - zig build check-input-imports
            - zig build -Dmode=terminal -Doptimize=ReleaseFast
          notes:
            - "Use per-slice validation; do not batch large file moves without a clean checkpoint."

        - id: FL-V-02
          title: "Update owning architecture docs after each completed slice"
          status: todo
          files:
            - docs/AGENT_HANDOFF.md
            - docs/INDEX.md
            - app_architecture/review/FILE_LAYOUT_HOTSPOTS_REVIEW.md
            - app_architecture/file_layout_todo.yaml
          notes:
            - "Avoid doc drift between active hotspot review and cleanup queue."
