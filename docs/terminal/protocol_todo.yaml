terminal_protocol_todo:
  scope:
    description: "Close VT protocol gaps (OSC/CSI/DCS) for TUI correctness and modern shells."
    priorities:
      - "Dynamic colors (OSC 10–19/110–119) with query + reset"
      - "Palette control (OSC 4/104) with query + reset"
      - "Keyboard + cursor modes (DECCKM/DECKPAM/DECKPNM)"
      - "SGR completeness (58 underline color, 38/48/58:6 RGBA)"
      - "Query/response parity (DA/DSR/OSC queries)"
  status_snapshot:
    date: "2026-01-19"
    notes:
      - "CSI params expanded to 16 and ':' treated as SGR separator."
      - "DSR/DA replies implemented; DECCKM app-cursor keys implemented."
      - "OSC 8 hyperlinks, OSC 52 clipboard write, OSC 10/11 set + query implemented."
      - "Codex input background still missing: likely dynamic color/palette handling gaps."
      - "Checked off completed tasks through OSC-05 and CSI-02."
      - "DECSCUSR cursor style handling implemented."
      - "Application keypad mode (DECKPAM/DECKPNM) handled for keypad keys."
      - "XTGETTCAP minimal DCS +q replies implemented."

  reference_maps:
    xterm:
      - reference_repos/terminals/xterm_snapshots/ctlseqs.txt
      - reference_repos/terminals/xterm_snapshots/VTparse.h
      - reference_repos/terminals/xterm_snapshots/charproc.c
    foot:
      - reference_repos/terminals/foot/osc.c
      - reference_repos/terminals/foot/csi.c
      - reference_repos/terminals/foot/README.md
    ghostty:
      - reference_repos/terminals/ghostty/src/terminal/osc.zig
      - reference_repos/terminals/ghostty/src/terminal/formatter.zig
      - reference_repos/terminals/ghostty/src/terminal/color.zig
    wezterm:
      - reference_repos/terminals/wezterm/docs/changelog.md
      - reference_repos/terminals/wezterm/docs/shell-integration.md
      - reference_repos/terminals/wezterm/term/src/terminalstate/performer.rs
    kitty:
      - reference_repos/terminals/kitty/kitty/vt-parser.c
      - reference_repos/terminals/kitty/kitty/terminfo.py
      - reference_repos/terminals/kitty/kitty_tests/icat.py
    rio:
      - reference_repos/terminals/rio/docs/docs/escape-sequence-support.md
    ghostty_images:
      - reference_repos/terminals/ghostty/src/terminal/kitty/graphics.zig
      - reference_repos/terminals/ghostty/src/terminal/osc.zig

  tasks:
    - id: OSC-01
      title: "Implement OSC 4 palette set/query + OSC 104 reset"
      status: done
      refs:
        - reference_repos/terminals/foot/osc.c
        - reference_repos/terminals/xterm_snapshots/ctlseqs.txt
      notes:
        - "Support multiple <index;color> pairs in one OSC 4."
        - "Support query `OSC 4;<idx>;?` with rgb reply."
        - "Track terminator (BEL vs ST) for replies."
        - "Implemented palette storage + query replies with matching terminator."

    - id: OSC-02
      title: "Implement OSC 10–19 dynamic colors (set/query) + 110–119 reset"
      status: done
      refs:
        - reference_repos/terminals/foot/README.md
        - reference_repos/terminals/xterm_snapshots/ctlseqs.txt
        - reference_repos/terminals/ghostty/src/terminal/osc.zig
      notes:
        - "Apply updates to existing cells when defaults change."
        - "Handle OSC 12/17/19 set + reset."
        - "Set/query/reset wired for 10–19; defaults applied on 10/11; 12/17/19 stored."

    - id: OSC-03
      title: "OSC 52 clipboard read support"
      status: done
      refs:
        - reference_repos/terminals/ghostty/src/terminal/osc.zig
        - reference_repos/terminals/alacritty/alacritty_terminal/src/term/mod.rs
      notes:
        - "Respond to `OSC 52;?` with base64 data."
        - "Reply implemented using last stored clipboard contents."

    - id: OSC-04
      title: "OSC 7 CWD parsing + validation"
      status: done
      refs:
        - reference_repos/terminals/ghostty/src/terminal/osc.zig
        - reference_repos/terminals/wezterm/docs/shell-integration.md
      notes:
        - "Parse file:// URIs and normalize paths."
        - "Host validation + percent-decode + path normalization implemented."

    - id: OSC-05
      title: "OSC 133/1337 semantic prompt + user vars"
      status: done
      refs:
        - reference_repos/terminals/ghostty/src/terminal/osc.zig
        - reference_repos/terminals/wezterm/docs/shell-integration.md
      notes:
        - "Parsed OSC 133 (A/B/C/D) with prompt state + cmdline handling."
        - "Parsed OSC 1337 SetUserVar with base64 decode into session user var map."

    - id: CSI-01
      title: "SGR 58 underline color + 59 reset"
      status: done
      refs:
        - reference_repos/terminals/wezterm/docs/changelog.md
        - reference_repos/terminals/xterm_snapshots/ctlseqs.txt

    - id: CSI-02
      title: "SGR 38/48/58:6 RGBA support"
      status: done
      refs:
        - reference_repos/terminals/wezterm/docs/changelog.md

    - id: CSI-03
      title: "DECSCUSR cursor style (CSI q)"
      status: done
      refs:
        - reference_repos/terminals/xterm_snapshots/ctlseqs.txt
      notes:
        - "Applied cursor shape (block/underline/bar) to terminal widget."

    - id: CSI-04
      title: "Application keypad mode (DECKPAM/DECKPNM)"
      status: done
      refs:
        - reference_repos/terminals/xterm_snapshots/ctlseqs.txt
      notes:
        - "Added ESC '='/'>' handling and keypad key mappings for SS3 sequences."

    - id: CSI-05
      title: "DSR coverage audit"
      status: done
      refs:
        - reference_repos/terminals/xterm_snapshots/ctlseqs.txt
      notes:
        - "Added DEC-specific replies (e.g., ?6, ?15, ?25, ?26, ?55, ?56, ?75, ?85)."

    - id: DCS-01
      title: "XTGETTCAP (DCS +q) minimal support"
      status: done
      refs:
        - reference_repos/terminals/foot/README.md
        - reference_repos/terminals/rio/docs/docs/escape-sequence-support.md
      notes:
        - "Minimal DCS parser and XTGETTCAP replies for TN/Co/RGB."

    - id: IMG-01
      title: "Kitty graphics protocol (kitty-icat)"
      status: partial
      refs:
        - reference_repos/terminals/kitty/kitty_tests/icat.py
        - reference_repos/terminals/kitty/kitty/vt-parser.c
        - reference_repos/terminals/ghostty/src/terminal/kitty/graphics.zig
      notes:
        - "APC parser added (ESC _ ... ST) and Kitty 'G' payload parsing wired."
        - "Basic transmit/display/delete via 'a=t/T/p/d' with PNG or RGBA (f=24/32/100), no compression."
        - "Rendered images as overlays using raylib textures; no replies/quiet modes yet."
        - "Parsed full key set (incl. q/I/p/x/y/w/h/X/Y/S/O/P/Q/H/V/U) with basic validation (id vs number, direct-medium only, no compression)."
        - "Chunk assembly now honors S/O and zlib (o=z) for direct transfers; oversize payloads rejected."
      plan:
        - step: "P1: Command surface + validation (parser)"
          details:
            - "Parse full key set: a d t o f m i I p q w h x y v s S O c r X Y z C U P Q H V."
            - "Validate command rules (id vs number, required fields); mirror kitty error cases."
            - "Model command struct (similar to Ghostty Command) and keep raw kv for unknown fields."
          files:
            - src/terminal/core/terminal.zig
            - src/terminal/parser/parser.zig
        - step: "P2: Image loading state + chunking + compression"
          details:
            - "Track LoadingImage state (per-id) with q inheritance across chunks."
            - "Support compressed payload (o=1) with zlib inflate."
            - "Honor S/O data size + offset; reject oversized payloads."
          files:
            - src/terminal/core/terminal.zig
            - src/terminal/model/kitty_storage.zig (new)
        - step: "P3: Storage limits + eviction"
          details:
            - "Implement total byte limit (e.g., 320MB like Ghostty/Kitty)."
            - "Evict oldest/unused images on overflow."
          files:
            - src/terminal/model/kitty_storage.zig (new)
        - step: "P4: Placement anchoring + scrollback integration"
          details:
            - "Anchor placements to scrollback rows (pin or absolute row index)."
            - "When image placed, consume rows and move cursor beneath image."
            - "Scroll/trim updates move or drop placements appropriately."
          files:
            - src/terminal/model/screen.zig
            - src/terminal/model/history.zig
            - src/terminal/core/terminal.zig
        - step: "P5: Rendering layers + z-index"
          details:
            - "Backgrounds → images → glyphs → cursor/selection."
            - "Sort placements by z; support below/above text."
            - "Dirty region updates for image moves."
          files:
            - src/ui/widgets/terminal_widget.zig
            - src/ui/renderer.zig
        - step: "P6: Delete/query + virtual/parented placements"
          details:
            - "Delete actions by id/placement/range; clear all."
            - "Query responses and q= quiet rules."
            - "Virtual placements (U=1) + parent/child (P/Q/H/V)."
          files:
            - src/terminal/core/terminal.zig
            - src/terminal/model/kitty_storage.zig (new)

    - id: TERM-01
      title: "Terminfo feature parity sweep"
      status: todo
      refs:
        - reference_repos/terminals/kitty/kitty/terminfo.py
        - reference_repos/terminals/xterm_snapshots/ctlseqs.txt
